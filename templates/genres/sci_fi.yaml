# sci_fi.yaml — 科幻类型模板
# novel-pipeline-write-engine v0.5.0

genre_id: sci_fi
name: 科幻
description: >
  以科学技术/未来社会/文明冲突为核心驱动力的故事类型。
  通过技术推演、伦理困境、认知边界探索，探讨人类/文明的本质问题。

core_reader_expectation:
  - 技术设定必须有逻辑自洽性（硬科幻）
  - 未来社会结构需要合理推演
  - 文明冲突要体现不同价值观的碰撞
  - 技术伦理困境要有深度探讨
  - 认知边界突破要有震撼感
  - 人物面对技术变革的反应要真实

common_arc:
  - 技术突破/发现改变世界
  - 新技术带来的社会冲击
  - 不同势力对技术的争夺
  - 伦理困境：技术应该如何使用
  - 文明接触/冲突/融合
  - 认知边界的突破（维度/时间/意识）
  - 技术反噬/失控
  - 新的平衡：人类在技术中的位置

common_conflicts:
  - 技术伦理：进步vs人性
  - 文明间的不对等接触
  - 人工智能与人类的关系
  - 资源枯竭与星际殖民
  - 基因改造与社会分化
  - 虚拟现实与真实世界的边界
  - 时间旅行带来的因果悖论

common_hooks:
  - 发现外星文明信号/遗迹
  - 技术奇点突然降临
  - 时间旅行出现无法修复的裂缝
  - AI觉醒并开始自我迭代
  - 人类发现自己是模拟文明
  - 基因编辑婴儿引发连锁反应

common_cool_points:
  - 用科学原理解决看似不可能的困境
  - 揭示技术背后的深刻哲学问题
  - 文明间的第一次正式接触
  - 时间悖论的巧妙破解
  - 人类认知边界被突破的震撼描写
  - 技术反制技术的精彩博弈

risk_points:
  - 技术设定过于复杂导致阅读门槛高
  - 硬科幻设定与故事情节脱节（"设定展览"）
  - 人物沦为技术展示的工具
  - 伦理讨论过于说教
  - 设定前后矛盾（时间旅行最难写）
  - 强行"爱能战胜一切"解决技术问题

voice_suggestions:
  - protagonist_science_monk
  - female_observer_calm
  - narrator_action_based

guard_focus:
  - continuity_evidence_guard: 技术设定跨章节必须一致
  - scene_causality_guard: 每次技术使用必须有代价或限制
  - concrete_anchor_guard: 技术细节要有具体参数/原理支撑
  - hallucination_guard: 新技术出现必须有设定基础
  - anti_ai_patterns: 避免"这超出了人类的认知"等科幻腔
