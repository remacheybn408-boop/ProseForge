# rule_horror.yaml — 规则怪谈类型模板
# novel-pipeline-write-engine v0.5.0

genre_id: rule_horror
name: 规则怪谈
description: >
  以"规则"为核心驱动力的恐怖/悬疑类型。主角进入受规则支配的异常空间，
  必须在遵守/破解规则中求生。恐惧感来源于规则本身的不可违抗性和未知性。

core_reader_expectation:
  - 规则必须明确且自洽，不能随意添加/修改
  - 规则后果必须严格执行，不能放水
  - 逻辑破解是核心爽点，不可靠运气过关
  - 恐惧感应来自规则本身的诡异，非Jump Scare
  - 环境氛围描写要细腻（光线/声音/空间异常）
  - 每次破解应有代价积累

common_arc:
  - 误入/被拉入规则空间
  - 发现并解读第一条规则
  - 试探规则边界（付出代价）
  - 遭遇其他被困者（合作/背叛）
  - 规则产生变化/升级
  - 发现规则背后的逻辑/源头
  - 关键破解（以巨大代价换取）
  - 逃脱/暂时逃脱，规则空间仍在

common_conflicts:
  - 规则之间的矛盾（必须选择违反其中之一）
  - 被困者之间的生存竞争
  - 规则解读分歧导致团队分裂
  - 规则执行者/维护者的追杀
  - 自身恐惧与理智的对抗
  - 规则源头的未知意志

common_hooks:
  - 收到一封写满诡异规则的信/短信
  - 进入一栋规则告示贴满的废弃建筑
  - 游戏中触发隐藏的"规则模式"
  - 日常场景突然出现违反物理的规则
  - 睡梦中进入规则空间，醒来规则仍在
  - 身边的人开始遵守看不见的规则

common_cool_points:
  - 在绝境中发现规则漏洞并利用
  - 将多条规则组合成破解方案
  - 推测出规则源头/设计者的意图
  - 用规则反制规则执行者
  - 保护他人完成逃脱
  - 留下破解线索给后来者

risk_points:
  - 规则过于复杂导致读者困惑
  - 破解过于简单破坏紧张感
  - 规则执行前后不一致（吃书）
  - 恐惧感衰退（后期变成套路解谜）
  - 主角光环太明显，代价形同虚设
  - 规则空间设定缺乏层次感

voice_suggestions:
  - protagonist_science_monk
  - female_observer_calm
  - narrator_action_based
  - villain_cold_contract

guard_focus:
  - continuity_evidence_guard: 规则必须跨章节保持一致
  - scene_causality_guard: 每次违规必须有具体代价描写
  - concrete_anchor_guard: 环境细节必须具体（温度/声音/气味/光线）
  - hallucination_guard: 新增规则必须有铺垫
  - padding_guard: 避免在紧张场景中插入大段心理描写
