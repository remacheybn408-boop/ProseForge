server {
  listen 80;
  resolver 127.0.0.11 valid=10s ipv6=off;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    set $api_upstream http://api:8000;
    proxy_pass $api_upstream;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
