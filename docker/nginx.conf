server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    # 直接写死 upstream：变量 + `resolver 127.0.0.11` 是 Docker 内嵌 DNS 专用，
    # Podman（aardvark-dns）不用该地址，运行时解析失败会返回 502。
    # 启动期经系统 resolver 解析，Docker/Podman 行为一致；
    # 代价是 api 容器重建换 IP 后需重启 web（dev/test 拓扑可接受）。
    proxy_pass http://api:8000;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
