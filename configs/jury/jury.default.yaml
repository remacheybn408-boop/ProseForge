# jury.default.yaml — 轻量评审团模式（默认）
# 20 个评审代理可用，默认启用 16 个核心代理

name: "轻量评审团"
mode: light
description: >
  可用 20 个评审代理，默认启用 16 个核心代理（pacing/conflict/foreshadowing 等扩展代理默认开启，
  power_system/cultural_rules 需手动启用）。
  适合每日写作后的快速质量检查，运行时间短，反馈快。

agents:
  # 连续性维度 (5 agents)
  - continuity
  - timeline
  - location_tracker
  - inventory
  - character_voice
  # 角色维度 (4 agents)
  - character_arc
  - dialogue
  - relationship
  # 情节维度 (4 agents)
  - plot_logic
  - pacing
  - conflict
  - foreshadowing
  # 世界观维度 (2 agents)
  - worldbuilding
  # 风格维度 (3 agents)
  - ai_style
  - prose_quality
  - genre
  # 风险维度 (2 agents)
  - reader_hook
  - anti_padding

settings:
  min_score_pass: 60
  single_agent_fail_threshold: 40
  max_issues_per_agent: 10
  concurrent: true
  timeout_seconds: 120

report:
  format: json
  include_scores: true
  include_suggestions: true
  output_dir: "./exports/reports/jury/"
