name: 人物关系审查
agent_id: relationship
description: 检查人物关系网络的变化是否合理，关系转变是否有铺垫。
category: character
risk_level: medium
default_enabled: true
weight: 0.9
check_rules:
- id: REL-001
  name: 关系转变铺垫
  description: 检查人物关系的重大转变（敌变友/友变敌/陌生变亲近）是否有充分的铺垫和触发事件。
  severity: error
  check_type: cross_chapter
- id: REL-002
  name: 关系网络完整
  description: 检查重要角色之间是否都有基本的互动记录。完全无互动的两个重要角色可能遗漏了关系线。
  severity: info
  check_type: cross_chapter
- id: REL-003
  name: 情感浓度把控
  description: 检查感情线的推进节奏。太快（一见钟情后立刻生死相许）缺少信任建立过程。
  severity: warning
  check_type: cross_chapter
filters:
  min_chapter_words: 800
