name: 地点追踪
agent_id: location_tracker
description: 追踪角色位置变化，检查空间跳跃的合理性。防止'刚在京城转眼到了边疆'之类的不合理跳跃。
category: continuity
risk_level: medium
default_enabled: true
weight: 0.9
check_rules:
- id: LOC-001
  name: 空间跳跃检查
  description: 检查角色在两个场景之间的移动是否合理。跨城/跨国移动需要时间过渡或明确说明（传送阵等）。
  severity: error
  check_type: cross_chapter
- id: LOC-002
  name: 场景切换频率
  description: 检查章节内场景切换次数。超过5个场景切换可能使读者困惑，建议控制在3个以内。
  severity: info
  check_type: single_chapter
- id: LOC-003
  name: 地图一致性
  description: 检查地点名称是否前后一致，防止同一地点出现不同名称或地理位置矛盾。
  severity: error
  check_type: cross_chapter
filters:
  min_chapter_words: 500
