name: 战力体系审查
agent_id: power_system
description: 检查修炼体系/战力体系的内部一致性。防止境界混乱、战力崩坏等问题。
category: worldbuilding
risk_level: high
default_enabled: false
weight: 1.0
check_rules:
- id: PWR-001
  name: 境界一致性
  description: 检查境界体系是否前后一致。同一境界的描述（能力/特征/寿命）不应前后矛盾。
  severity: error
  check_type: cross_chapter
- id: PWR-002
  name: 战力对比合理
  description: 检查战斗胜负是否与设定一致。低境界秒杀高境界需有明确原因（偷袭/法宝/克制等）。
  severity: error
  check_type: single_chapter
- id: PWR-003
  name: 突破代价
  description: 检查境界突破是否有代价和过程。无代价的突破（睡一觉就升级）属于爽文惯性。
  severity: warning
  check_type: single_chapter
- id: PWR-004
  name: 术语一致性
  description: 检查修炼术语是否一致。同一事物不应出现多种称呼（如'灵气'和'灵力'混用）。
  severity: warning
  check_type: cross_chapter
filters:
  min_chapter_words: 500
  genres:
  - xianxia
  - wuxia
  - fantasy
