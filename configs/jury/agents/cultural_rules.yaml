name: 文化规则审查
agent_id: cultural_rules
description: 检查世界观中的社会制度、文化规则是否自洽。包括礼仪、阶层、交易、法律等。
category: worldbuilding
risk_level: medium
default_enabled: false
weight: 0.8
check_rules:
- id: CUL-001
  name: 阶层行为一致
  description: 检查不同社会阶层的角色行为是否符合设定。皇子行礼的方式不应与乞丐相同。
  severity: warning
  check_type: single_chapter
- id: CUL-002
  name: 货币/交易体系
  description: 检查交易场景中的货币使用是否一致。货币单位、购买力不应前后矛盾。
  severity: warning
  check_type: cross_chapter
- id: CUL-003
  name: 礼仪制度
  description: 检查礼仪描写的准确性。行礼方式、称呼方式应在同一文化体系内保持一致。
  severity: info
  check_type: cross_chapter
- id: CUL-004
  name: 规则例外解释
  description: 检查世界观规则的例外是否有合理解释。'唯独他能'需要铺垫，不能成为万用借口。
  severity: warning
  check_type: single_chapter
filters:
  min_chapter_words: 500
