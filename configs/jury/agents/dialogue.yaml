name: 对话质量审查
agent_id: dialogue
description: 检查对话的自然度、信息密度和角色辨识度。防止'所有人都用同一种方式说话'的问题。
category: character
risk_level: medium
default_enabled: true
weight: 1.0
check_rules:
- id: DLG-001
  name: 对话辨识度
  description: 检查不同角色的对话是否可以互换。如果去掉说话人标注后无法区分谁在说话，需改进。
  severity: warning
  check_type: single_chapter
- id: DLG-002
  name: 对话信息密度
  description: 检查对话是否承载了有效信息（推进剧情/揭示性格/埋设伏笔）。纯寒暄对话应精简。
  severity: warning
  check_type: single_chapter
- id: DLG-003
  name: 解释性对话
  description: 检查对话中是否包含过度解释。'如你所知...'式的信息倾倒属于AI腔。
  severity: error
  check_type: single_chapter
- id: DLG-004
  name: 对话节奏
  description: 检查对话的节奏感。连续多句无动作/表情穿插的纯对话会使阅读疲惫。
  severity: info
  check_type: single_chapter
filters:
  min_chapter_words: 500
