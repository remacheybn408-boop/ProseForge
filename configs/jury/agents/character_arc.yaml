name: 角色弧线审查
agent_id: character_arc
description: 检查角色成长轨迹是否合理，防止角色突变（性格/能力突然变化）或停滞（长篇幅无变化）。
category: character
risk_level: high
default_enabled: true
weight: 1.0
check_rules:
- id: ARC-001
  name: 性格一致性
  description: 检查角色核心性格是否保持一致。性格变化需要铺垫和触发事件，不能无故突变。
  severity: error
  check_type: cross_chapter
- id: ARC-002
  name: 能力成长曲线
  description: 检查角色能力的提升是否合理。突然的战斗力暴涨需有解释（奇遇/丹药/顿悟等）。
  severity: warning
  check_type: cross_chapter
- id: ARC-003
  name: 角色存在感
  description: 检查重要角色是否长期缺席。连续3章以上未出现的重要角色应评估是否需要回归。
  severity: info
  check_type: cross_chapter
- id: ARC-004
  name: 配角工具化
  description: 检查配角是否仅沦为功能性存在（只在需要时出现）。配角应有独立动机和行为线。
  severity: warning
  check_type: cross_chapter
filters:
  min_chapter_words: 800
