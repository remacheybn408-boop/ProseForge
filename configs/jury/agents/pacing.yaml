name: 节奏控制审查
agent_id: pacing
description: 检查章节的叙事节奏是否合理，张弛有度。防止全程紧绷或全程平淡。
category: plot
risk_level: high
default_enabled: true
weight: 1.1
check_rules:
- id: PAC-001
  name: 节奏曲线
  description: 检查章节是否有张有弛。全是动作场面或全是对话/描写都不利于阅读节奏。
  severity: warning
  check_type: single_chapter
- id: PAC-002
  name: 过渡段比例
  description: 检查过渡段占总字数的比例。超过40%的过渡/描写段可能导致节奏拖沓。
  severity: warning
  check_type: single_chapter
- id: PAC-003
  name: 高潮前铺垫
  description: 检查重要事件前是否有足够的铺垫。凭空出现的重要转折属于节奏失控。
  severity: error
  check_type: cross_chapter
- id: PAC-004
  name: 章末节奏
  description: 检查章节结尾是否给读者继续阅读的动力。平淡收束的章节建议加入悬念或钩子。
  severity: warning
  check_type: single_chapter
filters:
  min_chapter_words: 500
