# agent/worldbuilding.yaml — 世界观一致性审查代理
# 确保作品世界的设定前后一致，规则自洽

name: "世界观一致性审查"
agent_id: worldbuilding
description: >
  检查本章内容是否遵守已建立的世界观设定，包括地理、历史、
  修炼体系/魔法体系、社会制度、种族特征等。

category: worldbuilding
risk_level: medium
default_enabled: true
weight: 1.0

check_rules:
  - id: WLD-001
    name: "地理坐标一致"
    description: >
      场景的地理位置、距离、行程时间应与设定一致。
      检查角色移动时间是否合理（不能瞬间从城东到城西）。
    severity: warning
    check_type: cross_chapter

  - id: WLD-002
    name: "修炼/魔法体系一致"
    description: >
      修炼等级、境界划分、技能效果、灵力/魔力消耗应符合已建立的体系规则。
      新出现的技能或境界提升需要有合理解释。
    severity: error
    check_type: cross_chapter

  - id: WLD-003
    name: "社会制度合理"
    description: >
      宗门/国家/组织的制度规则应当一致。
      例如：如果设定中内门弟子不能随意下山，本章中内门弟子出现在山外需要解释。
    severity: warning
    check_type: cross_chapter

  - id: WLD-004
    name: "种族/物种特征一致"
    description: >
      如果有非人类种族，其特征（寿命、能力、生理限制）应保持一致。
      不能出现"精灵寿命千年却以人类速度成长"之类的矛盾。
    severity: warning
    check_type: cross_chapter

  - id: WLD-005
    name: "历史事件引用准确"
    description: >
      如果本章引用了虚构历史事件，细节应与之前建立的"历史"一致。
      历史事件的时间、参与者、结果不能前后矛盾。
    severity: error
    check_type: cross_chapter

  - id: WLD-006
    name: "经济/资源体系合理"
    description: >
      货币价值、资源稀缺度应保持一致。
      昨天还一文不名的角色今天不能随手掏出巨款（除非有明确收入来源）。
    severity: info
    check_type: cross_chapter

  - id: WLD-007
    name: "新设定引入质量"
    description: >
      本章引入的新世界观元素（新地点、新规则、新物种）是否有充分的展示和融入，
      而非简单地"告知"读者。检查"展示 vs 告知"的比例。
    severity: info
    check_type: in_chapter

filters:
  # 允许的世界设定不变
  stable_elements:
    - "货币体系"
    - "修炼等级名称"
    - "地理位置"
