name: 物品道具追踪
agent_id: inventory
description: 追踪角色拥有的关键物品/道具，检查物品的出现、使用、丢失是否连贯。
category: continuity
risk_level: medium
default_enabled: true
weight: 0.8
check_rules:
- id: INV-001
  name: 关键物品状态
  description: 检查关键物品（法宝/丹药/信物等）的使用和存在状态是否连贯。获得后不应无故消失。
  severity: error
  check_type: cross_chapter
- id: INV-002
  name: 物品数量一致
  description: 检查可消耗物品（丹药/符箓/灵石等）的数量是否前后一致，消耗后应减少。
  severity: warning
  check_type: cross_chapter
- id: INV-003
  name: 新物品引入合理
  description: 检查新物品的引入是否有铺垫。'恰好在需要时出现某物'属于AI腔典型模式。
  severity: warning
  check_type: single_chapter
filters:
  min_chapter_words: 500
