# agent/reader_hook.yaml — 读者钩子审查代理
# 确保每章有足够的吸引力留住读者继续阅读

name: "读者钩子审查"
agent_id: reader_hook
description: >
  检查章节的读者留存要素：开篇吸引力、章节结尾钩子（断章）、
  信息悬念的释放节奏、读者期待管理。
  网文的核心生存法则——每章结尾都要让读者想点"下一章"。

category: plot
risk_level: high
default_enabled: true
weight: 1.25

check_rules:
  - id: RHK-001
    name: "开篇吸引力"
    description: >
      检查章节开头（前300字）是否具有足够的吸引力。
      开头应包含以下至少一项：
      - 直接进入场景/对话（避免冗长的背景介绍）
      - 提出一个立即需要回答的问题
      - 展示一个有趣的画面/动作
      - 承接上一章的悬念
    severity: warning
    check_type: in_chapter

  - id: RHK-002
    name: "章节结尾钩子"
    description: >
      检查章节结尾（最后500字）是否设置了有效的钩子。
      有效的钩子包括：
      - 悬念（未解之谜、即将揭晓的真相）
      - 危机（角色面临新危险、困境升级）
      - 期待（即将到来的重要事件、突破、相遇）
      - 反转（揭示意外信息）
      纯"总结式"结尾标记为严重问题。
    severity: error
    check_type: in_chapter

  - id: RHK-003
    name: "信息悬念节奏"
    description: >
      检查信息的释放节奏是否合理。
      不能一次性倒出所有信息（读者失去好奇心），
      也不能一直不给信息（读者失去耐心）。
      检查"提出问题→延迟回答→部分回答→提出新问题"的循环。
    severity: warning
    check_type: cross_chapter

  - id: RHK-004
    name: "期待管理"
    description: >
      检查作者是否在适当位置埋下了让读者产生期待的元素：
      - 暗示即将到来的大事件
      - 预告角色的成长/获得
      - 暗示隐藏的真相
      这些期待需要在合理时间内兑现（不能画饼不兑现）。
    severity: warning
    check_type: cross_chapter

  - id: RHK-005
    name: "爽点密度"
    description: >
      检查章节中是否有"爽点"——让读者感到满足的时刻：
      - 主角展示实力/智慧
      - 打脸/反转
      - 获得认可/奖励
      - 揭开真相
      每章至少应有1个爽点。连续多章没有爽点标记为问题。
    severity: warning
    check_type: cross_chapter

  - id: RHK-006
    name: "断章质量"
    description: >
      对于网文连载，断章的位置至关重要。
      检查断章是否卡在：
      - 关键信息即将揭示的前一刻 ✓
      - 危险即将降临的瞬间 ✓
      - 角色做出重大决定后 ✓
      - 平淡的日常描写结束时 ✗
    severity: error
    check_type: in_chapter

  - id: RHK-007
    name: "读者情绪曲线"
    description: >
      评估整章的读者情绪曲线。好的章节应让读者经历情绪的起伏：
      好奇→紧张→满足→期待（新的好奇）。
      单一情绪持续整章标记为问题。
    severity: info
    check_type: in_chapter

filters:
  # 允许的结尾类型
  valid_endings:
    - "悬念式"
    - "反转式"
    - "预告式"
    - "情绪高潮式"
  # 不推荐的结尾类型
  weak_endings:
    - "总结式"       # "就这样，XX度过了...的一天"
    - "日记式"       # "XX在日记中写道..."
    - "废话式"       # 无信息增量的日常收尾
