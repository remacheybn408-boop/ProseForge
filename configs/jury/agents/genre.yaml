# agent/genre.yaml — 类型合规审查代理
# 确保作品符合目标类型的核心约定和读者期待

name: "类型合规审查"
agent_id: genre
description: >
  检查章节内容是否满足目标类型的核心约定和读者期待。
  不同类型的读者有不同的期待——仙侠读者期待修炼和奇遇，
  悬疑读者期待线索和反转。偏离类型核心约定可能导致读者流失。

category: style
risk_level: medium
default_enabled: true
weight: 0.9

check_rules:
  - id: GEN-001
    name: "类型核心要素存在"
    description: >
      检查本章是否包含该类型的核心要素。
      例如：
      - 仙侠：修炼/突破/法宝/奇遇（至少一项）
      - 悬疑：线索/谜题/推理/误导（至少一项）
      - 言情：情感互动/关系进展（至少一项）
      如果章节完全没有类型核心要素，标记为警告。
    severity: warning
    check_type: in_chapter

  - id: GEN-002
    name: "类型禁忌检查"
    description: >
      检查是否出现该类型的禁忌模式。
      例如：
      - 仙侠：科技元素突然出现（除非设定中有解释）
      - 悬疑：过早揭示谜底
      - 言情：主角长时间不互动
    severity: error
    check_type: in_chapter

  - id: GEN-003
    name: "类型节奏匹配"
    description: >
      检查节奏是否符合该类型的惯例。
      - 快节奏类型（玄幻/网游）：事件密度应较高
      - 慢节奏类型（种田/日常）：允许较长的描写和氛围铺垫
    severity: info
    check_type: in_chapter

  - id: GEN-004
    name: "类型交叉处理"
    description: >
      如果作品是多类型交叉（如仙侠+悬疑），检查两个类型的元素是否都得到了体现。
      不应出现"标签挂仙侠但实际是纯言情"的情况。
    severity: warning
    check_type: cross_chapter

  - id: GEN-005
    name: "类型惯例遵守"
    description: >
      检查是否遵守该类型的"不成文规定"：
      - 仙侠：主角必须有成长路径（不能一开始就满级）
      - 无限流：副本必须有规则说明
      - 系统流：系统面板需要适时出现
    severity: info
    check_type: cross_chapter

  - id: GEN-006
    name: "反类型需有意识"
    description: >
      如果作品刻意打破类型常规（反类型），检查是否有明确的叙事意图。
      无意识的反类型容易让读者感到困惑。
    severity: info
    check_type: in_chapter

filters:
  # 对于类型交叉作品，允许一定的灵活度
  cross_genre_tolerance: medium
