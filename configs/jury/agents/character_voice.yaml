# agent/character_voice.yaml — 角色声线审查代理
# 确保每个角色的说话方式、行为模式、思维特点保持一致

name: "角色声线审查"
agent_id: character_voice
description: >
  检查每个角色的对白、内心独白、行为方式是否符合其设定的人格特征。
  防止角色"千人一面"——所有角色说话方式雷同。

category: character
risk_level: high
default_enabled: true
weight: 1.1

check_rules:
  - id: CHV-001
    name: "对白风格一致"
    description: >
      检查角色的对白是否符合其性格设定。
      例如：冷酷角色不应说出过于热情的台词，粗犷角色不应使用文雅措辞。
      对白长度、句式复杂度、用词习惯应与角色设定匹配。
    severity: error
    check_type: per_character

  - id: CHV-002
    name: "口头禅/习惯用语"
    description: >
      如果角色已建立了口头禅或习惯用语，检查本章是否继续保持。
      新增口头禅需要在性格上有合理的触发原因。
    severity: warning
    check_type: cross_chapter

  - id: CHV-003
    name: "行为模式一致"
    description: >
      角色的行为选择应符合其价值观和过往行为模式。
      性格突变（如胆小鬼突然勇敢）需要有足够的铺垫和动机解释。
    severity: warning
    check_type: cross_chapter

  - id: CHV-004
    name: "角色辨识度"
    description: >
      遮住角色名字后，读者应能从对白风格区分出不同角色。
      检查是否有两个或多个角色的对白高度相似（同质化）。
    severity: warning
    check_type: in_chapter

  - id: CHV-005
    name: "内心独白个性化"
    description: >
      角色的内心独白应该反映其独特的思维方式。
      不同角色的内心活动不应使用相同的句式和节奏。
    severity: info
    check_type: per_character

  - id: CHV-006
    name: "情感表达层次"
    description: >
      角色的情感表达应符合其性格设定。
      内敛角色不应过度外放，外向角色不应过度沉默。
      情感的"度"要与角色的人设匹配。
    severity: warning
    check_type: per_character

  - id: CHV-007
    name: "角色成长追踪"
    description: >
      如果角色处于成长弧线中，检查本章的行为变化是否符合弧线方向。
      成长是有过程的，不能跳步。
    severity: info
    check_type: cross_chapter

filters:
  ignore_patterns:
    - "心想"  # 常见内心独白引导词，不作为问题
    - "暗忖"
    - "默念"
