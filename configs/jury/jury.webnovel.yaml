# jury.webnovel.yaml — 网文专项评审团模式
# 针对网文特有的痛点：节奏、冲突、钩子、灌水、断章等

name: "网文专项评审团"
mode: webnovel
description: >
  针对网络小说（webnovel）的专项审核，聚焦网文写作的核心问题：
  开篇钩子、章节钩子（断章）、节奏控制、冲突密度、灌水检测、
  读者留存率相关指标。

agents:
  # 网文核心维度
  - reader_hook           # 开篇/章节钩子（断章设计）
  - pacing                # 节奏控制（快慢交替、爽点密度）
  - conflict              # 冲突张力（冲突是否足够强烈）
  - anti_padding          # 反灌水（无意义描写/注水对话）
  - ai_style              # AI味儿（网文读者对此最敏感）

  # 通用保障维度
  - continuity            # 连续性
  - character_voice       # 角色声线
  - plot_logic            # 情节逻辑
  - genre                 # 类型合规

settings:
  min_score_pass: 55          # 网文评分标准低于严肃文学，侧重可读性
  single_agent_fail_threshold: 35
  max_issues_per_agent: 15
  concurrent: true
  timeout_seconds: 150

  # 网文专项设置
  webnovel_specific:
    hook_check_enabled: true                # 检查每章是否有钩子
    padding_threshold_ratio: 0.15           # 灌水比例阈值（超过15%标记）
    conflict_density_min: 1                 # 每章至少1个有效冲突点
    pacing_beat_required: true              # 节奏必须有起伏
    ending_cliffhanger_weight: 0.3          # 断章/悬念在总评分中的权重

report:
  format: json
  include_scores: true
  include_suggestions: true
  include_webnovel_metrics: true             # 输出网文专项指标
  output_dir: "./exports/reports/jury/"
