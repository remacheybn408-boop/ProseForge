# mental_state_presets.yaml v0.7.1 — 15 类精神状态关键词词库
# 每类含核心词、行为词、生理词、触发词，用于大纲自动扫描
# 题材权重：xianxia=1.5, urban=0.7, horror=1.3, history=1.0, default=1.0

抑郁症:
  keywords:
    core: [消沉, 悲观, 绝望, 虚无, 无意义, 厌倦, 空洞, 麻木, 低落, 沮丧, 无助, 迷茫, 孤独, 失去兴趣]
    action: [闭关不出, 放弃修炼, 自毁, 拒绝帮助, 不吃不喝, 沉默寡言, 独自发呆, 回避他人, 哭不出来, 以泪洗面]
    physical: [失眠, 嗜睡, 食欲减退, 暴食, 疲惫, 动作迟缓, 头痛, 胸闷, 消瘦, 早醒]
    triggers: [回忆, 失败, 失去, 离别, 被弃, 战败, 亡故, 被孤立, 压力, 创伤]

