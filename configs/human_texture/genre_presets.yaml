# genre_texture_presets.yaml v0.6.6 — 12 题材全覆盖
# 每题材含 quality 阈值 + pacing 规则
# 复合题材: --genre "修仙+爽文" 自动加权合并
# 弹性规则：数值越大要求越严，0-100 分制

# ═══════════════════════════════════════════════
# 1. 修仙 — 升级打怪、境界突破、修炼资源
# ═══════════════════════════════════════════════
xianxia:
  min_words: 1500
  max_words: 4200
  water_density_min: 65
  conflict_pressure_min: 70
  goal_progress_min: 70
  life_texture_min: 55
  cliche_sentence_max: 7
  emotion_summary_max: 8
  pacing:
    min_deltas: 3
    weighted_deltas:
      power_delta: 1.8
      conflict_delta: 1.5
      cost_delta: 1.3
      event_delta: 1.2
      hook_delta: 1.0
      decision_delta: 0.8
      relationship_delta: 0.5
      clue_delta: 0.4
    focus_deltas: [conflict_delta, power_delta, cost_delta, hook_delta]

# ═══════════════════════════════════════════════
# 2. 玄幻 — 大世界观、种族纷争、史诗冒险
# ═══════════════════════════════════════════════
xuanhuan:
  min_words: 1300
  water_density_min: 60
  conflict_pressure_min: 65
  life_texture_min: 50
  cliche_sentence_max: 8
  emotion_summary_max: 9
  pacing:
    min_deltas: 3
    weighted_deltas:
      event_delta: 1.8
      conflict_delta: 1.6
      power_delta: 1.4
      hook_delta: 1.2
      cost_delta: 1.0
      decision_delta: 0.9
      relationship_delta: 0.7
      clue_delta: 0.5
    focus_deltas: [event_delta, conflict_delta, power_delta, hook_delta]

# ═══════════════════════════════════════════════
# 3. 武侠 — 江湖恩怨、武学传承、侠义精神
# ═══════════════════════════════════════════════
wuxia:
  min_words: 1300
  water_density_min: 55
  conflict_pressure_min: 75
  life_texture_min: 65
  cliche_sentence_max: 6
  emotion_summary_max: 7
  pacing:
    min_deltas: 3
    weighted_deltas:
      conflict_delta: 2.0
      decision_delta: 1.5
      cost_delta: 1.4
      relationship_delta: 1.2
      event_delta: 1.1
      hook_delta: 1.0
      power_delta: 0.7
      clue_delta: 0.5
    focus_deltas: [conflict_delta, decision_delta, cost_delta, relationship_delta]

# ═══════════════════════════════════════════════
# 4. 都市 — 生活流、职场、日常人情
# ═══════════════════════════════════════════════
urban:
