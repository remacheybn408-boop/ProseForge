  pacing:
    min_deltas: 2
    weighted_deltas:
      relationship_delta: 1.6
      event_delta: 1.4
      decision_delta: 1.3
      hook_delta: 1.0
      conflict_delta: 0.8
      cost_delta: 0.6
      power_delta: 0.3
      clue_delta: 0.3
    focus_deltas: [relationship_delta, event_delta, decision_delta, hook_delta]

# ═══════════════════════════════════════════════
# 5. 都市异能 — 都市背景+超能力，双重要求
