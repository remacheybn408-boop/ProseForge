# ═══════════════════════════════════════════════
# mental_state 弹性阈值（v0.7.1）
# ═══════════════════════════════════════════════
mental_state:
  default:
    overplay_density_warn: 3      # 过度词/千字 WARN
    overplay_density_block: 8     # 过度词/千字 BLOCK
    deviation_tolerance: 2        # severity 偏差容忍度
    chapter_tracking_gap: 3       # 连续多少章无更新才 WARN
  xianxia:
    overplay_density_warn: 5
    overplay_density_block: 12
  xuanhuan:
    overplay_density_warn: 5
    overplay_density_block: 12
  wuxia:
    overplay_density_warn: 4
    overplay_density_block: 10
  urban:
    overplay_density_warn: 2
    overplay_density_block: 5
  urban_fantasy:
    overplay_density_warn: 3
    overplay_density_block: 8
  sci_fi:
    overplay_density_warn: 3
    overplay_density_block: 8
  post_apocalyptic:
    overplay_density_warn: 4
    overplay_density_block: 10
  suspense:
    overplay_density_warn: 3
    overplay_density_block: 8
  mystery:
    overplay_density_warn: 2
    overplay_density_block: 6
  horror:
    overplay_density_warn: 6
    overplay_density_block: 15
  history:
    overplay_density_warn: 3
    overplay_density_block: 8
  romance:
    overplay_density_warn: 2
    overplay_density_block: 5
