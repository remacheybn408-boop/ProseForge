# ============================================================
# Multi-Agent Review Board Configuration v0.6.5
# ============================================================
#
# Agent只审稿，不自动改正文。只输出报告，不覆盖原文。
# 每个Agent基于启发式规则(正则+规则)做检测，不调用外部LLM。
# ============================================================

# ── 全局设置 ──
enabled: true                  # 是否启用多Agent审稿系统
default_mode: light            # 默认模式: light (快速) | full (完整)
output_dir: reports/agent_reviews  # 报告输出目录
fail_on_error: false           # Agent 异常是否导致整体 FAIL

# ── Agent 配置 ──
# 每个Agent可以单独 enable/disable 和调整参数。
# 参数含义详见各Agent类的文档字符串。
agents:

  # ── 上下文承接Agent ──
  # 功能: 检查上一章结尾的动作/状态/钩子是否被本章承接
  # 检查项: 动作延续, 硬状态继承, 钩子承接, 真空续写检测
  context:
    enabled: true
    min_bridge_score: 4
    tail_lookback: 400

  # ── 角色口吻Agent ──
  voice:
    enabled: true
    max_narration_ai: 2
    max_memes: 1
    max_english: 2

  # ── 反AI腔Agent ──
  anti_ai:
    enabled: true
    max_not_a_b: 3
    max_cliches: 1
    min_paragraph_info: 30

  # ── 剧情推进Agent ──
  plot:
    enabled: true
    min_progress: 2
    min_conflicts: 1
    min_pleasure: 1
    tail_chars: 600

  # ── 连续性Agent ──
  continuity:
    enabled: true
    strict_items: true
    strict_states: true

  # ── 追读力Agent ──
  reader_pull:
    enabled: true
    min_hooks: 3
    min_payoffs: 0
    tail_chars: 500

  # ── 设定自洽Agent ──
  setting:
    enabled: true
    strict_physics: true
    strict_realm: true
    allow_cross_realm: false

  # ── 动作自然度Agent (新增 v0.6.5) ──
  body_action:
    enabled: true
    min_actions_per_500: 3
    max_standing_paras: 5

  # ── 潜台词Agent (新增 v0.6.5) ──
  subtext:
    enabled: true
    max_explicit: 5
    min_subtext: 3

  # ── 情绪递进Agent (新增 v0.6.5) ──
  emotion_curve:
    enabled: true
    min_buildup_per_burst: 1

  # ── 场景落地Agent (新增 v0.6.5) ──
  scene_grounding:
    enabled: true
    min_anchors: 8
    min_sensory: 3

  # ── 人物关系Agent (新增 v0.6.5) ──
  relationship:
    enabled: true
    min_changes: 3

  # ── 生活细节Agent (新增 v0.6.5) ──
  mundane_detail:
    enabled: true
    min_mundane: 5
    max_abstract: 3

  # ── 节奏呼吸Agent (新增 v0.6.5) ──
  pacing_breath:
    enabled: true

  # ── 代价后果Agent (新增 v0.6.5) ──
  consequence:
    enabled: true
    min_cost: 3

  # ── 段落质感Agent (新增 v0.6.5) ──
  paragraph_texture:
    enabled: true

  # ── 承诺兑现Agent (新增 v0.6.5) ──
  promise_payoff:
    enabled: true
    min_payoffs: 1

  # ── 主编汇总 ──
  chief_editor:
    enabled: true
    dedup_threshold: 0.6
    must_fix_threshold: 70

# ── 调度设置 ──
orchestration:
  strategy: sequential          # 执行策略: sequential (顺序) | parallel (并行,未来)
  timeout_per_agent: 30         # 单个Agent超时时间(秒), 0=不限制
  fail_fast: false              # 遇FAIL是否立即停止后续Agent
  report_format: json           # 报告格式: json | jsonl

# ── 模式定义 ──
modes:
  light:
    agents: [context, voice, anti_ai, plot, body_action, scene_grounding]
    description: "快速审稿模式 — 6个Agent (含主编汇总)。适合日常快速检查。"
  full:
    agents: [context, voice, anti_ai, plot, continuity, reader_pull, setting, body_action, subtext, emotion_curve, scene_grounding, relationship, mundane_detail, pacing_breath, consequence, paragraph_texture, promise_payoff]
    description: "完整审稿模式 — 18个Agent (含主编汇总)。适合发布前全面检查。"
