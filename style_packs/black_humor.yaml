style_id: black_humor
name: 黑色幽默
description: 用讽刺态度看待荒诞世界，在痛苦、失败和荒诞中产生笑的写作风格。
narrative_features:
  - 荒诞反差制造笑点
  - 严肃与滑稽并存
  - 悲剧事件以冷幽默呈现
  - 人物对痛苦有不正常的从容
language_features:
  - 冷静叙述荒诞事件
  - 反差性比喻
  - 轻描淡写严重事件
  - 冷嘲热讽的旁白
rhythm_features:
  - 荒诞揭示后短暂停顿
  - 严肃场景中插入反差
allowed_patterns:
  - 荒诞反差
  - 冷幽默
  - 讽刺
  - 悲喜交错
  - 人物嘴硬
forbidden_patterns:
  - 纯搞笑不黑色
  - 只靠网络梗
  - 严肃死亡场景硬抖包袱
  - 荒诞没有因果
agent_focus:
  - 幽默是否来自荒诞而非网络梗
  - 黑色是否与痛苦并存
review_questions:
  - 本章笑点是否来自情境荒诞？
  - 是否有严肃场景被不当搞笑破坏？
  - 幽默是否服务于人物和主题？