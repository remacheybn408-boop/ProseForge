style_id: danmei
name: 耽美
description: 以男性之间的情感关系为核心的创作风格，强调情感递进与人物成长。
narrative_features:
  - 情感关系是叙事核心
  - 双方人物独立有主体性
  - 关系张力来自性格和处境
  - 情感成长伴随情节推进
language_features:
  - 情感描写细腻
  - 避免标签化形容
  - 亲密场景尊重人物边界
rhythm_features:
  - 情感场景节奏放缓
  - 冲突场景节奏加快
allowed_patterns:
  - 情感递进式发展
  - 双方视角交替
  - 细节暗示情感变化
forbidden_patterns:
  - 角色写成刻板标签
  - 一方完全被动
  - 感情无递进
  - 工具人配角强行助攻
agent_focus:
  - 双方主体性是否平衡
  - 情感递进是否自然
  - 是否有标签化风险
review_questions:
  - 本章两人关系是否有实质推进？
  - 双方是否有独立动机和选择？
  - 情感描写是否具体而非抽象？