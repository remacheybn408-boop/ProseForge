style_id: baihe
name: 百合
description: 以女性之间的情感关系为核心的创作风格，强调人物独立与关系递进。
narrative_features:
  - 人物独立且丰满
  - 情感递进有层次
  - 关系发展有现实或内在阻力
  - 亲密关系尊重角色边界
language_features:
  - 情感描写克制而细腻
  - 避免性别刻板印象
rhythm_features:
  - 情感积累段落舒缓
  - 关系转折段落紧凑
allowed_patterns:
  - 渐进式情感发展
  - 女性友谊与爱情的边界探索
  - 通过共同经历建立羁绊
forbidden_patterns:
  - 一方完全被动依赖
  - 情感设定后无发展
  - 人物扁平化
agent_focus:
  - 双方人物是否独立
  - 情感是否递进
  - 关系阻力是否真实
review_questions:
  - 本章人物是否有独立于感情线的行为？
  - 情感推进是否有具体事件支撑？
  - 关系中的阻力是否合理？