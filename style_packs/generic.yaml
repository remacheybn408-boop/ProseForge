style_id: generic
name: 通用风格
description: 无特定风格偏好，以自然流畅的叙述为基准。
narrative_features:
  - 主线清晰，因果关系明确
  - 人物行为有合理动机
  - 场景描写服务于剧情推进
  - 节奏均匀，不忽快忽慢
language_features:
  - 语言自然不做作
  - 描写具体而非堆砌形容词
  - 对话符合人物身份
  - 叙述视角稳定
rhythm_features:
  - 段落长短有变化
  - 紧张场景句子短促
  - 描写场景句子舒展
allowed_patterns:
  - 线性叙述
  - 多视角切换
  - 倒叙和插叙
  - 内心独白适度使用
forbidden_patterns:
  - 过度解释设定
  - 模板化套路
  - 无意义水文
  - 空泛形容词堆砌
agent_focus:
  - 语言是否自然
  - 节奏是否稳定
  - 是否过度解释
  - 是否模板化
review_questions:
  - 本章语言是否自然流畅？
  - 节奏是否有明显忽快忽慢？
  - 是否有不必要的设定解释？
  - 描写是否有具体细节？