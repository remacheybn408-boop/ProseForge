style_id: postmodern
name: 后现代
description: 打破传统叙事惯例，可能包含元叙事、拼贴、非线性结构等实验性手法。
narrative_features:
  - 元叙事：叙述者自我意识
  - 非线性或碎片化结构
  - 拼贴不同文本类型
  - 叙述者可能不可靠
language_features:
  - 文体混合
  - 直接对读者说话
  - 引文和注释
  - 风格跳跃
rhythm_features:
  - 结构可随主题变化
allowed_patterns:
  - 元叙事
  - 非线性结构
  - 拼贴文本
  - 叙述者不可靠
  - 打破第四面墙
forbidden_patterns:
  - 为打破而打破
  - 彻底没有主线
  - 只有形式没有情感
  - 用后现代掩盖逻辑漏洞
agent_focus:
  - 实验手法是否有叙事目的
  - 是否仍有可追踪的主线
review_questions:
  - 本章实验性手法是否有叙事意义？
  - 读者是否仍能追踪基本信息？
  - 形式是否压倒了情感？