name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Ruff in Docker
        run: docker compose -f compose.yaml -f compose.test.yaml run --rm api-test ruff check proseforge tests
      - name: Check formatting boundaries
        run: git diff --check

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose topology
        run: docker compose -f compose.yaml -f compose.test.yaml config --quiet

      - name: Build Docker test images
        run: docker compose -f compose.yaml -f compose.test.yaml build legacy-test api-test contract-test migration-test recovery-test web-test

      - name: Run legacy regression suite in Docker
        run: docker compose -f compose.yaml -f compose.test.yaml run --rm legacy-test

      - name: Run API and contract suites in Docker
        run: docker compose -f compose.yaml -f compose.test.yaml run --rm api-test && docker compose -f compose.yaml -f compose.test.yaml run --rm contract-test

      - name: Run migration and recovery suites in Docker
        run: docker compose -f compose.yaml -f compose.test.yaml run --rm migration-test && docker compose -f compose.yaml -f compose.test.yaml run --rm recovery-test

      - name: Run frontend tests and build in Docker
        run: docker compose -f compose.yaml -f compose.test.yaml run --rm web-test

      - name: Build production services
        run: docker compose -f compose.yaml build api worker scheduler web

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proseforge-test-reports
          path: artifacts/
          if-no-files-found: ignore

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API and web images for E2E
        run: docker compose -f compose.yaml -f compose.test.yaml build api web

      - name: Run Playwright E2E in Docker
        run: |
          docker compose -f compose.yaml -f compose.test.yaml up -d --wait postgres redis api web
          docker compose -f compose.yaml -f compose.test.yaml run --rm e2e

      - name: Tear down E2E stack
        if: always()
        run: docker compose -f compose.yaml -f compose.test.yaml down -v

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit Python dependencies in Docker
        run: docker compose -f compose.yaml -f compose.test.yaml run --rm api-test sh -lc "python -m pip install --no-cache-dir pip-audit && pip-audit"
      - name: Audit frontend dependencies in Docker
        run: docker compose -f compose.yaml -f compose.test.yaml run --rm web-test sh -lc "corepack enable && pnpm audit --audit-level high"

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan source filesystem with Trivy
        # trivy-action / setup-trivy 于 2026-03 遭供应链攻击（CVE-2026-33634，76/77 个 tag 被强推为窃密代码），
        # 且原固定的 0.33.1 版本不存在。弃用 GitHub Action，改为直跑官方容器镜像，
        # 钉攻击窗口前的 0.69.3 并锁定 digest；上游信任恢复前不得改回 trivy-action/setup-trivy。
        run: |
          mkdir -p artifacts
          docker run --rm -v "$PWD:/src" aquasec/trivy:0.69.3@sha256:7228e304ae0f610a1fad937baa463598cadac0c2ac4027cc68f3a8b997115689 \
            fs --format sarif -o /src/artifacts/trivy-fs.sarif --severity HIGH,CRITICAL --ignore-unfixed /src
      - name: Scan repository history with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: artifacts/proseforge-sbom.cdx.json
      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proseforge-security-reports
          path: artifacts/
          if-no-files-found: ignore
