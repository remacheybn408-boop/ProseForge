# ============================================================
# 都市小说体裁规则包
# ============================================================
genre_id: urban
name: 都市
description: >
  都市小说体裁规则包，涵盖都市生活、职场商战、都市情感、社会现实等子类型。
  核心要素包括现代城市背景、社会阶层冲突、人际关系网络、职场竞争和个人成长。
  此类作品的读者对人物真实感、社会细节可信度和情感共鸣有极高要求。

core_promises:
  - "人物行为受现实社会规则约束——法律、经济、职场等级、社会舆论都是真实的制约力"
  - "都市环境描写有可辨识的地域感和时代感，不悬浮于真空城市"
  - "人际关系网络复杂而真实——每个人都带有自己的利益和社会位置"
  - "主角的成长有可量化的阶段标志（职位晋升、资产增长、技能提升等）"
  - "冲突建立在现实社会矛盾基础上，非架空设定"
  - "情感线有现实的情感逻辑支撑，不依靠超自然力量推进"

reader_expectations:
  - "开篇建立清晰的时代背景和城市定位（一线/二线/县城/海外等）"
  - "主角的职业/身份在第1章明确，读者能快速理解其社会处境"
  - "社会阶层的细节真实——收入、住房、交通、消费等与角色身份匹配"
  - "人际关系有现实的利益交织，非纯粹的情感驱动"
  - "女性角色的职业和社会身份独立于感情线"
  - "每30-50章有一个明显的职业/事业阶段性变化"

common_conflicts:
  - "职场竞争：晋升机会争夺、派系斗争、行业洗牌"
  - "阶层冲突：贫富差距、身份歧视、社会流动性困境"
  - "利益与道德的博弈：商业利益vs个人底线、灰色地带的抉择"
  - "家庭压力：催婚、买房、赡养、代际价值观冲突"
  - "情感与现实：爱情vs物质基础、理想vs生活压力"

chapter_rhythm:
  pace: "日常章节节奏贴近生活流，以事件密度维持可读性——每章至少有一个小转折（信息/决定/冲突）。职场章节加快节奏，用短对话和具体工作细节增强真实感。情感高潮章节放慢节奏，给读者情绪代入空间。"
  hook_placement: "都市最强的钩子是利益悬念——一笔交易的成败、一个职位的结果、一个秘密的曝光。其次是人际关系悬念——误会的澄清、表白的回应、背叛的揭露。避免滥用'突然接到一个电话'式廉价钩子。"
  climax_pattern: "都市卷高潮通常为重大职业事件（上市/合并/晋升/创业成败）或情感决断（求婚/分手/真相揭露）。高潮前需积累3-5章的压力升级——来自多方（对手/环境/亲人）的挤压。结局依赖主角的社会智慧和人际积累。"

character_archetypes:
  - name: "奋斗型主角"
    traits: "有明确的职业目标或财富追求。能力不完美但有成长决心。面临现实压力（房贷/家庭/竞争）。"
    checks: "主角的专业能力是否在其社会层级内可信？成长的代价是否真实？"
  - name: "职场对手"
    traits: "有能力且有自己的职场逻辑。与主角的利益冲突原因清晰可理解。手段高明但不降智。"
    checks: "对手的动机是否超出'纯粹的恶意'？其行为是否符合其自身利益？"
  - name: "职场导师/贵人"
    traits: "有真实的社会资源和经验。帮助主角但有自己的考量和边界。可能在关键时刻让主角失望。"
    checks: "导师的帮助是否掩盖了主角的主动性？导师自身是否有独立的目标线？"
  - name: "都市女性角色"
    traits: "有独立职业和社会身份。情感选择有自身逻辑。不依附于男性角色存在。"
    checks: "女性角色的职业线是否独立于情感线？其决策是否由自身目标驱动？"
  - name: "家庭压力源"
    traits: "代表传统期待和现实束缚。有其自身的价值观逻辑（非纯粹负面）。在关键节点影响主角决策。"
    checks: "家庭压力是否推动了角色的深度成长？压力是否被具体化（而非泛泛的'家人不理解'）？"

worldbuilding_checks:
  - "城市描写是否有具体地标/街道/商业区，而非'某座大城市'式模糊处理？"
  - "时间线的科技/流行文化参照是否与设定的时代一致？（如2010年不会出现短视频时代特征）"
  - "收入-支出是否合理？角色的消费水平是否与其职业收入匹配？"
  - "行业细节是否准确？（如金融/互联网/医疗等行业应有对应的术语和操作逻辑）"
  - "社会规则是否一致？（如法律后果、舆论影响在不同情节中的表现应合理）"
  - "公司/组织的内部结构是否清晰且被遵守？"

plot_checks:
  - "主角的成功是否建立在自身能力和选择之上，而非纯运气/贵人包办？"
  - "每次职业晋升/财富增长是否有对应的代价或努力过程？"
  - "商业/职场情节是否有合理的专业逻辑支持？（非'签了个合同就翻身了'式童话）"
  - "情感线的进展是否有具体事件推动？（非'两人对视一眼就爱上了'式跳跃）"
  - "是否存在为推进情节而强行降智的配角？"
  - "社会矛盾的呈现是否有复杂性和灰度（非简单的善恶对立）？"

continuity_checks:
  - "角色的职位/收入/资产状态在各章是否一致？"
  - "人际关系的变化是否有合理的积累过程？"
  - "公司/组织的内部权力关系是否前后一致？"
  - "时间线：工作项目/事件的推进速度是否现实？"
  - "角色的年龄/人生阶段与其行为是否匹配？"

genre_specific_guards:
  - "防'都市童话'：主角不能靠一两个贵人/巧合就完成阶层跃迁——每次上升都需要具体努力"
  - "防'职场过家家'：商业决策应有真实的风险和代价，不能每次都化险为夷"
  - "防'女性角色扁平化'：每个女性角色应有独立于感情线的职业/生活目标"
  - "防'金钱失实'：收入、房价、消费水平应与故事设定的城市和时代匹配"
  - "防'行业常识错误'：涉及具体行业时确保基本术语和流程正确"
  - "防'社会矛盾的简化'：不将复杂社会问题简化为个人善恶"

forbidden_patterns:
  - pattern: "总裁/豪门无逻辑宠爱"
    reason: "富人对普通人的无条件宠爱缺乏现实逻辑，是'玛丽苏'都市变体"
  - pattern: "所有冲突靠钱解决"
    reason: "如果主角（或贵人）的无限财力能化解一切危机，则故事失去戏剧张力"
  - pattern: "女性角色全员恋爱脑"
    reason: "都市背景下的女性应有独立职业和社会追求，不能全部围绕男性运转"
  - pattern: "商业情节无专业基础"
    reason: "上市/收购/创业等重大商业事件需要基本的商业逻辑，否则丧失可信度"
  - pattern: "阶层穿越式悬浮"
    reason: "穷人的思维和行为模式不能是富人的降级复制——阶层差异应体现在细节中"
  - pattern: "职场竞争降级为个人恩怨"
    reason: "真正的职场冲突大多源于利益和立场差异，而非单纯的'他讨厌我'"

reader_pull_rules:
  - "都市读者关注'代入感'——角色的社会压力和生活困境要让读者感到'这就是我'"
  - "职业晋升/财富增长的具体数字是爽点（如'月薪从5K到50K'），但需要真实的过程支撑"
  - "人际关系中的'人情世故'是都市读者的核心爽点——展示社会智慧的魅力"
  - "社会阶层流动的'可能性'是都市题材的核心吸引力——让读者看到向上的路径"
  - "每章的钩子最好与现实利益相关（钱/职位/机会/秘密），比抽象情感钩子更强"

outline_validation_rules:
  - "主角的职业成长线是否在大纲中清晰可追踪？每个阶段标志是否具体？"
  - "是否有明确的社会阶层地图？各角色的社会位置和相互关系是否标定？"
  - "商业/职场大事件的时间线是否与现实逻辑一致？"
  - "情感线的节奏是否与职业线交错推进？避免一整段全是职场另一整段全是感情"
  - "反派的行动线是否建立在合理的利益动机上？"

agent_focus:
  - focus: "社会细节可信度"
    detail: "核查收入、职位、消费、住房等社会指标是否与角色身份和故事设定一致"
  - focus: "职业线完整性"
    detail: "追踪主角职业发展的每个阶段，确认每次晋升/变化都有过程支撑"
  - focus: "女性角色独立性"
    detail: "检查每个女性角色的职业/生活线是否独立于感情线"
  - focus: "利益冲突合理性"
    detail: "分析冲突驱动力是否建立在真实利益基础上而非个人好恶"
  - focus: "都市感营造"
    detail: "检查场景描写是否有具体的城市细节（交通/消费/社交方式等）"

review_questions:
  - "你笔下的城市有可辨识的'城市性格'吗？读者能感觉到这是上海/北京/广州还是某个具体县城？"
  - "主角的社会阶层跃迁路径是否可信？如果你是读者，你会相信这个成长故事吗？"
  - "所有配角的职业和社会身份是否清晰？有没有'无业游民却衣食无忧'的角色？"
  - "商业/职场情节能否经受行业内读者的检验？最薄弱的情节漏洞在哪里？"
  - "女性角色如果删掉感情线，她们还剩下什么？"
  - "这个故事对当下社会现实的观察是否有独特的角度？还是用了通用的'都市背景板'？"
