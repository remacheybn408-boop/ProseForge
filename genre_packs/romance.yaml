genre_id: romance
name: 言情 / 爱情
description: 以情感关系为核心驱动力的叙事类型，关注人物之间的爱情发展、关系张力和情感成长。
core_promises:
  - 情感递进与关系发展
  - 人物因爱情而成长或变化
  - 关系中的张力、误会与和解
  - 有真实感的亲密关系描写
reader_expectations:
  - 能看到双方感情逐步递进
  - 关系冲突来自人物性格而非外力
  - 情感场景有细节支撑
  - 结局有情感满足
common_conflicts:
  - 身份地位差距
  - 过去创伤影响当前关系
  - 价值观或人生目标分歧
  - 第三方介入考验信任
chapter_rhythm:
  pace: 中慢速，情感场景细腻，冲突场景提速
  hook_placement: 每章结尾留情感悬念或关系变化苗头
  climax_pattern: 情感高潮与和解交替
character_archetypes:
  - 内敛型主角：不善表达但行动见真心
  - 主动型主角：坦率追求但可能忽略对方感受
  - 阻碍型配角：非反派但立场与主角冲突
  - 助攻型配角：帮助主角看清自己内心
worldbuilding_checks:
  - 时代背景是否影响关系模式
  - 社会环境对亲密关系的态度是否一致
  - 家庭/社群压力是否合理
plot_checks:
  - 每次关系推进是否有事件支撑
  - 误会是否有合理起因而非单纯不说话
  - 冲突是否来自人物性格和选择
  - 和解是否有足够铺垫
continuity_checks:
  - 情感状态是否稳定递进
  - 人物对关系的态度是否前后一致
  - 过去事件对感情的影响是否持续
genre_specific_guards:
  - 情感递进检测：检查章节间关系变化是否自然
  - 工具人检测：配角是否有独立动机
  - 情绪模板检测：心理描写是否过度重复
forbidden_patterns:
  - 一见钟情后无后续递进
  - 误会靠不沟通硬拖剧情
  - 霸总/圣母等标签化人物
  - 工具人配角只为助攻存在
  - 只写心动感受不写选择与代价
reader_pull_rules:
  - 每章结尾留关系变化的苗头或隐忧
  - 重要情感场景前做好铺垫
  - 读者需要关心双方能否在一起
outline_validation_rules:
  - 感情线必须有完整的起承转合
  - 关键关系转折点必须明确标注
  - 次要感情线不能喧宾夺主
agent_focus:
  - 感情线递进是否自然
  - 双方人物是否有独立主体性
  - 冲突是否源于人物而非作者安排
  - 情感描写是否具体而非模板化
review_questions:
  - 本章感情是否有实质推进？
  - 双方的动机是否能被读者理解？
  - 冲突是否来自人物的真实选择？
  - 配角是否有脱离主角的独立行为？
  - 情绪描写是否有具体细节而非泛泛形容词？
