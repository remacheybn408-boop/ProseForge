# ============================================================
# 武侠小说体裁规则包
# ============================================================
genre_id: wuxia
name: 武侠小说
description: >
  武侠小说体裁规则包，涵盖传统武侠、新派武侠、大陆新武侠、江湖悬疑武侠、侠义探案等
  子类型。核心要素包括武功体系设定、内力/真气修为、江湖势力格局、侠义精神内核、
  师承门派传承、兵器与武学典籍、正邪之辨等。武侠是华语文学独有的成熟类型，承载着
  "侠之大者，为国为民"的精神传统，同时也要面对金庸古龙等巨匠建立的极高审美标准。
  此类作品对武功体系的独创性、江湖世界的真实感和侠义精神的当代诠释有核心要求。

# ---- 核心承诺 ----
core_promises:
  - "武功体系完整自洽——各门派武学有清晰的特点、克制关系和修习逻辑"
  - "内力/真气的设定有规则——来源、修炼方式、消耗和恢复有章可循"
  - "江湖不是法外之地的简单化——有江湖规矩、武林盟约、黑白两道的潜规则"
  - "侠义精神在故事中通过角色的选择和牺牲被具体呈现，而非空洞的口号"
  - "打斗场面兼具技术性（招式的逻辑和变化）和文学性（意境和气氛）"
  - "人物武学成长的每一步都有合理的修炼过程和代价"

# ---- 读者期待 ----
reader_expectations:
  - "前3章建立江湖世界的基本规则——通过人物对话或事件暗示当前的武林格局和规则"
  - "主角的武功起点和成长路径在前期明示——纯新手/家传武学/奇遇所得等"
  - "打斗场面每3-5章至少出现一次——武侠读者对'武'的要求是持续的"
  - "武功与人物性格有关联——什么性格的人练什么类型的武功"
  - "正邪对立不是简单的好坏二分——邪派人物有魅力，正派人物有缺陷"
  - "对经典武侠元素的尊重——即使创新，也要对师承、门派、江湖礼仪等有基本展现"

# ---- 常见冲突 ----
common_conflicts:
  - "正邪之争：武林正道与魔教/邪派的世代恩怨——武侠最经典的冲突框架"
  - "门派恩怨：华山vs嵩山、武当vs少林式的门派政治博弈"
  - "武林秘籍/神兵争夺：对绝学/宝物的争夺引发的江湖血雨腥风"
  - "侠之大者vs个人恩怨：家国大义与私人仇恨的两难"
  - "师门vs个人选择：师命与人情、门规与正义的冲突"
  - "归隐vs入世：厌倦江湖杀戮却不得不重出江湖的矛盾"
  - "武学突破vs走火入魔：内力修习的内在冲突——武侠特有的身心二元冲突"

# ---- 章节节奏 ----
chapter_rhythm:
  pace: "武侠小说节奏张弛有度——武斗场面快、文戏缓。建议每3-5章安排一场有分量的打斗。重大对决（如光明顶之战、紫禁之巅）前应有3-5章的铺垫期，积累仇恨、展示双方准备、渲染决战氛围。情感/文戏部分虽然节奏可缓，但不能超过连续2章无动作场景。"
  hook_placement: "武侠最强钩子——'对决型钩子'：两大高手即将交手，章末停在出手前的一瞬。其次——'奇遇型钩子'：主角在绝境中发现前人遗留的武功秘籍/神兵。再次——'身份揭示型钩子'：某人的真实身份/师承被揭露，颠覆既有认知。还有'江湖传闻型钩子'：一件江湖大事的消息传到，打破当下的平静。"
  climax_pattern: "武侠的高潮通常是全书最重要的对决。这场对决不仅是武功的比拼——更是两种武学理念、两种人生选择、两种侠义观的碰撞。对决前的铺垫要让人物的情感积累达到最大值。对决过程要有层次——不是一招定胜负，而是有试探、相持、转折、决胜的完整节拍。对决后应有余韵——胜利的代价、对手的尊严、江湖的新格局。"

# ---- 角色原型 ----
character_archetypes:
  - name: "少年侠客"
    traits: "初入江湖，身负血仇或使命。武学天赋与性格缺憾并存。在江湖历练中领悟真正的侠义。"
    checks: "主角的武学成长速度是否合理？（不能一个月从入门到绝顶）每次奇遇之后是否有对应的磨炼期？"
  - name: "绝世高手/隐世宗师"
    traits: "武功已臻化境但因故隐退。有未了的心愿或愧疚。点拨主角但不越俎代庖。"
    checks: "宗师为何不出手直接解决危机？其不出手的理由是否足够合理且有情感深度？"
  - name: "红颜知己/江湖侠女"
    traits: "武功不弱，性格独立。与主角的情感线是知己式的惺惺相惜而非依附。在关键情节中有不可替代的作用。"
    checks: "侠女是否有独立于主角的江湖地位和人际关系？其武功和智慧是否在情节中有实际作用？"
  - name: "亦正亦邪的对手"
    traits: "武功与主角在伯仲之间。有自己的行事准则和悲剧过往。与主角既是对手又互敬互重。"
    checks: "对手的行事准则是否始终如一？其与主角的关系演变是否有足够的情感事件支撑？"
  - name: "江湖名宿/门派掌门"
    traits: "代表武林旧秩序。可能是正面形象也可能有阴暗面。在江湖格局变动中面临选择。"
    checks: "掌门的决策是否反映了其门派的利益和价值观？是否有'政治人物'的复杂性？"

# ---- 世界观检查 ----
worldbuilding_checks:
  - "武功体系是否分层级？不同层级的战力差距是否有明确尺度？"
  - "主要门派是否有独特的武学风格、门规和文化传统（不止一个名字）？"
  - "江湖的势力版图是否清晰——哪个门派势力最强？哪些是盟友/敌对？"
  - "兵器谱/神兵设定是否有稀缺性和传奇性（不是人手一把神兵）？"
  - "江湖规矩是否一致——'武林规矩'不能只在需要时出现"
  - "官府与江湖的关系是否有合理的设定（互不干涉/相互利用/朝廷控制武林）？"

# ---- 情节检查 ----
plot_checks:
  - "主角武功成长曲线是否合理？每次突破是否有对应的修炼/战斗经历？"
  - "奇遇频率是否过高？——50章内超过3次重大奇遇需审查"
  - "打斗逻辑：每次对决的胜负是否在既有的武功体系内有合理解释？"
  - "师门传承线是否清楚？——主角的武功来源和师承谱系是否可追溯？"
  - "江湖传闻的信息传播速度和范围是否合理（没有手机的时代消息是如何传播的）？"
  - "是否既有'武'的精彩，也有'侠'的重量？——打斗之外，侠义精神是否在情节中体现？"

# ---- 连续性检查 ----
continuity_checks:
  - "内力修为的一致性：主角的内力水平在同一阶段不能忽高忽低"
  - "武功招式名称和效果：同一招式在不同场景的效果描述是否一致？"
  - "伤势恢复逻辑：武侠中的内外伤应有合理的恢复时间——不能今天被打成重伤，明天又生龙活虎"
  - "人物武功排名：江湖中人的武功高低排序是否在全文保持一致（除非有人突破）？"
  - "门派地理位置：各门派所在位置和之间的距离/旅行时间是否一致？"

# ---- 类型特定防护 ----
genre_specific_guards:
  - "防武功通货膨胀：建立武功等级基准——标记主角实力增长过快（如30章内从入门到一流）的段落"
  - "防奇遇堆砌：连续获得奇遇（秘籍+神兵+灵药+高人传功）而中间无磨炼期——奇遇不应是武功增长的唯一方式"
  - "防侠义口号化：标记所有'为了正义'类型但没有具体代价展示的情节——侠义必须是具体的牺牲而非口头宣称"
  - "防正邪二分简单化：正面角色应有道德瑕疵或判断失误，反面角色应有可理解的行为逻辑"
  - "防武功万能化：内力不应成为万能解题工具——不能有'用内力就可以做到任何事'的描写"
  - "防对经典套路无创新复刻：在向金古梁温致敬的同时需有自己的创新——纯粹的仿写难以满足当代武侠读者"

# ---- 禁用模式 ----
forbidden_patterns:
  - pattern: "跳崖必得奇遇"
    reason: "武侠小说最被滥用的套路之一——除非有极其新颖的处理，否则读者会产生强烈厌倦"
  - pattern: "主角武功全凭吃药/传功无自我修炼"
    reason: "消耗了武侠'一分耕耘一分收获'的核心魅力——武学的尊严来自苦修"
  - pattern: "内力可以解决一切（疗伤/解毒/取暖/照明……）"
    reason: "使内力沦为万能工具，丧失武学体系的严谨性"
  - pattern: "反派全员脸谱化邪恶"
    reason: "武侠的精髓之一就是正邪之辨的复杂性——过于简单的善恶二分不符合武侠传统的深度"
  - pattern: "打斗完全以'噼里啪啦/电光火石'等空洞词填充"
    reason: "武侠读者对打斗描写的技术含量要求很高——缺乏招式逻辑的打斗是类型失格"
  - pattern: "所有女性角色最终都爱上主角"
    reason: "即使在过去的武侠经典中这也被诟病——当代武侠对女性角色的塑造应有更高标准"

# ---- 读者吸引力法则 ----
reader_pull_rules:
  - "招式名称是武侠的独特魅力——好的招式名既优美又能体现武功特点，需认真设计"
  - "江湖传闻/武林大会/兵器谱排名是天然的信息释放和期待设置工具"
  - "高手之间的对峙即使不打也有极强的张力——充分利用'武'之外的气势和意境描写"
  - "武侠读者的情怀在于'侠'——当角色为了侠义做出真正的牺牲时，是全书最强的情感共鸣点"
  - "对经典武侠元素的致敬和创新并重——读者想看到熟悉的江湖味道，但也期待新的配方"

# ---- 大纲验证规则 ----
outline_validation_rules:
  - "是否有完整的武功体系图——包括层级、各门派武学特点和相克关系？"
  - "主角的武学成长路线图是否合理——每个阶段的修炼内容、突破契机和实力定位？"
  - "是否有江湖势力关系网——门派间的盟友/敌对/中立关系及其变化节点？"
  - "所有重要对决是否有对应的铺垫计划——情感积累和武学逻辑的双重准备？"
  - "是否有'侠义弧线'标注——主角的侠义观念如何在故事中演变和深化？"

# ---- 智能体审查聚焦点 ----
agent_focus:
  focus: "武功体系一致性"
  detail: "建立武学层级对照表，检查所有对决中表现的战力是否与角色武功等级一致"
  focus: "奇遇频率与质量"
  detail: "统计奇遇间隔，评估每次奇遇的独特性和必要性，标记奇遇堆砌段落"
  focus: "打斗描写质量"
  detail: "检查打斗场景的招式逻辑、节奏变化和文学性，标记纯套话式打斗"
  focus: "侠义精神具象化"
  detail: "追踪角色践行侠义精神的具体行为及其代价，标记空洞口号式侠义"
  focus: "门派世界构建"
  detail: "评估各门派的独特性、历史感和内部逻辑，标记套壳式门派设定"

# ---- 审查提问 ----
review_questions:
  - "如果去掉所有的奇遇，主角凭借自身的修炼能达到现在的武功水平吗？"
  - "读者能否清晰地说出三个以上主要门派各自的武学特点和门派文化？"
  - "全书最精彩的一场对决是什么？其精彩之处在于招式的精妙还是情感的重力？"
  - "反派中是否有至少一个人物让读者感到'可惜'或'如果……也许……'？"
  - "主角在整部作品中为'侠义'付出了什么具体的代价？如果没有，侠义就是空谈。"
  - "打斗描写中是否存在连续三场以上的战斗在模式上高度雷同？"
  - "这个江湖世界有哪怕一个设定让读者觉得'这个以前没见过'？"
