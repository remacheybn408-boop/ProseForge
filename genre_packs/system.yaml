# ============================================================
# 系统流小说体裁规则包
# ============================================================
genre_id: system
name: 系统流
description: >
  系统流小说体裁规则包，涵盖主角获得游戏化/数字化系统辅助的小说类型。
  核心要素包括系统本身的规则设计、任务-奖励循环、数值化成长和系统与
  主角自主意志的博弈。此类作品的核心爽点来自'量化成长'的可视化快感和
  '利用系统规则创造优势'的智力满足感。

core_promises:
  - "系统规则清晰且一经建立不随意更改——系统的边界和限制是故事的基础契约"
  - "系统奖励需要主角通过真实努力和风险获得——不能无代价赠送能力"
  - "系统的存在有合理的世界观解释——不是简单的'反正就是有'"
  - "主角对系统有理解-利用-超越的成长曲线——而非始终被系统牵着走"
  - "数值化成长对应实际的战力/能力变化——数字不是替代描写的捷径"
  - "系统的限制始终与奖励同等重要——每次使用系统能力都有对应的代价或冷却"

reader_expectations:
  - "系统的基本界面/规则在前3章内被展示"
  - "第一个任务-完成-奖励循环在5章内完成"
  - "面板/数值更新有规律但不过度频繁——每次更新对应实质性的事件"
  - "系统功能有渐进解锁——而非开局满功能"
  - "存在系统无法解决或甚至制造麻烦的情况"
  - "系统的来源/目的在故事中后期有揭示或强暗示"

common_conflicts:
  - "任务难度升级：系统任务的要求逐渐超出主角当前能力"
  - "系统束缚vs自由意志：系统要求的任务可能违背主角的道德或意愿"
  - "多系统持有者的竞争：主角不是唯一拥有系统的人"
  - "系统规则漏洞：发现并利用系统规则中的灰色地带"
  - "系统与现实的冲突：系统的逻辑有时与真实世界的情感和复杂性不可调和"

chapter_rhythm:
  pace: "任务接取-执行-完成-奖励的循环是基本节奏单元。小任务2-3章一个周期，大任务/副本5-10章。在任务执行过程中节奏加快，以展示主角应对挑战的过程。奖励获取后适度放缓——让读者享受收获感。数值更新可作为章节收束的手段。"
  hook_placement: "系统流的最强钩子是'新任务发布'和'即将获取的奖励'——让读者想知道下一个任务是什么、奖励有多强。其次是'系统新功能解锁'——探索系统新能力的好奇心。再次是'面板数值的临界突破'——距升级只差一点。最后是'系统来源线索'——关于系统真正目的的碎片信息。"
  climax_pattern: "卷高潮通常为高难度任务/副本的完成——以及伴随的重大奖励。全书高潮通常是系统来源真相的揭露——主角最终选择接受/拒绝/超越系统。最终胜利应来自主角对系统规则的理解和利用而不仅仅是系统给予的力量。"

character_archetypes:
  - name: "系统持有者主角"
    traits: "获得系统的普通人或在某一领域有基础。必须学习和理解系统规则。在'系统指令'和'个人意志'间寻求平衡。"
    checks: "主角是否有独立于系统的成长（技能/心智/人际关系）？系统失灵时主角还能发挥多少？"
  - name: "系统引导者/AI助手"
    traits: "系统内置的引导角色（如系统精灵/AI）。有预设的行为框架但也有可能产生类人性的发展。"
    checks: "引导者的个性是否始终一致？其是否存在隐藏目标？对主角的情感是否有变化？"
  - name: "非系统强者"
    traits: "没有系统的本地强者。依靠自身努力和天赋取得实力。对系统持有者的态度可能是质疑/不屑/好奇。"
    checks: "非系统强者的成就过程是否被充分展示？他们是否证明了'没有系统照样强大'？"
  - name: "敌对系统持有者"
    traits: "拥有不同系统或同系统不同路线的竞争者。有不同于主角的目标和系统使用方式。"
    checks: "敌对系统的规则是否与主角系统形成有意义的对照？其使用者是否在系统之外也有独立的动机？"

worldbuilding_checks:
  - "系统来源：科学造物/超自然力量/世界本身机制？解释是否自洽？"
  - "系统规则的经济平衡：奖励-消耗-回收的闭环是否防止了通货膨胀？"
  - "系统与原生世界力量的关系：系统赋予的能力和世界本身的力量体系是否兼容？"
  - "系统的局限和弱点是否被清晰定义？（如特定条件下系统无法使用/被干扰）"
  - "是否存在'系统管理员'或更高权限的存在？其角色和限制是什么？"

plot_checks:
  - "任务设计是否多样化——避免连续同类型任务的重复？"
  - "面板/数值变化的节奏是否合理——避免'更新面板就占半章'？"
  - "系统是否在某些关键节点'失灵'或'被绕过'——展示主角自身的价值？"
  - "是否存在'纯靠系统解决一切'的章节？如有——这些是冗余章节"
  - "系统来源的线索散布是否均匀——像悬疑一样有节奏地推进？"
  - "最终冲突是否涉及系统本身的命运——而不仅仅是使用系统打BOSS？"

continuity_checks:
  - "面板数值的每次变化是否有来源可查？"
  - "已解锁的系统功能是否被跟踪且使用频率合理？"
  - "任务日志/完成记录是否一致？奖励是否如实发放？"
  - "系统的对话/界面风格是否始终一致？"
  - "技能的等级/效果的描述在各章是否一致？"

genre_specific_guards:
  - "防'面板水文'：数值更新不应占据超过章节10%的篇幅——变化需要实质性事件支撑"
  - "防'万能任务机'：每个困境都恰好触发一个对应任务——系统不应成为情节偷懒工具"
  - "防'系统凌驾一切'：世界本身的力量体系和规则不能被系统完全边缘化"
  - "防'任务线发直'：任务类型应多样化——战斗/收集/探索/社交/道德选择——混合使用"
  - "防'数字通货膨胀':后期奖励的数值不能几何级增长而使前期奖励完全贬值"
  - "防'系统取代描写':有了面板数值不能替代战斗和成长的场景描写"

forbidden_patterns:
  - pattern: "系统无所不能"
    reason: "如果系统能解决一切，主角就只是系统的提线木偶——丧失角色主动性"
  - pattern: "任务奖励远超付出"
    reason: "破坏'努力-回报'的基本契约，使成长失去含金量"
  - pattern: "面板更新泛滥"
    reason: "大量纯数值更新的段落是系统流最核心的水文——每次更新都应有事件驱动"
  - pattern: "系统是唯一的特殊设定"
    reason: "如果系统是唯一有趣的设定，那么世界观本身过于单薄"
  - pattern: "无限技能树"
    reason: "不断添加新技能但旧技能从未被重复使用——技能应有生命周期"
  - pattern: "末期系统反水突兀"
    reason: "如果系统最终成为大反派——这个转折需要全程铺垫，不能突然出现"

reader_pull_rules:
  - "数据面板的'养成感'是系统流最强的留存钩子——读者享受看着数字一点点增长"
  - "新系统功能/新模块的解锁比单纯的数值增长更具吸引力——质量的成长>数量的成长"
  - "系统任务的'清单完成感'提供心理满足——人类天生喜欢tick box"
  - "利用系统规则创造性地解决问题比单纯堆数值更让读者兴奋——智力爽>武力爽"
  - "面板之外的人情故事是差异化竞争的关键——纯数据文会迅速让读者疲劳"

outline_validation_rules:
  - "系统完整功能树是否在大纲阶段已设计完整？解锁顺序是否合理？"
  - "任务类型分布是否均衡？是否避免了连续同类任务？"
  - "数值增长曲线是否合理——是否存在通货膨胀或增长停滞？"
  - "系统真相的揭示节点是否在大纲中标注？铺垫线索是否充足？"
  - "主角不依赖系统的独立成长线是否被规划？"

agent_focus:
  - focus: "任务多样性"
    detail: "统计各章任务类型，标记连续3章以上的同类型任务模式"
  - focus: "面板占比"
    detail: "计算面板/数值更新段落占总篇幅的比例，标记超过10%的章节"
  - focus: "奖励-付出比"
    detail: "评估每次任务获取奖励与主角实际付出/风险的匹配度"
  - focus: "系统外价值"
    detail: "统计主角在系统之外获得的关系/技能/成长，确保系统不覆盖一切"
  - focus: "数字一致性"
    detail: "核对面板数值变化与事件描述的对应关系"

review_questions:
  - "你的系统有什么让读者一听到就想来看的独特设计？单一的'任务-奖励'循环不足以构成卖点"
  - "如果某天系统完全失灵，主角还能凭借什么继续？（如果有答案，你的角色塑造是成功的）"
  - "系统在你的故事中是'工具'还是'角色'？这个定位决定了全文的基调"
  - "面板数据是否有'通货膨胀'？前期获得的10点属性到后期还是不是10点的价值？"
  - "有没有某个任务的完成方式让读者拍案叫绝——主角利用了规则的灰色地带而非单纯努力？"
