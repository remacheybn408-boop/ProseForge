# ============================================================
# 西式奇幻小说体裁规则包
# ============================================================
genre_id: western_fantasy
name: 西幻
description: >
  西式奇幻小说体裁规则包，涵盖以西方奇幻传统为基础的创作类型。
  核心要素包括架空大陆与种族设定、魔法体系、骑士与剑、龙与地下城、
  史诗冒险和善恶对决。此类作品的核心魅力来自宏大世界观的沉浸感、
  史诗旅程的壮阔感和多种族文明的丰富性。

core_promises:
  - "架空世界有完整的地理/历史/文化/种族/政治地图——不是几个孤立场景的拼凑"
  - "魔法体系有内部逻辑和限制——来源/学习/使用/代价的循环自洽"
  - "种族设定超越刻板印象——精灵不仅是优雅的,矮人不仅是固执的"
  - "史诗感来自人物选择和牺牲——而非仅靠战争场面堆砌"
  - "善恶对决具有道德复杂性——纯粹的黑暗魔王和纯粹的光明骑士都已过时"
  - "冒险旅程不仅是地理移动——是角色的内心朝圣和成长"

reader_expectations:
  - "世界的基本设定（种族/魔法/主要势力）在前5章内通过主角视角自然呈现"
  - "第一个展示魔法/特殊能力具体效果的场景在3-5章内发生"
  - "冒险/旅程的主线在10章前被设定——目的地/使命/追寻的目标"
  - "存在的多个势力/种族/派系在30章前至少展示其基本轮廓"
  - "至少一个主要的非人类角色有深度塑造——超越'尖耳朵/矮个子'"
  - "地图/世界格局在叙述中逐步展开——而非序章扔一个大地图"

common_conflicts:
  - "种族/文明间的历史恩怨与现实的和平/合作诉求"
  - "魔法的使用与滥用——力量的边界在哪？"
  - "预言的实现与反抗——命运可以被改变吗？"
  - "王权/神权/魔法权力的三角斗争"
  - "远征/冒险中的伙伴关系——不同种族/背景的人如何建立信任"

chapter_rhythm:
  pace: "旅程/远征的节奏以地点的移动为骨架——每抵达一个新地点带来新的风景、文化和挑战。战斗章节快速而具体——展示魔法/剑术/战术的具体运用。城镇/营地章节舒缓——填充世界细节和角色交流。世界旅行的比例——每卷至少跨越2-3个不同区域展示世界的多元。"
  hook_placement: "西幻特有钩子——'前方是什么未知的领土'、'这个古老遗迹中藏着什么'、'传说是真的吗'的探索感。还有'不同种族的碰撞'——第一次遇见一个新种族的未知和好奇。以及'预言/命运的线索'——谜团的碎片信息。最重要的是'同伴关系'——下一章他们之间会发生什么。"
  climax_pattern: "卷高潮通常为一场关键战役或一次命运攸关的抉择。全书高潮通常是最大的预言/命运的实现——或主角成功反抗了命运——伴随的是牺牲和最终的道德选择。史诗对决不只是比拼力量——更应是对各自理念的最终辩护。"

character_archetypes:
  - name: "天选者/预言中的主角"
    traits: "背负着预言或特殊命运的年轻人。可能最初普通但在旅途中展现天赋。在'接受命运'和'选择自己的路'间探索。"
    checks: "'天选'的身份是否给了主角真实的责任和痛苦——而非仅给予力量？如果没有预言——主角还能靠什么？"
  - name: "老骑士/导师"
    traits: "经验丰富但留有遗憾的老战士/法师。教导主角但不替主角做决定。在关键时刻可能牺牲——完成自己的救赎。"
    checks: "导师的智慧和局限是否都在故事中得到展示？其离去是否在给了主角独立成长的空间？"
  - name: "非人类同伴"
    traits: "精灵/矮人/兽人/半身人等——各有种族背景带来的独特视角和能力。不是亚人类的刻板印象。"
    checks: "非人类同伴的种族特征是否在故事中有实质性作用——而非仅是外观不同？其文化背景是否影响了其决策？"
  - name: "灰域反派"
    traits: "有合理甚至令人同情的目标和动机。其行为逻辑在自身框架内自洽。可能在某些方面是正确的。"
    checks: "读者是否能在某个点上理解甚至短暂地支持反派？其最终的命运是否产生了情感反应？"
  - name: "吟游诗人/史官/记录者"
    traits: "以非战斗方式参与旅程的记录者。提供信息和历史背景。为史诗增添'后人如何传颂'的维度。"
    checks: "这个角色是否让读者感受到'这段旅程正在成为传说'？其记录是否在某些时刻变得至关重要？"

worldbuilding_checks:
  - "世界地图（可模糊但必须有）——大陆/国家/重要城市/地理特征的轮廓"
  - "魔法体系是否完整（来源/学习方式/分类/代价/限制/与科技的关系）？"
  - "种族设定是否有深度——每个主要种族有独立的文化/历史/信仰/社会结构？"
  - "神祇/信仰体系是否清晰——神与人/神与魔法的关系？"
  - "历史事件的时间线是否建立——古代文明/重大战争/世界变革的记录？"
  - "多种族共存的社会/政治/经济关系是否有逻辑处理？"

plot_checks:
  - "旅程的每一站是否都推动了角色关系或主线故事的进展？"
  - "魔法/特殊能力的使用是否始终遵循已建立的规则和限制？"
  - "预言的实现过程是否有创新的处理——非线性的、反讽的或不完整的实现？"
  - "反派的动机和行动线是否独立于主角线——有自己的日程？"
  - "同伴间的冲突和和解是否有真实的积累和触发？"
  - "结局的道德选择是否有真实两难——没有明显的正确答案？"

continuity_checks:
  - "世界地理：角色的位置关系和移动速度是否一致？"
  - "魔法/物品的使用和能力是否在所有场景中一致？"
  - "种族间的历史关系和现状是否吻合——不存在明天就和好的千年仇敌？"
  - "时间线：旅程的时间跨度是否合理——季节变化/节日等的出现？"
  - "预言/伏笔的散布和回收是否有记录可查？"

genre_specific_guards:
  - "防'世界观倾泻'：前5章不能把所有种族/历史/魔法设定一次性倒给读者"
  - "防'魔法万能化'：即使高魔世界,魔法也不能是所有问题的唯一解法"
  - "防'种族刻板化'：精灵=优雅高贵,矮人=固执打铁——这种在当代已无法接受"
  - "防'善恶二元简化'：纯暗黑魔王和纯光明英雄的经典模式已陈旧"
  - "防'旅程只是腿在动'：人物的内在变化应与地理移动同步"
  - "防'牺牲无重量'：同伴的牺牲必须产生真实的情感冲击和后续影响"

forbidden_patterns:
  - pattern: "黑暗魔王=纯粹的邪恶"
    reason: "当今读者期待反派有可理解的动机——黑暗魔王也需要合理的背景"
  - pattern: "种族=单一个性"
    reason: "一个种族的所有成员都是同一种性格——这已不是托尔金时代"
  - pattern: "女性角色=男性冒险的奖励"
    reason: "女性角色应有独立于男主角的目标和能力——而非旅程终点的奖品"
  - pattern: "魔法=代码"
    reason: "魔法若过于机械化（如游戏技能的复制粘贴）则失去奇幻的魅力"
  - pattern: "预言实现=完全按字面"
    reason: "预言的实现应有转折/反讽/不完整性——纯粹的按字面实现让读者感到无聊"
  - pattern: "地图填充式旅行"
    reason: "只为展示世界设定而访问的地点——每个地点应对情节/人物有实质作用"

reader_pull_rules:
  - "探索未知地域的好奇心——'山的另一边是什么'是西幻最古老的驱动"
  - "魔法在具体场景中的视觉化展示——让读者'看到'魔法的那一刻"
  - "多元种族交汇的文化火花——不同文化的人如何彼此学习和改变"
  - "史诗牺牲的情感重量——读者的眼泪是最强的投入证明"
  - "漫长的旅程后回到起点的感动——'离开时的你和回来时的你已是不同的人'"

outline_validation_rules:
  - "完整世界地图和势力分布是否在大纲阶段建立？"
  - "魔法体系的完整设计是否完成且内部无矛盾？"
  - "主要种族的设定文档是否已编写（文化/历史/社会/信仰）？"
  - "旅程路线和每站的目标/作用是否已规划？"
  - "预言/命运的完整文本和其实现的计划是否已确定？"
  - "反派的独立行动线是否已在世界时间线中占据位置？"

agent_focus:
  - focus: "世界一致性"
    detail: "检查地理/历史/魔法规则在各章节的一致性"
  - focus: "种族深度"
    detail: "审查非人类角色的塑造是否超越刻板标签"
  - focus: "旅程功能性"
    detail: "分析旅程各站是否对人物或情节有实质作用"
  - focus: "道德灰度"
    detail: "评估反派动机的合理性和主角一方的不完美性"
  - focus: "牺牲影响持续性"
    detail: "追踪角色牺牲后的情感影响是否在后续章节中延续"

review_questions:
  - "你的世界有没有一个读者能记住50年的地方——像夏尔、霍格沃茨或纳尼亚那样？"
  - "你的反派在做什么——如果主角从不存在？这个'反派的独立故事'够完整吗？"
  - "魔法在你的世界里是什么感觉——读者通过什么场景能'感到'魔法的存在？"
  - "有一个非人类角色能让读者忘记他是'精灵/矮人'而只记得他是'他/她'吗？"
  - "你的故事在经典西幻中开辟了什么新的路径——读者为什么选择读你的而非重读托尔金？"
