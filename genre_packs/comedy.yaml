# ============================================================
# 搞笑轻松小说体裁规则包
# ============================================================
genre_id: comedy
name: 搞笑轻松
description: >
  搞笑轻松小说体裁规则包，涵盖以喜剧效果为核心创作目标的作品类型。
  核心要素包括幽默情境的设计、角色反差制造笑点、对话节奏的把控
  和对荒诞与现实的平衡。此类作品的核心魅力来自解压和愉悦的阅读体验，
  以及聪明的幽默所展现的作者才智。

core_promises:
  - "幽默是故事的驱动力而非点缀——不是'严肃故事中加入几个笑点'"
  - "笑料建立在角色和情境上——而非仅靠网络段子和流行梗"
  - "喜剧节奏张弛有度——持续密集的笑点会麻木,需要喘息"
  - "角色即使在搞笑中也有真实情感——纯搞笑的纸片人无法持久吸引读者"
  - "喜剧之下有温度——最好的喜剧总有一丝对生活的温柔洞察"
  - "笑料形式多样——语言幽默/情境幽默/角色反差/荒诞逻辑等综合运用"

reader_expectations:
  - "第一个有效笑点在开篇3章内出现——让读者知道这是他们想要的类型"
  - "喜剧基调在开篇被建立——是冷幽默/荒诞/反套路/沙雕/黑色幽默？"
  - "主要角色的搞笑定位在前5章内确立——读者知道谁的什么特质好笑"
  - "笑料密度维持在至少每2-3章有一个值得记住的喜剧场景"
  - "故事在搞笑之后有实质推进——不是纯粹的笑料拼盘"

common_conflicts:
  - "角色设定与情境的错位——社恐被推到公共演讲台,废柴成为救世主"
  - "预期和现实的搞笑反差——精心计划的事总是以最不可能的方式搞砸"
  - "角色间的相互吐槽——但吐槽之下是真实的关心和友谊"
  - "正常的逻辑在荒诞世界中的失效——试图认真对待完全不合理的情况"
  - "反套路的套路——读者以为要发生经典桥段,结果发生了完全不同的搞笑展开"

chapter_rhythm:
  pace: "喜剧节奏最重要的规则：笑料有呼吸。一个大的喜剧场景后需要一个相对平缓的过渡——让读者从大笑中恢复,同时建立下一波喜剧的情境。对话密集的场景推进更快——角色的相互吐槽本身就是情节。独白/内心戏可以为角色展现'表面搞笑下的真实情感'提供空间。"
  hook_placement: "喜剧特有钩子——'接下来会发生什么混乱'——角色搞出来的乱摊子怎么收场。其次是'角色之间即将发生的尴尬互动'——期待两人的化学反应。再次是'新的搞笑角色即将登场'——新鲜的笑料来源。还有'搞笑面具下隐约露出的伏笔和深意'。"
  climax_pattern: "搞笑作品的高潮往往是所有错位的线汇集到一起的地方——最混乱、最搞笑、但也最温暖或最有意义的时刻。结局让读者在笑声中感受到'这群人在一起真好'或'生活虽然荒诞但也美好'——喜剧的核心是乐观。"

character_archetypes:
  - name: "倒霉但不服输的主角"
    traits: "总是陷入各种离谱的困境。有莫名的乐观或执着的倔强。吐槽自己也吐槽世界。在搞笑中偶尔展现的认真/暖男/勇敢时刻特别动人。"
    checks: "主角的倒霉是否有新意——而非千篇一律的平地摔？其认真时刻是否增强了角色的真实感？"
  - name: "吐槽役/正常人"
    traits: "在荒诞事件中保持正常人逻辑的角色。替读者发出'这合理吗'的疑问。与搞笑角色形成反差——吐槽本身也是笑点。"
    checks: "吐槽役的吐槽是否多样化——而非只有'你疯了吧'一种模式？"
  - name: "天然呆/脑回路清奇的角色"
    traits: "有完全不同于常人的思维逻辑。行为不可预测但自洽。经常在喜剧中提供意想不到的转折。"
    checks: "天然呆的'不正常'是否有一致的内部逻辑——而非随机发疯？"
  - name: "傲娇/反差萌角色"
    traits: "表面高冷/凶狠/严肃但内心柔软。反差瞬间制造高质量笑点。"
    checks: "反差是否有多样化的展现——而非每次都是'转过头脸红'？"
  - name: "终极靠谱or终极不靠谱的长辈/上司"
    traits: "或者是所有混乱的根源（不靠谱型）或者是唯一的正常人和保护者（靠谱型）。"
    checks: "这个角色是否在某些时候出人意料地展现了与平时不同的一面？"

worldbuilding_checks:
  - "如果是在搞笑背景下有世界观——设定的规则是否被一致遵守（即使是荒诞的规则）？"
  - "搞笑世界的'物理法则'是否一致——在这个世界里什么是可能的什么是会出问题的？"
  - "角色能力的设定是否适合制造喜剧——不给角色设置过强或过弱于情境需要的能力？"

plot_checks:
  - "笑料是否源于角色和情境——而非来自复制网络段子？"
  - "是否在搞笑场景中穿插了推动情节的实质内容？"
  - "是否存在'为搞笑而搞笑'从而损害角色和情节逻辑的段落？"
  - "喜剧节奏是否有张弛——而不是从头到尾都在喊'笑啊你快笑'？"
  - "是否有某个喜剧桥段过于刻意——读者看到的是作者的安排而非角色的自然反应？"
  - "在搞笑之下是否有故事在推进——读者可以在笑完之后感到故事在往前走？"

continuity_checks:
  - "角色的搞笑定位是否前后一致——不会突然改变喜剧风格？"
  - "之前制造的喜剧后果是否在后续情节中被承认——搞笑事件有延展影响？"
  - "角色的关系线是否在搞笑中有真实的进展？"

genre_specific_guards:
  - "防'笑料复制网络段子'：大量搬运网络流行梗——这不是原创的幽默"
  - "防'笑点密度失调'：要么连续几十章没有有效笑点,要么每页都在用力过猛地搞笑"
  - "防'为笑而牺牲角色'：不能让角色突然降智或违背性格来制造笑料"
  - "防'搞笑=低俗'：幽默不需要依赖低俗或攻击性内容——有品味的搞笑更持久"
  - "防'气氛突然严肃崩坏'：如果前80%都在搞笑,最后20%突然变悲剧——读者会感到被背叛"
  - "防'角色全员搞笑化'：至少需要一个相对'正常'的锚点角色让读者对照"

forbidden_patterns:
  - pattern: "复制网络段子/meme"
    reason: "搬运的搞笑是无法成为作品长期竞争力——且网感段子有极强的时效性"
  - pattern: "搞笑桥段即插即用"
    reason: "与上下文无关的笑料插入——不是有机的叙事环节,是作者在说话"
  - pattern: "角色为了制造笑料而降智"
    reason: "一个聪明的角色突然做蠢事只为制造笑料——这不搞笑,这让读者讨厌作者"
  - pattern: "同一梗无限重复"
    reason: "再好笑的笑料重复10次也会变成折磨——笑料需要进化"
  - pattern: "搞笑=没有主线"
    reason: "纯粹的搞笑拼盘在长篇中不可持续——需要有故事主线牵引各搞笑单元"
  - pattern: "搞笑风格的无预警突变"
    reason: "从轻松搞笑突然变成悲情正剧——读者需要过渡和预警"

reader_pull_rules:
  - "笑声是最强的留客——读者因为被逗笑而感到愉悦,想把这种愉快延续到下一章"
  - "在搞笑角色中偶尔展现的认真/温暖时刻——是让读者爱上角色的关键时刻"
  - "角色间的相互吐槽——让读者觉得'我就是在这个朋友圈里'"
  - "反套路的新鲜感——'我没想到会这样展开'——幽默感的创意同样需要原创性"
  - "轻松无压力的阅读体验——读者不需要做笔记或情感准备——随手翻开就能享受"

outline_validation_rules:
  - "主要喜剧设定和角色的搞笑定位是否在大纲中明确了？"
  - "喜剧节奏线是否已规划——笑料的分布和强度变化？"
  - "是否存在足够的情节主线来携带各喜剧单元？"
  - "角色的'真实面'揭示节点是否已标注——让搞笑角色也有深度？"
  - "笑料形式是否多样化——语言/情境/反差/荒诞等不同类别的分布？"

agent_focus:
  - focus: "笑料原创性"
    detail: "检测笑料与常见网络段子的相似度，标记潜在的非原创内容"
  - focus: "笑料密度与分布"
    detail: "统计各章的喜剧元素密度，检查分布是否均匀、是否有节奏变化"
  - focus: "角色-笑料绑定"
    detail: "评估笑料是否源于角色的自然反应——还是作者的外在安排"
  - focus: "故事主线进度"
    detail: "在喜剧场景中检测主线情节的推进——确保故事在搞笑中前进"
  - focus: "笑料重复检测"
    detail: "识别重复使用同类型笑料的模式——需要多样化的幽默"

review_questions:
  - "删掉所有笑料后，你的故事还剩什么？（如果几乎什么都不剩，那需要一条更强的故事主线）"
  - "你的幽默风格可以被描述为什么——冷幽默/吐槽系/沙雕/反套路/黑色？这个风格是否统一？"
  - "有哪3个笑料是读者会专门截图发给朋友看或分享的？"
  - "你的角色的搞笑是否源于其性格——而不是你作为作者在替他搞笑？"
  - "最难写的一场——在搞笑之中还要处理感人/严肃的内容——你完成得怎样？"
