genre_id: sci_fi
name: 科幻小说
description: 以科学设想和技术发展为核心驱动力的叙事类型，探讨技术对人类、社会和文明的影响。
core_promises:
  - 有自洽的科学或技术设定
  - 技术发展带来的代价和后果
  - 设定对社会结构的真实影响
  - 人类在技术面前的处境与选择
reader_expectations:
  - 科学设定内部一致
  - 技术不是万能魔法
  - 人物不被设定压扁
  - 概念服务于故事
common_conflicts:
  - 技术进步与伦理底线的冲突
  - 人类本质与技术改造的矛盾
  - 不同文明/物种的认知差异
  - 个体自由与系统控制的对抗
chapter_rhythm:
  pace: 概念引入慢，理解后加速，代价揭示时高潮
  hook_placement: 每章结尾揭示设定新层面或代价
  climax_pattern: 技术后果与人物选择交汇
character_archetypes:
  - 科学家/工程师型主角：用技术解决问题
  - 怀疑者：对技术保持警惕
  - 技术受益者/受害者：被技术改变命运
  - 系统维护者：代表秩序但可能僵化
worldbuilding_checks:
  - 技术原理是否自洽
  - 技术发展是否影响社会结构
  - 不同群体的技术获取是否不平等
  - 世界观因果关系是否成立
plot_checks:
  - 技术是否只是背景还是推动剧情
  - 概念是否通过人物行动展示
  - 技术代价是否在剧情中兑现
  - 结尾是否回应了开篇提出的命题
continuity_checks:
  - 技术设定是否前后一致
  - 前文技术是否在后文被遗忘
  - 技术后果是否持续影响世界
genre_specific_guards:
  - 设定自洽检测：技术规则是否矛盾
  - 技术代价检测：是否只有好处没有代价
  - 人物工具化检测：人物是否只负责解释设定
forbidden_patterns:
  - 技术万能什么都能解决
  - 概念堆砌只为显酷
  - 人物只负责念设定说明书
  - 硬科幻名词无解释乱用
  - 技术发展不改变社会组织方式
reader_pull_rules:
  - 每章至少揭示设定一个新层面
  - 用人物处境而非旁白展示技术影响
  - 保持"如果这样会怎样"的思考张力
outline_validation_rules:
  - 核心技术设定必须在大纲中明确
  - 技术代价必须在剧情中有兑现节点
  - 设定变化必须有因果
agent_focus:
  - 科学设定的自洽性
  - 技术是否改变了人物和社会
  - 概念是否通过故事展示
  - 是否有硬科幻名词滥用
review_questions:
  - 本章技术设定是否与之前矛盾？
  - 技术使用是否产生了可见后果？
  - 人物是否被设定压扁只当解说员？
  - 概念是否服务于故事主线？
  - 是否有未解释的硬科幻术语？
