# ============================================================
# 军事小说体裁规则包
# ============================================================
genre_id: military
name: 军事
description: >
  军事小说体裁规则包，涵盖战争、军事策略、特种作战和军事历史等子类型。
  核心要素包括军事组织与纪律、战术与战略、武器装备的真实性、战争
  对士兵心理的影响和军事决策的多维度考量。此类作品的读者对军事细节
  的真实性有极高的要求——专业读者对基本错误的容忍度接近零。

core_promises:
  - "军事细节的专业性——编制/装备/术语/战术的基本准确性是契约的基础"
  - "战争不是割草——伤亡有真实代价,后勤是真实限制,错误判断有真实后果"
  - "士兵不是数字——每个阵亡者背后有名字和有牵挂的人"
  - "指挥官的决策压力被真实呈现——信息不完整、时间紧迫、代价巨大"
  - "战术/战略有清晰的因果逻辑——胜利和失败都有可追溯的具体原因"
  - "战争不仅是军事行动——政治/经济/情报/民心的多维博弈"

reader_expectations:
  - "军事背景（时代/国家/军种/兵种）在开篇明确建立"
  - "武器装备的描写有基本的技术准确度——型号/性能/使用方式"
  - "至少一场有完整'计划-执行-变化-结果'的战斗在15章前展示"
  - "指挥体系/军衔/编制等组织结构在叙事中保持一致"
  - "敌方的军事能力和战略意图同样被认真刻画——非纸老虎"
  - "战争对个人（士兵/平民/家人）的影响被真实处理"

common_conflicts:
  - "军事目标与道德良知的冲突——命令要求执行的任务与个人信念违背"
  - "战术风险与战略回报的博弈——牺牲小部队换取大局胜利"
  - "技术装备的代差与战术创新的对抗——弱者如何对抗强者"
  - "同盟内部的利益分歧与维系——联盟总是比单打独斗更难"
  - "战争结束后的创伤与重建——胜利不等于句号"

chapter_rhythm:
  pace: "战斗/行动场景高速推进——以分钟甚至秒为单位的紧迫感。备战/策划章节节奏放缓——智慧对抗的乐趣。日常/过渡章节处理角色关系和后果——战争间隙的人性时刻。大型战役可能需多章连续描绘——但应注意节奏变化的必要性。战斗密度应反映战争的节奏——连续作战后会疲惫,久无行动会焦虑。"
  hook_placement: "军事最强钩子——'即将发动/即将到来的行动'——读者想知道计划能否实现。其次是'关键的战术抉择'——指挥官在压力下的决策。再次是'情报的碎片'——新情报是否改变整体局势。还有'战友的命运'——在炮火中的战友能否活下来。最后是'战争的政治后果'——这场仗打完会改变什么。"
  climax_pattern: "军事作品的高潮通常是决定性战役——但关键战役的胜负可能在战斗开始前就已经因后勤/情报/决策等非战斗因素而决定。卷高潮为局部战场的决定性行动。全书高潮为全局战争的战略转折或最终决战。结局需处理战争结束后的问题——军事胜利不等于和平。"

character_archetypes:
  - name: "指挥官主角"
    traits: "在某个级别指挥作战的军官。有清晰的战术/战略思维。面临决策压力和道德选择。领导风格有明确特点。"
    checks: "指挥官的决策过程是否具体展示（会议/地图/通信）？其失误是否有真实后果？"
  - name: "士兵视角角色"
    traits: "从底层士兵的角度看战争。展示战争的残酷性和个人的勇气。可能是特种兵/侦察兵/普通步兵。"
    checks: "士兵视角是否展示了指挥链条中'上层决策'的后果？其个人成长线是否独立于战局？"
  - name: "参谋/情报官"
    traits: "提供信息和选项分析的智囊角色。对信息的准确性和完整性有深刻的理解。"
    checks: "参谋的分析是否有出错的时候——信息不完整带来的误判？其个人判断与指挥官决策的冲突？"
  - name: "敌方指挥官"
    traits: "有能力且值得尊敬的对手。有自身的战略逻辑和军事素养。其决策从己方角度看是合理的。"
    checks: "敌方指挥官的军事水平是否与主角对等——而非降智以让主角获胜？其动机是否超越'他是敌人'？"
  - name: "军医/后勤/通讯等专业角色"
    traits: "非直接战斗但不可或缺的专业人员。展示战争的非战斗维度。"
    checks: "这些专业角色的工作是否被具体描写——而非仅当背景板？其面临的专业挑战是否真实？"

worldbuilding_checks:
  - "军事编制/军衔体系是否正确且在全文中一致？"
  - "武器装备的性能参数是否准确——虚构装备的设定是否有内部逻辑？"
  - "地理/地形/天气对军事行动的影响是否被具体体现？"
  - "后勤保障线是否被认真对待——弹药/燃料/食品/医疗等"
  - "军事通信和情报体系是否有合理的设定？"
  - "交战规则/国际法/战争伦理是否在故事中被考虑？"

plot_checks:
  - "每场战斗/行动是否有明确的军事目标和战术规划？"
  - "胜败是否有具体的战术/装备/后勤/情报原因——而非'士气'这种模糊概念？"
  - "情报的不确定性和误差是否在情节中产生真实影响？"
  - "是否存在'主角光环'式的战术奇迹——在绝对劣势下无逻辑地反杀？"
  - "战争的政治层面的博弈是否被充分刻画？"
  - "和平/停战/胜利的结局是否有现实的处理——而非'打完就完了'？"

continuity_checks:
  - "部队数量/伤亡/装备损耗的记录是否一致？"
  - "位置关系——各方部队在战场上的位置移动是否合理？"
  - "时间线——行动的时间跨度和顺序是否有逻辑？"
  - "军衔/职位/隶属关系的变更是否被记录？"
  - "地理/天气/季节的推进是否连续？"

genre_specific_guards:
  - "防'军事民科'：基本军事常识错误——如用海军术语写陆军、武器性能严重夸大"
  - "防'战争浪漫化'：真实战争是残酷肮脏疲惫的——不能让战斗看起来只是刺激的冒险"
  - "防'敌方降智'：敌军也应有专业军事素养——对手越强,胜利越有价值"
  - "防'弹药无限'：弹药物资消耗是真实限制——不能无限连射和无限补给"
  - "防'伤亡无意义':每个伤亡决定都应有军事必要性——人海战术式牺牲不可接受"
  - "防'战争单维度':仅有军事行动而无政治/经济/民心维度——这不是完整的战争"

forbidden_patterns:
  - pattern: "主角无双割草"
    reason: "真实战争中个体力量是被极大限制的——即使是特种兵也不可能一人打一营"
  - pattern: "武器性能不切实际"
    reason: "夸大武器性能（如手枪300米精准射杀）会瞬间失去军事读者信任"
  - pattern: "敌方无限增援而己方弹尽粮绝"
    reason: "双方的兵力/后勤/指挥水平应对等——非一方无限资源一方极度匮乏"
  - pattern: "战争=英雄的舞台"
    reason: "真实战争首先是恐惧/混乱/偶然——然后是勇气和责任"
  - pattern: "战后立即治愈"
    reason: "PTSD/伤残/失去战友的创伤不能在一章内被'克服'"
  - pattern: "单靠士气打赢装备/人数差距"
    reason: "士气提供额外战斗力但不是魔法——纯粹靠精神胜利是军事题材的毒药"

reader_pull_rules:
  - "战术的博弈——智慧的对抗（而非蛮力）是军事题材最大的乐趣"
  - "战斗场面的真实感和紧张感——让读者感受到子弹/炮火的密度"
  - "战友之间的羁绊——生死与共的关系是最强的情感线条"
  - "战争对'家'和'和平'的反思——让读者珍惜日常的来之不易"
  - "历史真实性的'身临其境感'——如果是历史军事,细节的准确性让历史活过来"

outline_validation_rules:
  - "作战序列和部队编制是否完整设计？"
  - "关键战役的双方兵力/装备/部署是否已规划？"
  - "后勤线/补给计划是否已建立？"
  - "政治时间线（外交/联盟/谈判）是否与军事时间线交错？"
  - "角色伤亡/晋升/调动计划是否有记录？"

agent_focus:
  - focus: "军事术语准确性"
    detail: "抽查术语使用是否符合设定的军种/时代/国家"
  - focus: "战术因果关系"
    detail: "检查每场战斗胜败是否有具体的战术/装备/情报原因支撑"
  - focus: "伤亡一致性"
    detail: "跟踪部队数量变化和伤亡率的一致性"
  - focus: "装备性能一致性"
    detail: "核对武器装备的性能描述是否前后一致且不超出合理范围"
  - focus: "指挥决策逻辑"
    detail: "审查关键指挥决策是否有信息/约束条件/目标的合理说明"

review_questions:
  - "有军事背景的读者读完后会在评论区@你吗？他们会指出什么错误？"
  - "你故事中的战争如果从敌方指挥官角度看——你的主角算不算'令人绝望的对手'？"
  - "有没有一个关于后勤/情报/医药的具体场景——让读者感受到战争除了打仗以外的维度？"
  - "你的主角在下达'前往几乎必死的任务'命令时——内心的具体想法是什么？"
  - "战争结束后角色们面对怎样的世界？胜利的代价是什么？"
