# ============================================================
# 修仙/玄幻小说体裁规则包
# ============================================================
genre_id: xianxia
name: 修仙/玄幻
description: >
  修仙与玄幻小说体裁规则包，涵盖修真、仙侠、东方玄幻等子类型。核心要素包括境界体系、
  灵气/法力设定、天材地宝、秘境历练、宗门势力、飞升成仙等。此类作品的读者对境界晋升
  节奏、战力平衡和机缘设定有极高的敏感性，容错率低。适用于凡人流、废柴逆袭流、重生
  修仙流、系统流等常见修仙变体。玄幻部分涵盖非严格修仙但具有东方修炼体系的幻想世界观。

# ---- 核心承诺 ----
core_promises:
  - "主角的修炼路径清晰可追踪，每个境界的突破有明确的契机、代价和能力变化"
  - "战力体系自洽——境界间的战力差距在故事全局保持一致，不因剧情需要随意缩涨"
  - "机缘与努力的比例合理——主角不能仅靠运气，每一次重大突破都需要自身努力或合理代价"
  - "天材地宝/功法/法宝有稀缺性梯度，不会无限量供应使战斗失去悬念"
  - "世界观力量规则（灵气、法则、天道等）一经建立，不可随意违背或添加例外"
  - "每次战斗的结果在既有的战力框架内有合理的因果解释"

# ---- 读者期待 ----
reader_expectations:
  - "开篇3000字内明示或暗示本作的修炼体系基调（传统修真/凡人流/系统流/洪荒流等）"
  - "主角的金手指/特殊能力在第5章前被介绍或其获得过程被完整展示"
  - "境界体系全貌在主角达到3阶之前被大致勾勒（可以通过他人对话/古籍等间接方式）"
  - "跨大境界战斗胜利必须满足极严格的条件——要么有特殊法宝/秘术的代价，要么有足够的智斗铺垫"
  - "修炼过程不是纯粹的打坐，需要穿插资源争夺、秘境探索或人际冲突"
  - "每卷（约30-50章）至少有一个明确的大事件或副本作为阶段高潮"

# ---- 常见冲突 ----
common_conflicts:
  - "资源争夺：灵石、丹药、天材地宝的竞争——修仙世界最基础的冲突驱动力"
  - "宗门/势力恩怨：正邪对立、门派世仇、势力吞并"
  - "境界瓶颈：突破失败的风险、走火入魔、根基受损"
  - "道心考验：心魔、执念、因果纠缠——高阶修士的核心冲突"
  - "天道/命运对抗：逆天改命、渡劫飞升、法则领悟"
  - "人际关系羁绊：道侣、师徒、家族——情与道的两难"

# ---- 章节节奏 ----
chapter_rhythm:
  pace: "日常修炼章节节奏可较舒缓，但每3-5章需安排一个事件打破平静（战斗/秘境/冲突）。境界突破章节节奏加速，用短句和动作描写增强紧张感。战斗章节描写密度高，回合制战斗不超过3个回合后应有变化（环境、援军、法宝等）。"
  hook_placement: "修炼突破相关钩子最强——每一章的可断在境界突破的关键时刻（即将突破/突破失败/突破异象）。副本/秘境入口和出口是强力自然断章点。获得重大机缘后的章节结尾建议用'但代价即将显现'类型钩子，平衡读者爽感。"
  climax_pattern: "每卷应有独立的小高潮（约30-50章一个周期）。全书大高潮通常为飞升/证道/最终决战，发生在总篇幅85%-92%位置。大高潮前必须有至少10章的持续危机升级，让读者感受到'绝境'的压迫。主角的最终胜利必须建立在前期积累的资源、人脉和领悟之上。"

# ---- 角色原型 ----
character_archetypes:
  - name: "废柴/凡人主角"
    traits: "起点极低但拥有隐藏资质或逆天机缘。性格坚韧、不轻言放弃。在逐步成长中建立自信。"
    checks: "主角起点的'废'是否真实可信且有数据支撑（如灵根品阶/体质测试）？成长的每一步是否有清晰的付出？"
  - name: "老爷爷/戒指里的灵魂"
    traits: "提供修炼指导但不直接出手。有自身未了的心愿和限制。最终需要离开或被主角超越。"
    checks: "老爷爷的指导是否在后期限制了主角的自主性？其离开时机是否自然？"
  - name: "傲娇天才/冷艳仙子"
    traits: "初期看不起主角，但在共同经历中逐渐认可。自身实力强但不完美。"
    checks: "态度转变是否有足够的铺垫事件？是否保持了独立的角色弧线？"
  - name: "护短师尊"
    traits: "有强大的实力和鲜明的个性。对徒弟真心关爱但不溺爱。"
    checks: "师尊的保护是否削弱了主角面临的危险感？师尊自身是否有危机线？"
  - name: "宿命对手"
    traits: "与主角势均力敌的竞争者，可能是亦敌亦友。有独立且可理解的动机。"
    checks: "对手的成长线是否与主角呼应？最终对决是否有情感重量而不仅是战力比拼？"

# ---- 世界观检查 ----
worldbuilding_checks:
  - "境界体系是否完整且一致？检查所有战斗中表现出的战力是否与角色当前境界匹配"
  - "灵气浓度/资源分布是否有地域差异？这个差异是否在剧情中得到利用？"
  - "每个新出现的天材地宝是否在之前有铺垫或在之后有稀缺性体现？"
  - "传送阵/飞行速度/赶路时间是否符合已建立的空间尺度？"
  - "宗门/势力的等级制度和晋升规则是否清晰且被遵守？"
  - "丹道/阵道/符道/器道的子体系规则是否自洽且互不矛盾？"

# ---- 情节检查 ----
plot_checks:
  - "主角的每次境界突破是否有合理的积累铺垫，而非'突然就突破了'？"
  - "金手指的每次使用是否有代价或限制？（冷却时间/消耗/副作用至少一项）"
  - "战斗数据：检查每次越级战斗是否有充分的特殊条件解释"
  - "资源管理：主角的法宝/丹药/灵石数量是否保持一致？避免无限资源现象"
  - "秘境/副本的探索是否有完整的进入-探索-危机-收获-退出闭环？"
  - "是否存在'为了展示设定而写的战斗'——战斗应为情节或人物服务"

# ---- 连续性检查 ----
continuity_checks:
  - "境界名称和层级在全文中是否一致？（如筑基-金丹-元婴顺序不乱）"
  - "功法/神通的效果描述是否前后一致？（同一招式在不同章节的表现应相似）"
  - "角色关系的时间积累是否合理？（如修炼百年对应的人际关系变化）"
  - "储物袋/空间戒指中的物品清单是否一致？（重要物品不能凭空消失或出现）"
  - "伤势恢复时间是否与设定匹配？（重伤不能下一章就完好如初）"

# ---- 类型特定防护 ----
genre_specific_guards:
  - "防战力崩坏（核心）：建立'战力锚点'——每50章回顾检查一次所有主要角色的战力定位是否偏离"
  - "防机缘通胀：记录主角每次重大机缘，检查获取频率——前期机缘不应比后期更频繁和强大"
  - "防配角工具化：检查每个常驻配角是否有独立于主角的剧情线"
  - "防修炼说明癖：修炼体系说明每次不超过300字，分散到多个场景呈现"
  - "防打脸模式化：连续3个情节都采用'被看不起→展示实力→震惊全场'模式时标记警告"
  - "防情感线突兀：修仙小说的情感线需要更长的铺垫，因角色寿命漫长"

# ---- 禁用模式 ----
forbidden_patterns:
  - pattern: "境界随意跨越"
    reason: "前面建立的境界壁垒被无视，直接跳过若干境界，是战力体系崩溃的第一信号"
  - pattern: "无敌流无代价"
    reason: "主角从头碾压到尾，没有真正的危机——修仙读者的核心爽点来自'成长的艰辛和突破的快感'，非无敌本身"
  - pattern: "女角色全员后宫化"
    reason: "每个女性角色存在的唯一意义是倾慕主角，缺乏独立人格——严重消耗读者耐心"
  - pattern: "重复副本/重复套路"
    reason: "连续3个以上结构相同的秘境/副本/打脸情节——修仙读者对此尤为敏感，会直接弃书"
  - pattern: "天劫/天罚无实质威胁"
    reason: "渡劫应是修仙世界最危险的环节之一，若每次都有惊无险且轻松度过，则消解世界观的紧张感"
  - pattern: "末法时代/灵气枯竭仅作为背景板"
    reason: "若设定了灵气衰退但从未对主角造成实际限制，则此设定为无效设定"

# ---- 读者吸引力法则 ----
reader_pull_rules:
  - "境界突破是全章最强钩子——在突破即将完成的瞬间断章，读者几乎不可能不往下翻"
  - "每次获得新能力/法宝后，应在1-3章内展示其实际效果，满足读者的'试刀'期待"
  - "修仙读者的'排雷'意识极强——任何战力或境界逻辑漏洞会被迅速标记并传播，需极其谨慎"
  - "爽点与虐点的配比建议3:1——修仙读者来追求爽感为主，虐不宜持续时间过长"
  - "道友/同门的认可（或被打脸后的震惊）是重要的情绪奖励，但频率不宜过高"

# ---- 大纲验证规则 ----
outline_validation_rules:
  - "大纲中是否标注了每个境界突破的位置和对应的铺垫章节？"
  - "战力成长曲线图：主角实力是否在大纲中呈阶梯状上升（而非直线）？"
  - "每个重大机缘的获得是否在大纲中匹配了对应的代价或后续危机？"
  - "卷结构是否明确——每卷是否有独立的反派/危机和高潮？"
  - "最终BOSS是否在全文30%前至少被提及或暗示？"
  - "所有的天材地宝/功法是否有出现-使用-耗尽的完整生命周期？"

# ---- 智能体审查聚焦点 ----
agent_focus:
  - focus: "战力一致性审计"
    detail: "抽取所有战斗场景，建立战力对照表，标记战力表现与境界设定不符之处"
  - focus: "境界突破密度"
    detail: "统计每50章的境界突破次数，标记节奏过快（10章内连续突破）或过慢（50章无突破）的段落"
  - focus: "机缘合理性"
    detail: "追踪主角获取的每项机缘，评估其稀缺性和代价是否匹配"
  - focus: "配角存在感"
    detail: "统计每个主要配角独立于主角的场景数，标记低于阈值的角色"
  - focus: "战斗多样性"
    detail: "检查连续战斗的模式是否重复（如连打3场都用同类型功法获胜）"

# ---- 审查提问 ----
review_questions:
  - "主角的修炼路径是否独一无二、不可复制？如果其他人拿到同样的金手指也能成功，主角的特殊性在哪里？"
  - "你作品中的境界体系在同类作品中是否有辨识度？读者能否清晰地向别人描述你的修炼体系？"
  - "主角最强的3个战斗场景中，胜利的关键是实力、智谋还是外挂？比例是否令人满意？"
  - "如果有道侣线：两个人的感情发展是否有独立于修炼的情节支撑？"
  - "反派的最高境界是否在全文前30%被揭示或暗示，让读者有明确的威胁感知？"
  - "是否存在'前期珍稀如宝，后期烂大街'的资源或设定？如果有，从哪一章开始变质？"
  - "全书最大的'意料之外情理之中'的情节转折在哪里？"
