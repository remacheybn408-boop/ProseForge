# ============================================================
# 奇幻/西幻小说体裁规则包
# ============================================================
genre_id: fantasy
name: 奇幻/西幻
description: >
  奇幻/西幻小说体裁规则包，涵盖史诗奇幻（以托尔金、马丁式为代表）、剑与魔法、低魔
  奇幻、黑暗奇幻、英雄奇幻、都市奇幻等子类型。核心要素包括魔法体系设定、种族与文明
  构建、神话与历史层叠、政治势力博弈、预言与命运主题、英雄之旅叙事结构等。此类作品
  对世界观的原创性、魔法体系的内部逻辑和政治生态的真实感有较高要求——奇幻不是逃避
  现实，而是通过架空世界折射人性的永恒命题。

# ---- 核心承诺 ----
core_promises:
  - "魔法体系有明确的规则、代价和限制——魔法不能是'万能的叙事润滑油'"
  - "种族/文明设定有真实的文化、历史和经济基础，不是简单的外观换皮"
  - "世界有层叠的历史感——古代帝国的遗迹、失落的文明、被遗忘的神话在叙事中有迹可循"
  - "政治势力的博弈有现实逻辑——领土、资源、信仰、荣耀等动因推动冲突"
  - "英雄之旅有真实的成长和代价——主角的力量增长同时伴随着失去和成熟"
  - "预言/命运元素的使用遵循'自我实现或主动打破'原则——不沦为机械降神"

# ---- 读者期待 ----
reader_expectations:
  - "世界观的独特性在前5章内通过具体的场景和人物互动被感知，而非长篇设定说明"
  - "魔法体系的第一次展现应为叙事服务——在关键时刻揭示魔法的力量与代价"
  - "至少有一个核心种族/文明的设定有可辨识的创新点（不是标准的精灵矮人兽人套壳）"
  - "如果涉及多视角叙事，每个视角人物有独立的欲望线和信息优势/盲区"
  - "政治冲突有'没有纯黑纯白'的灰度——各势力都有可理解的目标"
  - "地图/地理的设定对情节有实际影响（距离、地形、气候制约行动）"

# ---- 常见冲突 ----
common_conflicts:
  - "光明vs黑暗：经典的善恶对抗，但应有灰色地带让冲突不死板"
  - "诸神/远古力量的遗产：失落的神器、未竟的战争、被遗忘的盟约影响着当下"
  - "帝国vs自由城邦/部落：中央集权与地方自治的永恒张力"
  - "魔法使用者vs非魔法使用者：力量不对等引发的恐惧、嫉妒和迫害"
  - "种族间的历史仇恨：千年积怨在当代事件中爆发，新生代面临选择"
  - "预言与自由意志：被预言束缚的角色与试图打破命运的角色间的张力"
  - "人与自然的失衡：魔法/工业化对自然世界的侵蚀与反噬"

# ---- 章节节奏 ----
chapter_rhythm:
  pace: "史诗奇幻采用缓起渐强的节奏——前10-15章建立世界、人物和潜伏的危机。中期加速，政治冲突和魔法事件密度增加。后期（最后30%篇幅）为战争/最终对决阶段，节奏最快。单章内，描写与动作的比例约4:6——奇幻需要足够的氛围描写但不能压过叙事推进。"
  hook_placement: "奇幻最强钩子类型——'揭示型钩子'：发现古老秘密、获得预言片段、揭示某人真实身份。其次——'冲突升级型钩子'：战争一触即发、联盟面临破裂、魔法反噬即将发生。再次——'旅程转折型钩子'：到达传说之地、遭遇意料之外的角色/种族。"
  climax_pattern: "史诗奇幻的高潮通常为宏大决战（但不限于军事冲突——也可能是魔法/神祇层面的决战）。高潮前至少铺垫15-20章的危机升级。决战中必须有重要的个人情感线收束——最打动读者的永远是'宏大背景下个人的选择'。结局应有1-3章的余波，展示新世界的样貌。"

# ---- 角色原型 ----
character_archetypes:
  - name: "天选之子/命定英雄"
    traits: "被预言/血脉/魔法选中。起初可能抗拒命运。成长弧线从被动接受到主动承担。最终可能以打破预言而非实现预言来完成弧线。"
    checks: "主角的'被选中'是否有内在品质的支撑而非纯运气？读者是否能认同'这个角色确实配得上他的使命'？"
  - name: "年迈巫师/贤者"
    traits: "拥有强大但有限制的魔法力量。背负历史的重负和过去的错误。是知识的保管者，但不能代替英雄行动。"
    checks: "贤者的知识是否有边界？他是否在某些时刻是错的？其退场时机是否推动了主角的独立？"
  - name: "流浪剑客/骑士"
    traits: "有精湛的武艺和一套荣誉准则。可能有黑暗的过往。与主角形成技能互补和哲学碰撞。"
    checks: "剑客的荣誉准则是否在故事中受到真实的考验？其武艺是否有合理的来源和限制？"
  - name: "黑暗君主/堕落者"
    traits: "曾可能也是英雄——反派的堕落有其悲剧性的合理轨迹。力量强大但有其弱点。"
    checks: "反派的目标是否有某种扭曲的合理性和吸引力？其弱点是否在前期被充分暗示？"
  - name: "异族伙伴"
    traits: "来自非人类种族，带来独特的文化视角和能力。在旅途中面临种族偏见和身份认同问题。"
    checks: "异族伙伴是否有独立的种族文化逻辑支撑其行为？是否不仅仅是'会打架的外星人'？"

# ---- 世界观检查 ----
worldbuilding_checks:
  - "魔法体系是否已建立三大核心规则：力量来源、使用代价、能力边界？"
  - "种族设定的深度检查：每个主要种族是否有独特的语言特征、社会组织、信仰体系和物质文化？"
  - "历史层叠感：是否存在至少三层历史（神话时代/古代帝国/近代变迁）在当代留下痕迹？"
  - "经济基础：奇幻世界的贸易、货币、资源分布是否有基本逻辑（不要求精细到经济学论文）？"
  - "地图一致性：角色的旅行时间/距离是否与已建立的地理尺度一致？"
  - "宗教/信仰体系：多个神祇/教派之间的关系和冲突是否有真实的神学/政治逻辑？"

# ---- 情节检查 ----
plot_checks:
  - "英雄之旅十二阶段是否在情节中可被辨认？是否有刻意违反或创新？"
  - "每个视角人物的故事线是否独立完整可追踪？"
  - "伏笔设置是否足够隐蔽但回顾时可辨认？（奇幻读者极其享受'重新发现'的阅读体验）"
  - "魔法在关键情节中的作用是否有规则依据，而非'需要什么就出现什么'？"
  - "战争/冲突场景中，地形、兵力、魔法、后勤等因素是否被合理考虑？"
  - "是否有'中土世界综合征'——世界太广阔以至于主角的路程大部分在赶路描写？"

# ---- 连续性检查 ----
continuity_checks:
  - "魔法能力的一致性：同一角色的魔法能力在同一阶段不能忽强忽弱"
  - "种族特征的持续性：已建立的种族生理/魔法特征在全文保持一致"
  - "时间尺度的合理性：涉及超长寿命种族（精灵/龙等）的时间感是否合理？"
  - "语言/名称系统：人名/地名/魔法术语在同一文化来源中是否有统一的语言风格？"
  - "季节与地理：气候带和季节变化是否符合世界观中的地理设定？"

# ---- 类型特定防护 ----
genre_specific_guards:
  - "防魔法万能化：任何问题都不能只用'因为他会魔法'来解决——每次魔法使用都需有规则引用"
  - "防种族刻板化：检查每个种族的角色是否都展现了该种族设定内的多样性（并非所有矮人都嗜酒固执）"
  - "防古语滥用：文言/古语对话不超过总对话的15%，否则严重影响可读性"
  - "防信息倾倒：世界观设定信息每章通过叙事展示不超过3条新设定，避免'设定章'"
  - "防中土疲乏：连续3章以上以旅程/赶路为主要内容时提醒作者切入事件"
  - "防反派单薄：黑暗君主的动机需经过'如果从TA的视角写，这是不是一个合理的故事'测试"

# ---- 禁用模式 ----
forbidden_patterns:
  - pattern: "标准奇幻种族无创新套用"
    reason: "直接使用托尔金/龙与地下城标准种族设定而不做任何创新——奇幻读者对种族设定的敏感度极高，套壳会被视为缺乏创造力"
  - pattern: "失忆作为角色动机的唯一来源"
    reason: "主角失忆从而一切行为都有理由——过于偷懒的角色设计，回避了真正的角色建设"
  - pattern: "最终决战靠突然觉醒的新力量"
    reason: "战斗中突然觉醒之前从未暗示的能力——属于最典型的机械降神"
  - pattern: "预言说啥就发生啥，毫无偏差"
    reason: "预言的魅力在于其多义性和自我实现/打破的戏剧性——直白实现的预言浪费了此元素"
  - pattern: "黑暗君主被消灭世界瞬间美好"
    reason: "史诗奇幻的核心信念之一是'问题不能靠杀死一个人解决'——简单化的结局不符合类型深度"
  - pattern: "配角在每本书只用一次然后被遗忘"
    reason: "史诗奇幻读者会追踪所有角色——遗忘角色会破坏叙事的史诗感"

# ---- 读者吸引力法则 ----
reader_pull_rules:
  - "奇幻读者最享受的是'慢慢拼出世界拼图'——不要一次展示全部世界观，而是通过不同视角逐步揭示"
  - "史诗奇幻读者忍受慢热的耐心比其他类型高，但前100页内必须有至少一个让他们'哇'的设定或场景"
  - "地图的重要性格外高——确保叙事中的地理描述与地图一致，奇幻读者真的会对照地图阅读"
  - "角色之间的关系变化是最强的情感锚——奇幻读者追多卷本的持续动力往往是'这些人的命运'"
  - "设定细节的真实感是加分项——一个合理的粮草补给线设定比十个炫酷魔法更让硬核奇幻读者信服"

# ---- 大纲验证规则 ----
outline_validation_rules:
  - "是否有完整的世界设定文档，且主要设定在大纲中有对应展示节点？"
  - "多视角故事线是否有交叉矩阵——标出各视角路线在何处交汇？"
  - "魔法体系的规则是否在大纲的每个魔法使用节点中被遵守？"
  - "政治势力之间的关系变化是否有因果链——A与B结盟不是因为'需要结盟'而是因为有具体的共同利益/威胁？"
  - "预言/命运元素是否在每个提及节点都有多义性解释空间？"
  - "是否有完整的附录计划——角色表、家族谱系、年表、地图？"

# ---- 智能体审查聚焦点 ----
agent_focus:
  focus: "世界观原创性评估"
  detail: "通过奇幻套路数据库比对，标记过度依赖经典奇幻套路而缺乏创新的设定"
  focus: "魔法规则审计"
  detail: "提取所有魔法使用场景，对照已建立魔法规则，标记违规使用或规则矛盾"
  focus: "叙事节奏监控"
  detail: "分析单章事件密度和多线平衡，标记单线占据过多篇幅或某线被遗忘的段落"
  focus: "种族文化深度"
  detail: "检查每个种族是否有超越外观的独特文化逻辑在情节中体现"
  focus: "历史连贯性"
  detail: "追踪所有提及的历史事件和远古遗产，验证其在当代情节中的一致性和相关性"

# ---- 审查提问 ----
review_questions:
  - "这个世界的魔法体系中最独特的规则是什么？读者能否用一句话向别人描述并使对方感到好奇？"
  - "如果从反派的视角重写这个故事，它是否仍然是一个合理且有力的叙事？"
  - "是否存在一个种族的设定从头到尾没有超越'第一印象'的深度（如矮人从头到尾就只会打铁和喝酒）？"
  - "所有提及的古代遗迹/预言/神器是否都在最终情节中有实际作用？有没有被遗忘的元素？"
  - "主角的旅程是否有非魔法的困难——饥饿、寒冷、疲惫、孤独？这些'人的困境'让奇幻接地气。"
  - "在多视角叙事中，是否存在某个视角章节读者会想跳过？如果是，该视角需要什么来提升吸引力？"
  - "这个世界的'历史'是否能让人感受到时间厚度？还是所有设定都像是在上个星期刚刚发生的？"
