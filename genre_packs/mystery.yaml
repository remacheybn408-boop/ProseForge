# ============================================================
# 悬疑推理小说体裁规则包
# ============================================================
genre_id: mystery
name: 悬疑推理
description: >
  悬疑推理小说体裁规则包，涵盖本格推理、社会派推理、悬疑惊悚、刑侦破案、倒叙推理、
  密室推理等子类型。核心要素包括案件设定、线索铺设、红鲱鱼（误导线索）、逻辑链条、
  侦探/调查者视角、真相揭示等。此类作品对逻辑严密性、线索公平性和真相震撼度有极高
  要求——读者与侦探处于信息对等位置，任何逻辑漏洞都会严重破坏阅读体验。

# ---- 核心承诺 ----
core_promises:
  - "所有破案所需的关键线索在真相揭示前已公平地呈现给读者（公平性原则）"
  - "真相在逻辑上必须唯一且合理——所有线索能拼合出唯一解，不存在多个等可能的解释"
  - "红鲱鱼（误导线索）有合理的来源和解释，不是作者随意插入的欺骗"
  - "侦探/调查者发现真相的过程展示完整的推理链，不依赖直觉或巧合"
  - "案件的动机、手法、时机三者形成逻辑闭环，无明显漏洞"
  - "结局的真相必须比读者在阅读中可能猜到的版本更有冲击力或深度"

# ---- 读者期待 ----
reader_expectations:
  - "前3章内明确案件的核心疑问（谁/为何/如何），让读者知道'要解什么谜'"
  - "线索以'显隐结合'方式呈现——部分线索显眼但易被误读，部分线索隐蔽但可回溯发现"
  - "在真相揭示前至少提供一次合理的'假解答'（红鲱鱼的集大成），增加推理的层次感"
  - "侦探的个人背景/创伤与案件的关联在故事中逐步揭示，而非仅作为人设标签"
  - "受害者不应只是'尸体'——应有足够的生前信息让读者在意案件的解决"
  - "节奏控制：至少每5章提供一个新的重要线索或重大嫌疑人的变化"

# ---- 常见冲突 ----
common_conflicts:
  - "侦探vs嫌疑人：审讯/对话中的心理博弈——悬疑推理的核心冲突形式"
  - "侦探vs体制/上级：办案阻力、官僚阻碍、破案与维稳的张力（社会派推理重点）"
  - "侦探vs自身：过往创伤影响判断、道德灰色地带、调查手段的合法性困境"
  - "嫌疑人vs嫌疑人：利益冲突、互相栽赃、同盟破裂"
  - "真相vs假象：每发现一层真相，发现下面还有更深层的谎言"

# ---- 章节节奏 ----
chapter_rhythm:
  pace: "前期（案件建立期）：节奏可稍缓，建立场景、人物和初始疑点。中期（线索搜集期）：节奏加快，每章应有新信息注入。后期（真相逼近期）：节奏加速到最快，黑白颠倒、信息密集轰炸。真相揭示章：慢下来，让推理完整地展现。节奏把控的关键——'什么时候给读者什么信息'。"
  hook_placement: "每章结尾的钩子应围绕信息的'获得'或'质疑'：获得了一条诡异线索、发现某人的证词有矛盾、关键证据被销毁。最强钩子类型——'反转钩子'：读者和侦探刚刚确认的'事实'在章末被新证据动摇。避免连续使用同类型钩子。"
  climax_pattern: "高潮为真相揭示场景（通常为侦探召集所有相关人进行最终推理陈述，或侦探与真凶的终极对峙）。真相揭示前至少有3章的'旋紧螺丝'期（压力不断增大）。揭示过程中，每个关键推理步骤都需回溯到前文展示过的具体线索。揭示后应有1-2章的余波期，处理真相带来的情感和社会后果。"

# ---- 角色原型 ----
character_archetypes:
  - name: "侦探/调查者"
    traits: "具有特殊的观察力或思维方式（不一定是超能力）。有自身缺陷或未解决的过去。推理过程有迹可循而非凭空猜测。"
    checks: "侦探的推理是否每一步都可追溯其依据？侦探的个人缺陷是否在查案过程中构成实际障碍？"
  - name: "搭档/助手"
    traits: "功能上作为'华生角色'——让侦探有对象可以解释推理过程（也即向读者解释）。但必须有独立性格和能力，不能只是提问机器。"
    checks: "助手的提问是否真正代表了读者的疑问？助手是否有独立推动情节的时刻？"
  - name: "红鲱鱼嫌疑人"
    traits: "有充足的动机、机会和能力显得像真凶。其'嫌疑'被一条或多条合理线索支撑。最终被排除的原因必须有确凿证据而非'感觉不对'。"
    checks: "红鲱鱼的嫌疑解除是否逻辑完整？是否在解除前让读者真心怀疑过此人？"
  - name: "真凶"
    traits: "在前期看似无辜或不被注意。动机有深度（不一定是同情，但需可理解）。行为逻辑自洽——掩盖罪行的动作不能是纯粹为了给侦探找麻烦。"
    checks: "真凶在真相揭示前是否至少出现过3次？其行为回看时是否每条都符合其动机？"

# ---- 世界观检查 ----
worldbuilding_checks:
  - "案件发生的时间、地点、社会环境是否有清晰的设定，且这些设定是否影响了案件本身？"
  - "调查的技术手段（法医、监控、通信等）是否与时代背景一致且前后一致？"
  - "法律/司法环境的设定是否真实且在案件中持续起作用（逮捕条件、证据链要求等）？"
  - "如果涉及特定专业领域（法医学、黑客技术、金融犯罪等），专业知识是否准确？"

# ---- 情节检查 ----
plot_checks:
  - "线索检查表：列出所有呈现过的线索，每一项是否在真相揭示中得到了解释或排除？"
  - "时间线审查：案件发生的时间线是否在所有相关人的口供中自洽？矛盾处是否被解释？"
  - "动机审查：真凶的动机是否足够强大以驱动其犯下此案？是否与其性格一致？"
  - "红鲱鱼审查：每条误导线索是否有合理来源（他人谎言/巧合/误读）而非作者硬塞？"
  - "可行性与不可行性：真凶的手法在实际条件下（时间/体力/工具/知识）是否可行？"
  - "是否有'侦探知道但读者不知道'的关键信息？如有，除非是倒叙推理的刻意设计，否则视为违规"

# ---- 连续性检查 ----
continuity_checks:
  - "天气/光照/交通状况等客观环境是否在案件相关场景中保持一致？"
  - "角色的物理状态（受伤、醉酒、疾病等）是否在时间线中保持合理变化？"
  - "物证状态（血迹干涸程度、尸体僵硬程度等）是否与设定时间线匹配？"
  - "不同角色的证词中关于同一事件的时间/地点/人员是否一致？矛盾处是否有解释？"

# ---- 类型特定防护 ----
genre_specific_guards:
  - "防信息隐藏：标记所有'侦探知道但文本未展示'的关键信息——除非用于倒叙推理的刻意设计"
  - "防动机薄弱：真凶的动机审查——如果答案是'因为他就是变态'，则需要有变态心理的合理铺垫"
  - "防万能法医/技术：法医和技术手段发现的线索应该有具体过程，不能作为'黑箱'随意出结果"
  - "防巧合破案：侦探不能靠碰巧看见/听见/捡到来获得决定性线索"
  - "防结局泄气：真相不能比读者在读中猜到的更平庸——需要至少一层'读者没想到但回头看合理'的反转"

# ---- 禁用模式 ----
forbidden_patterns:
  - pattern: "双胞胎/长相相同作为核心诡计"
    reason: "悬疑推理界被过度使用到几乎成为禁忌的诡计，除非有极其新颖的变体，否则读者会产生'就这？'反应"
  - pattern: "叙述者即凶手但从未提及"
    reason: "利用第一人称叙事隐藏凶手身份，但未提供任何线索可将叙述者纳入嫌疑人范围——属于对读者的欺骗而非公平游戏"
  - pattern: "超自然力量作为最终解答"
    reason: "在非超自然设定的推理小说中，最终用鬼魂/超能力解释案件——严重违背类型契约"
  - pattern: "凶手是之前从未出现过的角色"
    reason: "读者没有机会推理出真凶——严重违背公平原则"
  - pattern: "侦探藏着关键证据直到最后一刻"
    reason: "除非是倒叙推理的刻意设计，否则违背公平游戏原则"
  - pattern: "所有线索全在最终章一口气解释"
    reason: "剥夺读者的推理参与感，把推理小说降格为'最后听结论'的旁观模式"

# ---- 读者吸引力法则 ----
reader_pull_rules:
  - "每释放一条新线索都需要伴随一种解释的可能性（即使可能是误导），让读者始终在'猜测-验证'的循环中"
  - "'反转-再反转'的节奏：不要在连续两章中使用反转，中间需要让读者有消化和重新推理的时间"
  - "悬疑读者的最大动力是'我能不能比侦探先猜出真相'——不要为了难度而刻意隐藏信息"
  - "让嫌疑人'活'起来——读者对谁是真凶的关切程度与其对角色的在意程度成正比"
  - "社会派推理的钩子更多来自'真相揭露的社会震撼'而非单纯的'谁是凶手'"

# ---- 大纲验证规则 ----
outline_validation_rules:
  - "大纲中是否包含完整的线索地图，标注每条线索的首次出现章节和最终解释章节？"
  - "是否有红鲱鱼的误导路线图，展示读者被引导的推理路径？"
  - "真凶的身份是否在大纲前20%的章节中至少出现过？"
  - "所有嫌疑人的动机-机会-能力三角形是否在大纲中有明确标注？"
  - "关键反转点的逻辑是否在伏笔中支撑——列出每个反转的3条以上前期铺垫？"
  - "案件的时间线是否经得起倒推验证（从结局反向检验每个时间节点）？"

# ---- 智能体审查聚焦点 ----
agent_focus:
  focus: "线索公平性审计"
  detail: "建立完整线索清单，逐条验证在真相揭示前是否已呈现给读者，标记未公平呈现的线索"
  focus: "红鲱鱼质量评估"
  detail: "检查每条误导线索是否有合理来源，评估其误导效果是否自然"
  focus: "逻辑漏洞扫描"
  detail: "建立案件时间线、人物行动线、物证状态线的交叉比对，标记逻辑矛盾"
  focus: "动机深度检测"
  detail: "评估每个关键角色的行为动机是否充分且与性格一致"
  focus: "推理链完整性"
  detail: "追踪侦探从初始疑点到最终结论的每一步推理，检查是否有逻辑跳跃"

# ---- 审查提问 ----
review_questions:
  - "如果读者在最终揭示前回翻前文，他们能发现所有的关键线索吗？哪些线索是读者理论上不可能发现的？"
  - "真凶的动机在一个普通人的情感框架内是否可以被理解（不一定要被认同）？"
  - "红鲱鱼嫌疑人被排除的原因是否同样经得起推敲？有没有读者会认为红鲱鱼嫌疑人的嫌疑更大？"
  - "侦探解决案件的方法是否可以被另一个同样聪明的角色复制？还是依赖了只有侦探才有的特殊条件？"
  - "如果去掉所有的误导红鲱鱼，故事的核心案件本身是否仍然有趣？"
  - "案件的手法在现实条件下是否可行？（如果涉及专业领域，是否已做足功课？）"
  - "真相揭示后，回看整个故事，是否所有的'巧合'都有了合理的因果解释？"
