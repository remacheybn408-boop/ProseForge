# ============================================================
# 盗墓探险小说体裁规则包
# ============================================================
genre_id: tomb_raider
name: 盗墓
description: >
  盗墓探险小说体裁规则包，涵盖以古墓探索、文物寻宝、冒险解谜为核心的
  作品类型。核心要素包括墓葬建筑与机关、风水堪舆、文物历史、团队协作
  和危险应对。此类作品的核心魅力来自未知的探险感、机关解谜的智力挑战
  和历史文化的熏陶。

core_promises:
  - "墓葬/遗迹有历史和文化的合理依据——不是随便一个地下有很多宝物的山洞"
  - "机关/陷阱有古代科技的逻辑基础——基于真实的古代工艺水平而非魔法"
  - "团队需要多种专业技能配合——一人全能是不现实的"
  - "文物的描述和背景有历史依据——虽然是虚构但要有真实的细节支撑"
  - "探索过程展示完整的'进入-深入-危机-发现-脱出'闭环"
  - "非自然现象有合理的解释——科学解释优先,超自然设定需在开篇建立"

reader_expectations:
  - "第一个古墓/遗迹的探索在10章内展开"
  - "至少展示2-3种不同类型的机关/陷阱——非重复使用同一模式"
  - "文物/古物的背景故事被揭示——每一件重要文物都有一段历史"
  - "团队的专业分工和协作被具体展示——各司其职"
  - "历史上真实的文化/考古元素被融入虚构——让读者学到真东西"
  - "危险的逐步升级——从简单陷阱到复杂的古代机关再到未知之物"

common_conflicts:
  - "自然机关vs人力：古代工匠的智慧与现代探险者的对抗"
  - "团队内部信任与背叛：宝物诱惑下的人性考验"
  - "文物保护vs利益追求：学术良知与财富诱惑的冲突"
  - "外部竞争者：其他探险队/盗墓团伙/国际文物贩子的竞争"
  - "古人智慧与现代科技的碰撞：两者各自的优劣势"

chapter_rhythm:
  pace: "墓外准备期——搜集资料/组建团队/规划路线——中速推进。进入初期——建立氛围/观察环境/发现第一个线索——速度稍缓以建立紧张感。深入探索——遇到机关/陷阱/谜题——节奏加快。核心区域——最大危险/最大谜团揭晓——最高速紧张推进。脱出阶段——危机仍未结束——保持高速直到返回安全地点。两墓之间的过渡章——整理收获/处理后果/规划下一步——舒缓节奏。"
  hook_placement: "盗墓探险最强钩子——'门后的东西'——打开一扇机关门后会出现什么。其次是'这块文物的秘密'——发现了新线索指向更深层的真相。再次是'机关/陷阱的逼近'——时间限制下的生死逃脱。还有'身边人的可疑行为'——队伍里可能有不纯动机的人。"
  climax_pattern: "每座墓的高潮通常是核心墓室的发现——最大的宝藏/最危险的守护机关/最重要的真相揭露。全书高潮往往是最大/最古老的遗迹的核心——可能涉及改变历史的重大发现。结局不一定是'拿到宝贝发大财'——可能是对文化遗产的深刻领悟和保护。"

character_archetypes:
  - name: "专家主角"
    traits: "在某个领域（考古/风水/历史/机关术）有深厚造诣。对古代文化有真实的热情和尊重。"
    checks: "主角的专业知识是否有具体应用展示——而非仅是用'我很专业'带过？其知识是否有局限性（如某种文明/时期的盲区）？"
  - name: "技术/装备担当"
    traits: "负责现代探测设备/武器/交通工具。有野外探险和应急处理能力。"
    checks: "科技装备是否有真实的限制（电池/信号/重量等）——而非无限使用？"
  - name: "风水/玄学专家"
    traits: "掌握传统堪舆/易学/星象等知识。能解读古人布置的空间逻辑。"
    checks: "风水玄学的应用是否有具体的原理说明——而非玄之又玄？其解释是否在某些时候被证明不正确？"
  - name: "财力支持者/委托方"
    traits: "提供探险的资金和资源。可能有隐藏的私人动机（得到某件特定文物/长生不老/救赎等）。"
    checks: "委托方的隐藏动机是否在适当时候揭示——且揭示后有合理的解释？"
  - name: "本地向导/守护者"
    traits: "了解当地的地形/气候/传说。可能是遗迹/古墓所在区域的世代守护者后代。有地方性知识。"
    checks: "本地角色是否被赋予了独立的人格和尊严——而非单纯的'带路NPC'？"

worldbuilding_checks:
  - "古代文明的设定是否有历史/考古学的基础——即使完全架空也需要内部逻辑？"
  - "机关/陷阱的技术原理是否基于古代科技水平——过于超现实的机关需要解释"
  - "风水/墓葬格局的描写是否符合传统堪舆学的基本逻辑？"
  - "文物/古物的材质和工艺是否与设定时代的技术水平匹配？"
  - "不同朝代的器物/建筑/文字风格是否有区分？"

plot_checks:
  - "每座墓/遗迹的探索是否有独立的核心谜团和解答？"
  - "机关/陷阱的设计是否有多样性——避免用同类型的机关反复？"
  - "文物的保存状态是否合理——千年真迹的脆弱性和珍贵性"
  - "是否存在'碰巧触发'的过多巧合——专业的探险应依靠知识而非运气"
  - "反派的动机是否有超越'我要宝藏'的更复杂层次？"
  - "结局是否对文化遗产的保护/归还/正确处置有明确的立场？"

continuity_checks:
  - "已获得的文物/物品的持有和状态是否被跟踪？"
  - "团队的装备/物资消耗是否合理？"
  - "探索过的地方/解开的谜团是否有记录——过往发现对后续探索的影响？"
  - "外部势力/竞争者的状态和位置是否一致？"
  - "地理位置的移动和时间跨度是否合理？"

genre_specific_guards:
  - "防'机关无限流'：墓中不能有无穷无尽的机关——数量和质量需要合理"
  - "防'宝贝=超能力'：避免文物被赋予过度的超自然力量——历史文化价值>超自然魔力"
  - "防'古人降智'：古代工匠的智慧应被尊重——他们的机关设计使用了那个时代最高智慧"
  - "防'运气替代知识'：关键的发现/脱险不能全靠主角碰巧——专业知识应该起主导作用"
  - "防'专业错误'：考古/风水/历史等专业知识需要基本准确——错误可能引发专业读者反感"
  - "防'掠夺合理化'：盗墓题材不应教唆人物破坏或非法占有文物——要建立正确的文物保护观"

forbidden_patterns:
  - pattern: "古人机关=魔法"
    reason: "在不设超自然力量的世界中——古代机关不能有超越时代物理法则的原理"
  - pattern: "所有机关都能恰好化解"
    reason: "团队应有受伤/牺牲——完美的无伤通关降低危险感"
  - pattern: "文物=道具"
    reason: "每件重要文物应有其历史故事和文化背景——不能只是'能卖多少钱'的玩具"
  - pattern: "本地角色纯工具化"
    reason: "本地向导/守护者应有独立的性格和动机——不能只是带路或送情报"
  - pattern: "室内无限制探索"
    reason: "补给/照明/氧气/时间等实际限制应在墓中持续存在"
  - pattern: "国宝流失/毁灭无后果"
    reason: "对重要文物的处理应有社会/法律/道德上的考量"

reader_pull_rules:
  - "探索未知的'门后恐惧'——每个新的空间都可能带来惊喜或惊吓"
  - "历史谜团的拼图快感——新发现如何改变对古代文明的理解"
  - "机关解谜的智力参与——读者也能跟着主角一起推理"
  - "古代工匠智慧的钦佩——'原来古人能做到这个'的敬畏感"
  - "团队成员间的化学反应——在封闭环境中的动态关系"

outline_validation_rules:
  - "每座墓/遗迹的结构图和核心谜团是否已设计？"
  - "重要文物的清单及其历史背景是否已建立？"
  - "机关/陷阱的类型分布是否均衡？"
  - "地理探险路线和时间线是否已规划？"
  - "主线谜团（贯穿全书的更大秘密）的揭示节点是否标注？"

agent_focus:
  - focus: "专业知识准确性"
    detail: "检查考古/风水/机关等技术描述是否符合基本常识"
  - focus: "探索完整性"
    detail: "检查每次探险是否有完整的准备-进入-探索-发现-脱出闭环"
  - focus: "机关多样性"
    detail: "统计机关类型,标记频繁重复同类型机关"
  - focus: "文物-情节关联"
    detail: "确保重要文物有背景故事且在情节中发挥作用"
  - focus: "团队角色功能性"
    detail: "统计每个团队成员在每次探险中的独立贡献"

review_questions:
  - "你的古墓设置中有哪种机关会让读者'哇这个真巧妙'——而非'又是飞箭'？"
  - "团队中最专业的成员的技能有哪一次是被真正考验至极限的？"
  - "某件重要的文物有什么样的历史故事——它值得成为博物馆的镇馆之宝吗？"
  - "你的故事中处理了'文物保护vs私人探索'这个伦理张力吗？如何处理？"
  - "所有的古墓和遗迹是否都有各自独立的'性格'——还是只是换了不同的陷阱组合？"
