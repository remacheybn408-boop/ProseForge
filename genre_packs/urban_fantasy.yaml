# ============================================================
# 都市异能小说体裁规则包
# ============================================================
genre_id: urban_fantasy
name: 都市异能
description: >
  都市异能小说体裁规则包，涵盖都市背景下融入超自然能力的作品类型。核心要素包括
  现实世界与异能体系的交织、隐藏于日常中的超自然世界、力量与普通生活的平衡。
  此类作品需要同时满足都市小说的现实感和异能小说的力量体系要求，是双重标准的挑战。

core_promises:
  - "异能体系有清晰且自洽的规则——来源、分级、代价和限制缺一不可"
  - "异能世界的存在有合理的隐藏机制——为何普通人不知道，这个机制不能是简单的'大家都不说'"
  - "主角的异能成长有明确的阶段性，每次提升有相应的代价或条件"
  - "都市生活与异能身份之间存在真实张力——不能随时切换而无代价"
  - "力量体系与现代社会产生有意义的互动——科技/军队/监控系统与异能的碰撞必须被认真对待"
  - "反派的动机和异能来源同样符合体系规则，不存在'因为他是BOSS所以更强'"

reader_expectations:
  - "异能体系的基本规则在前10章内被清晰展示"
  - "主角获得异能的方式有其独特性（非大众化觉醒）"
  - "第一个展示异能'真正效果'的战斗/事件在3-5章内发生"
  - "日常都市场景与异能战斗场景的比例大约为4:6或3:7（视作品调性）"
  - "政府/权力机构对异能者的态度在第30章前被明确或暗示"
  - "存在与主角实力相当的竞争对手/宿敌"

common_conflicts:
  - "异能暴露风险：在都市环境中使用异能被发现的政治和个人后果"
  - "力量与日常的撕裂：维护普通人际关系的同时应对超自然威胁"
  - "异能组织间的权力斗争：不同异能势力的利益冲突"
  - "异能资源的争夺：修炼资源/特殊物品的稀缺性驱动的竞争"
  - "科技与异能的冲突/融合：国家力量对异能的态度演变"

chapter_rhythm:
  pace: "都市日常和异能战斗交错推进。日常章节（约30%篇幅）建立人际关系和社会压力，战斗章节（约40%篇幅）展示力量成长和世界观。过渡章节中通过异能对日常生活的渗透制造张力。战斗之外的'信息战'和'社会博弈'应占相当比重。"
  hook_placement: "双线钩子——都市线以人际关系和社会身份悬念为主（身份暴露/关系破裂/组织变动），异能线以力量成长和威胁升级为主（新能力解锁/强敌逼近/秘密揭示）。两条线的最佳钩子交叉出现，确保读者不偏废任何一线。"
  climax_pattern: "卷高潮通常为双线汇聚——异能战斗的胜负同时解决都市线的社会危机（如公开身份/组织决裂/保护重要人物）。各卷应有独立反派和独立目标。全书高潮通常在异能世界与普通世界的最终公开/整合。"

character_archetypes:
  - name: "双面主角"
    traits: "在普通身份和异能身份间切换。两种身份都带来真实压力。在两个世界都有重要的人际关系。"
    checks: "两种身份间的切换是否有明确代价？是否在某些时刻必须做出艰难取舍？"
  - name: "异能导师"
    traits: "引入主角进入异能世界。自身有复杂的历史和立场。教导内容不仅是力量，也包括异能世界的规则和风险。"
    checks: "导师的信息披露节奏是否合理？导师自身的秘密是否在适当时候揭示？"
  - name: "普通人伙伴"
    traits: "不知道异能世界存在的密友/家人/恋人。构成主角维持普通生活的锚点。其安全受异能冲突威胁。"
    checks: "普通人伙伴的存在是否制造了真实张力（而非仅仅是待救的公主）？他们是否有独立的价值？"
  - name: "势力首领"
    traits: "控制异能组织/势力。有现实政治手腕。动机基于利益和理念，非纯粹善恶。"
    checks: "势力首领的决策是否始终符合其组织利益？其手段是否有政治智慧？"
  - name: "国家代理人"
    traits: "代表政府/军方对异能世界的态度。可能是合作者、监管者或对手。"
    checks: "国家力量的介入是否合理且持续？其对异能的态度是否有演变？"

worldbuilding_checks:
  - "异能体系的来源是否有统一逻辑？（如：基因突变、灵气复苏、古代血脉、外星科技等）"
  - "异能等级/分类是否清晰且一致？不同能力间的相互克制关系是否合理？"
  - "隐藏机制是否经得起推敲？（大量超自然事件不可能完全不留下痕迹）"
  - "科技手段（监控/卫星/网络/大数据）对异能者的制约是否被认真考虑？"
  - "异能世界的组织结构是否合理？资源/信息/人力的流动是否有逻辑？"
  - "普通社会对异能事件的反应是否真实？（舆论/政府/科学界的必然关注）"

plot_checks:
  - "异能暴露的风险是否逐步升级而非一成不变？"
  - "主角的双重身份是否在某些关键节点产生不可回避的冲突？"
  - "是否存在'异能万能解'——所有问题最终都用打架解决？"
  - "反派的计划是否有社会/政治层面的智慧（非单纯的力量碾压）？"
  - "主角的社会关系是否因为异能身份而产生真实的裂痕和修复？"

continuity_checks:
  - "异能等级/能力的描述在各章是否一致？"
  - "角色在两个世界的身份状态是否前后一致？"
  - "暴露/半暴露事件的处理是否持续影响后续情节？"
  - "物品/资源的获取和使用是否有完整记录？"
  - "社会关系因异能事件的变化是否被跟踪？"

genre_specific_guards:
  - "防'异能万能化'：不能每种困境都恰好有一个对应的异能可以解决"
  - "防'社会影响缺失'：大规模异能战斗后必须有社会层面的反应（新闻/调查/舆论）"
  - "防'身份切换零代价'：双重身份应有无法兼顾的时刻，需做出痛苦抉择"
  - "防'科技弱智化'：不能为了让异能显得强大而刻意弱化科技监控手段"
  - "防'势力脸谱化'：不同组织应有各异的理念和手段，非统一的'正派vs反派'"
  - "防'普通人NPC化'：普通人角色应有独立功能和情感价值，非背景板"

forbidden_patterns:
  - pattern: "异能体系无限扩张"
    reason: "后期不断添加新规则/新类型异能，使体系失去边界可预测性"
  - pattern: "主角的异能恰好克制一切对手"
    reason: "天命式能力克制消解战斗张力，是偷懒的设计"
  - pattern: "社会对异能事件无反应"
    reason: "在现代监控和社交媒体时代，大规模超自然事件不可能不被注意"
  - pattern: "国家力量缺失或降智"
    reason: "政府/军方对超自然力量一定有态度和行动，不可简单忽略"
  - pattern: "普通人关系无真实张力"
    reason: "长期对至亲隐瞒重大秘密不产生隔阂是不可能的"
  - pattern: "异能觉醒率失控"
    reason: "如果太多人觉醒异能，则世界本质已变，隐藏前提不再成立"

reader_pull_rules:
  - "力量体系的'探索感'是核心阅读动力——读者喜欢逐步了解异能世界的规则和秘密"
  - "双重身份的'面具感'制造持续的张力——主角何时暴露、暴露给谁"
  - "异能战斗在现代都市背景下的'视觉冲击'比纯幻想战斗更有魅力"
  - "科技vs异能的碰撞是独特爽点——如特种部队vs异能者、AI预测vs预知能力"
  - "社会身份晋升（职位/财富/地位）与异能成长双线并行，满足两种读者期待"

outline_validation_rules:
  - "异能体系的完整框架是否在大纲阶段已确定？"
  - "是否标注了每次重大异能提升的契机和代价？"
  - "双重身份暴露/半暴露的关键节点是否在大纲中设置？"
  - "国家/社会力量对异能世界的态度是否有演变线？"
  - "各势力的资源/人力/信息对比是否合理？"

agent_focus:
  - focus: "体系一致性"
    detail: "抽查异能表现是否符合已建立的分级和规则，标记矛盾处"
  - focus: "社会影响闭环"
    detail: "追踪异能事件的后续社会反应，标记'无影响'的遗漏"
  - focus: "双线整合度"
    detail: "检查都市线和异能线是否有机交织（而非机械交替）"
  - focus: "身份张力检测"
    detail: "分析主角双重身份的压力变化，标记长期无身份冲突的章节"
  - focus: "科技-异能互动"
    detail: "考察科技手段在情节中的使用，确保不对异能视而不见"

review_questions:
  - "如果媒体曝光了你笔下的异能世界，社会会如何反应？这个反应在你的故事中被刻画了吗？"
  - "主角的两种身份中，哪种更接近'真实的自己'？故事是否对此进行了探索？"
  - "异能体系中有没有'这个能力为什么没有彻底改变社会'的漏洞？"
  - "政府/军方在你的故事中是聪明的还是愚蠢的？为什么？"
  - "如果不使用异能，主角还能解决什么问题？"
