# ============================================================
# 通用小说体裁规则包 — 适用于无特定题材限制的小说创作
# ============================================================
genre_id: generic
name: 通用
description: >
  通用体裁规则包，适用于不限定特定题材的小说创作。涵盖所有小说类型共通的基本写作规范、
  叙事节奏、人物塑造和情节推进要求。当作品不属于任何特定类型（修仙、悬疑、末世等）时，
  或需要基础性、跨类型的写作指导时，使用此规则包。此包强调普适性的故事质量，而非类型
  特有的套路和惯例。

# ---- 核心承诺 ----
core_promises:
  - "故事有明确的开端、发展和结局，情节闭环完整"
  - "主角有清晰的目标或欲望，驱动故事向前推进"
  - "每个情节段落都存在因果关系，而非随机事件的堆砌"
  - "读者能在前3章内明确故事的主要冲突方向和基调"
  - "人物行为符合其已建立的性格设定，不出现无铺垫的性情突变"
  - "每章结尾提供至少一个让读者继续翻页的理由（悬念、疑问或情感锚点）"

# ---- 读者期待 ----
reader_expectations:
  - "故事核心矛盾在第1章内被提出或暗示"
  - "主要人物在登场时提供足够的外貌、性格和动机描写，让读者形成清晰印象"
  - "世界观设定不过度堆砌，首次出现时用叙事方式自然融入而非大段说明书"
  - "对话推动情节或揭示人物，而非单纯填充字数"
  - "情节密度适中——单章内至少发生一个有意义的事件或信息变化"
  - "故事基调（严肃/轻松/黑暗/温馨）在前3章内建立并贯穿始终，不出现突兀的基调断裂"

# ---- 常见冲突 ----
common_conflicts:
  - "人物vs自我：内心矛盾、道德困境、身份认同危机"
  - "人物vs人物：价值观对立、利益争夺、情感纠葛"
  - "人物vs社会：制度不公、阶层隔阂、偏见与歧视"
  - "人物vs自然/环境：生存挑战、灾难应对、环境变迁"
  - "人物vs命运：不可抗力、宿命对抗、因果报应"

# ---- 章节节奏 ----
chapter_rhythm:
  pace: "前3章建立基础——每章推进一条主线情节至少一个节点，同时铺设1-2条暗线线索。中期章节保持事件密度，单章事件数不少于2个（包括对话场景的推进）。高潮章节加速节奏，缩短描写、增加动作和对话占比。收尾章节给读者情感释放空间，不过度仓促。"
  hook_placement: "每章结尾必须设置钩子——可以是悬念（待揭示的信息）、情感钩子（人物关系变化带来的期待）或情节钩子（即将发生的冲突）。前5章每章结尾钩子需足够强，使读者有明确动力阅读下一章。避免使用'然后他晕了过去'类型的空泛钩子。"
  climax_pattern: "故事整体遵循经典三幕结构或起承转合。高潮发生在总篇幅的70%-85%位置。高潮前的铺垫需至少3-5章的持续加码，让读者感受到压力升级。高潮解决必须来自主角的主动选择和行动，而非外部力量的突然介入（除非解围型外部力量有充分前期铺垫）。"

# ---- 角色原型 ----
character_archetypes:
  - name: "主角"
    traits: "有明确的核心欲望和内在缺陷。欲望驱动外部行动，缺陷制造内部冲突。主角必须做出影响故事走向的关键选择。"
    checks: "欲望是否在第1章明确？缺陷是否在故事中造成实际阻碍？关键选择是否真正改变了故事方向？"
  - name: "导师/引路人"
    traits: "提供知识、工具或世界观视角，但不应代替主角解决问题。存在时间有限或能力有边界。"
    checks: "导师的介入是否阻碍了主角的主动性？导师是否在适当时机退出/消失？"
  - name: "对手/反派"
    traits: "有自身逻辑自洽的动机，非纯粹邪恶。行动对主角造成实质威胁。"
    checks: "反派的动机是否可理解（虽不认同）？反派是否在故事中也有成长或变化？"
  - name: "伙伴/盟友"
    traits: "有独立于主角的目标和性格。与主角形成互补或对照。"
    checks: "伙伴是否有独立的功能（不止是应声虫）？伙伴关系是否有起伏变化？"

# ---- 世界观检查 ----
worldbuilding_checks:
  - "世界观要素首次出现时是否通过角色体验/互动自然呈现，而非旁白解说？"
  - "设定是否保持内部一致性？（如魔法/科技/规则在同一体系内不自相矛盾）"
  - "世界观是否服务于故事，而非反过来？（不为展示设定而牺牲叙事节奏）"
  - "新设定信息是否在读者需要知道的时候给予，而非一次性倾倒？"

# ---- 情节检查 ----
plot_checks:
  - "每个场景是否推进了至少一条情节线（主线或支线）？"
  - "是否存在可以删除而不影响故事完整性的'冗余章节'？"
  - "情节推进是否依赖巧合/偶然超过2次？（超过则需重新设计因果链）"
  - "伏笔是否在后续章节中回收？（每个伏笔都应有一个以上的呼应点）"
  - "关键转折点是否由主角的主动选择驱动，而非被动遭遇？"

# ---- 连续性检查 ----
continuity_checks:
  - "时间线：事件之间的时间间隔是否合理且一致？跨章时间跳跃是否有明确标注？"
  - "空间：场景转换是否清晰？人物位置关系是否一致（如A在屋里，B在门外，对话间的距离感是否合理）？"
  - "人物状态：角色的伤情、情绪、装备/物品状态是否前后一致？"
  - "设定一致性：前面建立的规则/限制是否在后面被无解释地打破？"
  - "称呼一致：同一人物在不同场景的称呼是否一致（除非有叙事理由的切换）？"

# ---- 类型特定防护 ----
genre_specific_guards:
  - "防止'万能解法'：主角解决问题的方式应有代价或限制，不能无限复用"
  - "防止'玛丽苏/龙傲天'：主角的成功应有合理的过程和代价，保持挫折比例不低于30%"
  - "防止'工具人化'：配角不应只在主角需要时才出现，应有自己的生活线和合理出场时机"
  - "防止'信息不对等滥用'：读者不应长期被蒙在鼓里而主角已知道一切——适当保持信息透明度"
  - "防止'情感通胀'：情感高潮需要积累和对比，不能每章都在飙泪/怒吼/震撼"

# ---- 禁用模式 ----
forbidden_patterns:
  - pattern: "梦中梦/全是梦"
    reason: "使读者产生被欺骗感，消解故事意义，属于最被读者厌恶的结局模式之一"
  - pattern: "主角全程被动到结局"
    reason: "违背故事的基本契约——主角应推动而非仅仅见证故事"
  - pattern: "机械降神（天降奇兵式解决）"
    reason: "无铺垫的外部力量突然解决核心矛盾，破坏情节建构的完整性"
  - pattern: "关键信息全部靠对话交代"
    reason: "纯信息型对话（角色A对B大段解释背景）使叙事沦为广播，应用动作和场景替代"
  - pattern: "角色智商骤降以服务情节"
    reason: "让聪明角色突然做蠢事来推进情节，是最被读者识破并厌恶的偷懒手法"
  - pattern: "滥用巧合推进关键情节"
    reason: "超过2次重要巧合会使故事失去因果逻辑，沦为'命中注定'式的机械叙事"

# ---- 读者吸引力法则 ----
reader_pull_rules:
  - "每章结尾的钩子需包含明确的'提问'——让读者产生'然后呢'的紧迫感"
  - "情感节奏应有波峰波谷交替：紧张后应有喘息，悲伤后应有温暖，避免单一情绪疲劳"
  - "信息释放节奏：大揭秘前应有小块信息铺垫（'面包屑原则'），让读者有拼图快感"
  - "人物关系应有动态变化——读者最关注的是'人和人之间发生了什么'"
  - "适度使用'预期违背'——读者以为要发生A，结果发生了更合理的B"

# ---- 大纲验证规则 ----
outline_validation_rules:
  - "大纲中是否包含完整的三幕结构或起承转合框架？"
  - "每个情节点是否有明确的因果驱动（因为X所以Y）？"
  - "主角的欲望线是否贯穿大纲始终？"
  - "反派的行动线是否在大纲中独立可追踪？"
  - "是否有明确的伏笔清单和对应的回收节点？"
  - "大纲的情感曲线是否呈现有起伏的波形（而非直线或混乱波动）？"
  - "高潮到结局的过渡是否有足够的收束空间（不少于总篇幅的10%）？"

# ---- 智能体审查聚焦点 ----
agent_focus:
  - focus: "因果关系检测"
    detail: "追踪每个情节节点的前因后果链，标记因果断裂或巧合依赖位置"
  - focus: "人物一致性"
    detail: "对比角色首次登场设定与后续行为，标记性格突变、能力突变或动机突变"
  - focus: "节奏分布"
    detail: "分析各章事件密度和情感强度，标记过长平淡期或过度密集的高潮期"
  - focus: "钩子有效性"
    detail: "检查每章结尾是否有足够的悬念或期待驱动，标记'可放下'的结尾"
  - focus: "伏笔回收率"
    detail: "追踪所有铺设的伏笔，在后续章节中搜索回收点，标记未回收的伏笔"

# ---- 审查提问 ----
review_questions:
  - "这个故事最核心的'一句话概括'是什么？主角想要什么，什么在阻止他？"
  - "前3章读完后，读者是否有足够的信息和兴趣继续阅读第4章？为什么？"
  - "如果删除第[N]章，故事是否仍能完整讲述？（测试冗余章节）"
  - "所有关键情节点是否由主角的主动选择推动？列出主角每项关键选择及其后果。"
  - "故事的结局是否让人感到'值得'——情感上的满足和逻辑上的闭合？"
  - "是否存在角色的行为与其已建立性格明显矛盾的地方？"
  - "世界观设定的信息是否在读者需要时自然出现，而非堆积在某一处？"
