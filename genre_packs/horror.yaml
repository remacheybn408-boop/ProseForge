genre_id: horror
name: 恐怖 / 惊悚
description: 通过未知威胁、规则压力和氛围递进制造恐惧感的叙事类型。
core_promises:
  - 渐进式的恐惧与紧张感
  - 有规则的威胁系统
  - 人物在恐惧中的真实反应
  - 悬念持续升级与释放
reader_expectations:
  - 恐惧感逐步加深
  - 威胁有逻辑边界
  - 主角不是无脑作死
  - 氛围通过细节而非形容词堆砌
common_conflicts:
  - 已知规则与未知威胁的矛盾
  - 团队分裂与信任危机
  - 生存本能与道德选择
  - 理性认知被超自然现象挑战
chapter_rhythm:
  pace: 前期缓慢铺垫，中期加速紧张，高潮释放后短暂喘息
  hook_placement: 每章结尾留未解威胁或新发现
  climax_pattern: 信息揭露与威胁升级交替
character_archetypes:
  - 理性分析型：试图用逻辑解释超自然现象
  - 敏感直觉型：先于他人感知到威胁
  - 怀疑否定型：拒绝承认危险直到为时已晚
  - 经验幸存者：知道规则但可能隐瞒
worldbuilding_checks:
  - 恐怖源的规则是否自洽
  - 威胁的边界是否清楚
  - 怪物的起源/动机是否有逻辑
  - 正常世界与恐怖世界的交界是否合理
plot_checks:
  - 恐惧是否递进而非一上来就吓人
  - 每次惊吓后是否有后果
  - 角色是否根据经验调整行为
  - 信息揭露是否控制节奏
continuity_checks:
  - 恐惧规则是否前后一致
  - 人物心理状态是否持续受影响
  - 已死/已消失角色是否被遗忘
genre_specific_guards:
  - 氛围递进检测：恐惧感是否逐章加深
  - 规则一致性检测：恐怖规则是否稳定
  - 惊吓密度检测：是否过度依赖突然惊吓
forbidden_patterns:
  - 只靠突然出现吓人
  - 恐怖规则随剧情随意变化
  - 全靠形容词渲染恐怖氛围
  - 主角明知危险偏要作死
  - 怪物/鬼魂万能无解
reader_pull_rules:
  - 每章结尾留悬而未决的威胁
  - 不让读者完全掌握威胁全貌
  - 偶尔给安全感再打破
outline_validation_rules:
  - 恐怖规则必须在早期建立
  - 关键惊吓节点必须预先铺垫
  - 结局必须有规则层面的解答
agent_focus:
  - 恐惧递进曲线是否合理
  - 恐怖规则是否稳定
  - 氛围营造是否靠细节
  - 人物反应是否符合人性
review_questions:
  - 本章恐惧感是否比上一章有所加深？
  - 恐怖规则是否出现矛盾？
  - 惊吓是否有充足铺垫？
  - 人物是否有不合理作死行为？
  - 氛围描写是否有具体感官细节？
