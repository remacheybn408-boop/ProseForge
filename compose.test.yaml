services:
  api:
    environment:
      PROSEFORGE_PUBLIC_URL: http://web
      PROSEFORGE_LOGIN_RATE_LIMIT_ATTEMPTS: "20"

  postgres:
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

  redis:
    volumes:
      - redis-test-data:/data

  provider-mock:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: ["python", "tests/e2e/mock_provider.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/v1/models')"]
      interval: 2s
      timeout: 3s
      retries: 15

  legacy-test:
    build:
      context: .
      dockerfile: docker/legacy-test.Dockerfile
    command: ["sh", "-lc", "pytest -q tests/test_*.py --junitxml=/artifacts/pytest.xml"]
    volumes:
      - .:/app
      - ./artifacts:/artifacts

  api-test:
    extends:
      service: legacy-test
    build:
      context: .
      dockerfile: docker/test.Dockerfile
    command: ["pytest", "-q", "--junitxml=/artifacts/api-pytest.xml"]
    environment:
      PROSEFORGE_DATABASE_URL: postgresql+asyncpg://proseforge:proseforge@postgres:5432/proseforge
      PROSEFORGE_SYNC_DATABASE_URL: postgresql+psycopg://proseforge:proseforge@postgres:5432/proseforge
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  contract-test:
    extends:
      service: api-test
    command: ["pytest", "-q", "tests/contract", "--junitxml=/artifacts/contract-pytest.xml"]

  migration-test:
    extends:
      service: api-test
    command: ["pytest", "-q", "tests/migration", "tests/integration/database", "--junitxml=/artifacts/migration-pytest.xml"]
    environment:
      PROSEFORGE_DATABASE_URL: postgresql+asyncpg://proseforge:proseforge@postgres:5432/proseforge
      PROSEFORGE_SYNC_DATABASE_URL: postgresql+psycopg://proseforge:proseforge@postgres:5432/proseforge
    depends_on:
      postgres:
        condition: service_healthy

  recovery-test:
    extends:
      service: api-test
    command: ["pytest", "-q", "tests/recovery", "--junitxml=/artifacts/recovery-pytest.xml"]

  web-test:
    image: node:22-alpine
    working_dir: /app/apps/web
    volumes:
      - .:/app
      - web-node-modules:/app/apps/web/node_modules
    command: ["sh", "-lc", "corepack enable && pnpm install --frozen-lockfile && pnpm typecheck && pnpm test:unit && pnpm build"]

  e2e:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    working_dir: /app/apps/web
    volumes:
      - .:/app
    environment:
      BASE_URL: http://web
    command: ["bash", "-lc", "corepack enable && pnpm install --frozen-lockfile && pnpm e2e"]
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      worker:
        condition: service_healthy
      provider-mock:
        condition: service_healthy

volumes:
  web-node-modules:
  postgres-test-data:
  redis-test-data:
