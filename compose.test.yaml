services:
  legacy-test:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: ["pytest", "-q", "--junitxml=/artifacts/pytest.xml"]
    volumes:
      - .:/app
      - ./artifacts:/artifacts

  api-test:
    extends:
      service: legacy-test
    command: ["pytest", "-q", "--junitxml=/artifacts/api-pytest.xml"]

  contract-test:
    extends:
      service: api-test
    command: ["pytest", "-q", "tests/contract", "--junitxml=/artifacts/contract-pytest.xml"]

  migration-test:
    extends:
      service: api-test
    command: ["pytest", "-q", "tests/migration", "tests/integration/database", "--junitxml=/artifacts/migration-pytest.xml"]

  recovery-test:
    extends:
      service: api-test
    command: ["pytest", "-q", "tests/recovery", "--junitxml=/artifacts/recovery-pytest.xml"]

  web-test:
    image: node:22-alpine
    working_dir: /app/apps/web
    volumes:
      - .:/app
      - web-node-modules:/app/apps/web/node_modules
    command: ["sh", "-lc", "corepack enable && pnpm install --frozen-lockfile && pnpm test -- --run"]

volumes:
  web-node-modules:
