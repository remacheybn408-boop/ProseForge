# urban_power.yaml — 都市异能类型模板
# novel-pipeline-write-engine v0.5.0

genre_id: urban_power
name: 都市异能
description: >
  以现代都市为背景的超能力/系统/重生类小说。主角获得特殊能力后，
  在商战、权谋、势力扩张中逐步崛起，同时应对来自各方势力的挑战。

core_reader_expectation:
  - 清晰的异能/系统规则设定，能力成长有逻辑
  - 打脸节奏明快，不可拖沓
  - 势力扩张有层次（地方→全国→国际→全球）
  - 商战逻辑合理，不可降智对手
  - 女性角色要有独立人格，不做花瓶
  - 都市背景细节真实（时间/地点/社会规则）

common_arc:
  - 重生/觉醒获得异能
  - 系统绑定（有限制/有代价）
  - 初期积累：炒股/鉴宝/医术打脸
  - 建立事业：公司/势力从零起步
  - 商战对决：与老牌势力正面碰撞
  - 隐藏势力浮出水面（古武/异能组织）
  - 国际舞台扩展
  - 最终揭秘异能/系统来源

common_conflicts:
  - 豪门压迫/家族内斗
  - 商业竞争/恶意收购
  - 异能者之间的势力争夺
  - 前世仇怨追索
  - 系统任务与个人意志冲突
  - 隐藏势力对新兴势力的打压

common_hooks:
  - 重生回到学生时代/创业起点
  - 系统觉醒（签到/抽奖/任务流）
  - 意外获得传承/异能觉醒
  - 前世大佬重生扮猪吃虎
  - 被退婚后逆袭
  - 穷小子鉴定出逆天古董/捡漏

common_cool_points:
  - 拍卖会上一掷千金打脸
  - 医术/武学/鉴宝多重能力碾压
  - 商业谈判中反杀对手
  - 国际舞台上为国争光
  - 揭开豪门黑幕当众打脸
  - 系统升级解锁新能力的震撼场面

risk_points:
  - 打脸过于频繁成为套路，读者疲劳
  - 系统奖励过于随意，缺乏稀缺感
  - 女性角色全员好感度过高，变成后宫文
  - 商业逻辑薄弱，"小学生商战"
  - 现代背景细节失真（年代混乱/技术常识错误）
  - 势力扩张太快导致世界观崩坏

voice_suggestions:
  - protagonist_science_monk
  - best_friend_grounded
  - merchant_sly
  - villain_cold_contract
  - female_observer_calm

guard_focus:
  - concrete_anchor_guard: 都市场景必须有具体时间/地点/物品锚点
  - anti_ai_patterns: 避免"嘴角微微上扬""眼眸中闪过一丝"等AI腔
  - scene_causality_guard: 每次商战/打脸必须有对手方的后续反应
  - dialogue_naturalness_guard: 对话符合现代人口语习惯
  - padding_guard: 避免系统面板水字数
