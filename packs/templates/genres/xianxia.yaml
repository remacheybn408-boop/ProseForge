# xianxia.yaml — 修仙玄幻类型模板
# novel-pipeline-write-engine v0.5.0

genre_id: xianxia
name: 修仙玄幻
description: >
  以修炼体系为核心驱动力的东方幻想世界。主角从废材/底层起步，
  通过修炼、奇遇、战斗逐步成长，最终达到超凡境界。

core_reader_expectation:
  - 清晰的修炼境界体系（炼气→筑基→金丹→元婴→化神→...）
  - 主角从底层或废材状态起步，逐步逆袭
  - 每个境界突破都有代价和挑战
  - 资源争夺是核心冲突之一（丹药、功法、秘境、天材地宝）
  - 奇遇必须伴随代价或后续追杀，避免无代价捡宝
  - 打脸必须有铺垫，不可凭空出现
  - 世界观要有层次感（凡界→灵界→仙界/上界）

common_arc:
  - 废材起点/天赋觉醒
  - 低阶试炼入宗门
  - 门派压迫/同门竞争
  - 秘境探险获奇遇（带代价）
  - 宗门大比/势力洗牌
  - 越阶挑战成名
  - 飞升/进入更高位面
  - 上古谜团逐步揭开

common_conflicts:
  - 资源争夺（灵脉/秘境/丹药）
  - 宗门内斗/派系倾轧
  - 正邪对立/道魔之争
  - 师徒传承与背叛
  - 家族仇怨/血脉诅咒
  - 天道规则与个人意志冲突
  - 气运争夺

common_hooks:
  - 开局废材被退婚/被夺灵根
  - 意外获得上古传承/神秘老爷爷
  - 重生回到修炼起点
  - 穿越成为炮灰配角
  - 系统觉醒但有限制条件
  - 灵根检测反转（从废灵根到隐藏天灵根）

common_cool_points:
  - 越阶斩杀高阶修士
  - 丹道/阵道/器道多修全精
  - 宗门大比碾压全场
  - 秘境中独得至宝
  - 当众揭穿阴谋
  - 飞升渡劫时的天地异象

risk_points:
  - 奇遇过于频繁导致读者麻木（"奇遇疲劳"）
  - 修炼体系膨胀失控，境界过多
  - 配角沦为工具人，缺乏独立动机
  - 主角"圣母"或"无脑杀伐"两极分化
  - 升级过快导致紧张感丧失
  - 地图切换后前期角色被遗忘
  - 法宝/功法泛滥，缺乏稀缺感

voice_suggestions:
  - protagonist_science_monk
  - rival_martial_direct
  - elder_semi_wenyan
  - villain_cold_contract
  - narrator_action_based

guard_focus:
  - scene_causality_guard: 每次战斗/修炼必须有可见后果
  - continuity_evidence_guard: 境界提升必须在后续章节体现
  - hallucination_guard: 新增设定必须有前文铺垫
  - anti_ai_patterns: 避免"恐怖如斯""倒吸一口凉气"等模板
  - scene_delta_guard: 每章必须有实质推进（境界/资源/人物关系至少其一动）
