# ============================================================
# 末世生存小说体裁规则包
# ============================================================
genre_id: apocalypse
name: 末世生存
description: >
  末世生存小说体裁规则包，涵盖丧尸末世、核战后废土、病毒大流行、外星入侵、自然灾难、
  系统降临类末世等子类型。核心要素包括生存资源管理、安全据点建设、人性在极端环境下
  的考验、团队组建与背叛、新秩序建立等。此类作品对资源逻辑、生存策略合理性和人性
  描写的深度有较高要求——末世的核心张力来自'活下去'与'值不值得活'的双重拷问。

# ---- 核心承诺 ----
core_promises:
  - "末世的成因有清晰合理的解释（不一定是科学解释，但需在世界观内自洽）"
  - "生存资源（食物、水、武器、药品、燃料等）的稀缺性在全文保持一致，不能后期无故充裕"
  - "末世环境是真实的威胁——主角和团队必须持续付出代价才能生存，而非末世只是背景板"
  - "人性在极端条件下的展现在整部作品中是核心主题之一——善与恶都有合理的人性基础"
  - "安全据点的建立和运营有真实的管理逻辑，不是'占领一个超市就万事大吉'"
  - "如果有丧尸/怪物，其行为规则需被建立并严格遵守，不能按剧情需要随意变强变弱"

# ---- 读者期待 ----
reader_expectations:
  - "末世降临的方式和初步规则在前3章内被清晰建立"
  - "主角的初始生存能力和资源状况在第1章展示，让读者了解起点在哪里"
  - "每10-15章发生一次安全环境的重大变化（据点沦陷/迁移/新威胁出现）"
  - "团队成员的加入和离开有合理的原因和情感重量"
  - "对于人性选择的两难困境至少每20章出现一次——末世读者期待道德灰色地带"
  - "末世的终局希望（重建文明/找到解药/到达安全区）在故事中后期被提出并驱动情节"

# ---- 常见冲突 ----
common_conflicts:
  - "人物vs环境：食物短缺、恶劣天气、丧尸/怪物威胁、疾病——最基础的生存冲突"
  - "人物vs人物：资源争夺、权力斗争、价值观对立、背叛与复仇——末世最核心的人性冲突"
  - "人物vs群体：个人道德vs集体利益、少数vs多数的残酷抉择"
  - "人物vs自我：道德底线的溃败与重建、幸存者愧疚、人性丧失的恐惧"
  - "据点vs据点：不同幸存者群体的资源战争和意识形态冲突"

# ---- 章节节奏 ----
chapter_rhythm:
  pace: "末世特有的节奏模式——'紧张-喘息-更紧张'循环。紧张期：外出搜寻资源、战斗、逃亡，节奏快、描写硬。喘息期：据点休整、人际互动、策略规划，节奏缓、描写细腻。但喘息期不能超过3章，总需要有新的危机信号在背景中酝酿。"
  hook_placement: "末世最强钩子——'安全状态的打破'：据点被攻破的预兆、资源即将耗尽、发现更强大的威胁。其次——'人物关系危机'：团队内部裂痕、秘密被揭穿、背叛的蛛丝马迹。再次——'希望信号'：传说中的安全区线索、解药的可能——给读者在绝望中维持阅读的希望。"
  climax_pattern: "末世小说通常有多个阶段性高潮——每次据点攻防战、大规模迁徙、重要人物的牺牲。全书大高潮为'终极选择'——往往不是简单的战胜敌人，而是在'保存人性'和'保存生命'之间的最终抉择。高潮通常发生在总篇幅的85%-90%位置。"

# ---- 角色原型 ----
character_archetypes:
  - name: "普通幸存者主角"
    traits: "初始能力平凡，在末世中逐步成长。核心品质是韧性和适应力。有强烈的保护欲（保护某人或某个信念）。道德底线在故事中经受考验。"
    checks: "主角的每次能力提升是否有合理的末世经历支撑？主角的道德选择是否有真实的内心挣扎过程？"
  - name: "末世老兵/硬汉向导"
    traits: "末世前就具备生存技能（军人/猎人/医生等），初期保护主角。可能有PTSD或情感封闭。在教导主角的过程中也在自我疗愈。"
    checks: "老兵的强硬是否合理（不过度神化）？是否有展示其脆弱的时刻？"
  - name: "人性底线守护者"
    traits: "在末世中坚持人性/道德/文明价值的角色。可能被视为天真或软弱。其坚持在故事中既带来代价也带来回报。"
    checks: "守护者的坚持是否有实际代价展示？其立场是否在情节中经受真正严峻的考验？"
  - name: "末世暴君/掠夺者"
    traits: "信奉丛林法则的末世强者。有自成体系的末世哲学。过去经历解释了其冷酷（但不洗白）。"
    checks: "暴君的末世哲学是否有表面上的说服力（让读者也能理解其逻辑）？其行为模式是否一致？"
  - name: "背叛者/摇摆者"
    traits: "在末世压力下道德防线崩溃的普通人。背叛不是出于纯粹恶意，而是恐惧/绝望驱动的选择。"
    checks: "背叛者转变的每一步是否有合理的心理铺垫？其背叛带来的后果是否被充分展现？"

# ---- 世界观检查 ----
worldbuilding_checks:
  - "末世的时间线：灾难发生至今多久？各个阶段的特征（混乱期/适应期/重建期）是否明确？"
  - "资源生态：一罐食物从末世前到现在的损耗逻辑是否合理？燃料/电力的可用性是否与时间推移一致？"
  - "怪物/丧尸规则：行为模式、弱点、变异规律是否建立且严格遵守？"
  - "幸存者分布：为什么这些人活下来？幸存者群体的构成是否符合末世逻辑？"
  - "信息与通信：末世中的信息传播方式和范围是否合理？（末世不等于所有通信立刻全部中断）"
  - "医疗与卫生：疾病、感染、伤口处理的严重性和处理方式是否符合现实逻辑？"

# ---- 情节检查 ----
plot_checks:
  - "资源审计：主角团队的所有重要物资获取和使用是否有追踪？是否存在'物资凭空出现'或'物资永远用不完'的段落？"
  - "安全逻辑：每个据点选址是否有防御逻辑？每次据点沦陷是否有合理的军事/物资层面的原因？"
  - "人口变化：团队成员的增减是否有合理记录？新加入者的背景是否被充分审查（末世中不该随意收人）？"
  - "决策审查：团队的重大决策是否有讨论过程？是否考虑了不同方案的利弊？"
  - "幸存者行为逻辑：路人/配角的末世行为是否符合常理（恐惧、自私、抱团等）？"

# ---- 连续性检查 ----
continuity_checks:
  - "物资清单一致性：上次记录有多少子弹/食物，下次使用时数量是否合理递减？"
  - "季节/天气：末世小说的环境描写应与时间线中的季节变化匹配"
  - "伤病恢复：角色的伤情是否有合理的时间恢复线？重伤后的行动能力是否有真实限制？"
  - "据点间距离：每次迁徙的距离/时间/消耗是否与已建立的地理尺度一致？"
  - "丧尸/怪物密度：不同区域的威胁密度是否有合理差异（城市vs荒野/白天vs夜晚）？"

# ---- 类型特定防护 ----
genre_specific_guards:
  - "防资源松驰：建立物资台账追踪——当主角团队在超过10章没有进行资源获取但消耗依旧时，标记警告"
  - "防末世日常化：当连续5章没有末世特有危机（丧尸/资源短缺/环境威胁）出现时，提醒作者末世不应该变成温馨日常"
  - "防安全堡垒永固：任何据点停留超过30章需要有充分的防御逻辑支撑，否则应安排危机事件"
  - "防人性脸谱化：检查所有角色的末世选择是否有足够的情感逻辑，避免简单二分（好人就是好人/坏人就是坏人）"
  - "防主角光环过度：主角的幸存不能仅靠运气——每次死里逃生都需要合理的情节解释"

# ---- 禁用模式 ----
forbidden_patterns:
  - pattern: "无限资源的基地"
    reason: "末世中某个基地有取之不尽的资源而无合理解释，严重破坏末世生存的紧张感"
  - pattern: "配角批量死亡作为剧情推动"
    reason: "为了制造危机感而频繁杀死配角，但没有给每个死亡足够的情感重量——读者会麻木"
  - pattern: "末世只因一个反派变坏就全盘崩坏"
    reason: "把所有末世人性问题简化为'因为有个坏人'，回避了末世文学的核心主题——环境如何改变每个人"
  - pattern: "女性角色仅作为被保护/被伤害对象"
    reason: "末世是压力环境，女性同样会展现各维度的生存能力和人性复杂性"
  - pattern: "主角从不面临真正的两难选择"
    reason: "末世的核心戏剧性来自'没有好的选项'——如果主角总能找到两全其美的方案，则末世失去了其存在意义"
  - pattern: "末世设定只为耍帅/开后宫"
    reason: "末世若降格为'方便主角大杀四方和收后宫'的背景板，将严重浪费此类型的叙事潜力"

# ---- 读者吸引力法则 ----
reader_pull_rules:
  - "末世的绝望感与希望感应交替出现——绝望太大会劝退，希望太多会失去紧张感，比例建议7:3"
  - "每次'安全期'的结尾都需要种下下一个威胁的种子——让读者在宁静中感受到不安"
  - "重要人物的死亡应设置在情感投入最深的时刻——刚认识就死的角色没有冲击力"
  - "末世的'小确幸'（一口干净的水、一刻的安宁）有巨大的情感价值，不要因为追求紧张而完全舍弃"
  - "据点建设/资源管理的细节对末世读者有独特的满足感——合理的管理细节是加分项"

# ---- 大纲验证规则 ----
outline_validation_rules:
  - "大纲中是否有清晰的生存阶段划分（混乱求生期→据点建立期→扩张/迁徙期→终局）？"
  - "所有重要角色的加入和退场时机是否在大纲中标明且有合理的原因？"
  - "每个据点的生命周期是否完整（建立→运营→危机→陷落/升级/放弃）？"
  - "是否有资源曲线——主角团队资源水平随章节变化的趋势是否合理？"
  - "末世的终局是否有清晰的设定（重建文明/到达安全区/找到解药/与末世共存）？"
  - "是否有'人性弧线'标记——关键角色的道德/心理变化节点？"

# ---- 智能体审查聚焦点 ----
agent_focus:
  focus: "资源追踪审计"
  detail: "建立物资消耗时间表，跟踪食物、水、武器、燃料、药品的获取和消耗，标记资源逻辑漏洞"
  focus: "末世环境真实性"
  detail: "检查每10章内末世特有危机的出现频率，标记末世感衰减的段落"
  focus: "人性深度检查"
  detail: "分析角色面临的选择困境，评估是否有足够的道德灰色地带和真实挣扎"
  focus: "据点防御逻辑"
  detail: "评估每个据点选址、防御配置和陷落原因的合理性"
  focus: "丧尸/怪物规则一致性"
  detail: "追踪所有怪物遭遇战，验证怪物行为是否符合已建立规则"

# ---- 审查提问 ----
review_questions:
  - "如果去掉所有丧尸/怪物元素，这个末世世界的人性故事线是否仍然成立且引人深思？"
  - "主角团队的资源水平在最近20章中是否发生了不合理的跃升或骤降？"
  - "最近3个死亡的配角，读者的情感投入是否被充分建立后才被杀死？"
  - "当前据点停留了多少章？其防御能力是否足以支撑这么久的安逸？"
  - "读者在阅读过程中是否有'如果是我，我会怎么做'的代入感？还是只觉得主角运气好？"
  - "末世的终局希望是否清晰可感？读者是否能看到'这条路的终点'？"
  - "是否存在主角团队面临的实际困境太少，而内心独白/价值观输出太多的问题？"
