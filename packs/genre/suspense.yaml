# ============================================================
# 悬疑小说体裁规则包
# ============================================================
genre_id: suspense
name: 悬疑
description: >
  悬疑小说体裁规则包，涵盖心理悬疑、犯罪悬疑、社会悬疑等子类型。核心要素包括
  持续的不确定感、信息的有控制释放、读者的猜谜驱动力和真相揭示的满足感。
  与推理小说的区别在于：悬疑更侧重紧张感和心理压迫，不一定需要严格的逻辑解谜。
  此类作品的读者对信息节奏、红鲱鱼的质量和反转的合理性有极高要求。

core_promises:
  - "核心谜团在开篇被清晰提出——读者知道'我们要解什么谜'"
  - "所有线索在揭示前都已公平地呈现在读者面前——真相揭晓时产生'原来如此'而非'这谁能猜到'"
  - "红鲱鱼（误导线索）有合理的解释，不是纯粹的欺骗"
  - "紧张感有波峰波谷的节奏——持续的紧张会麻木，需要喘息和加码的交替"
  - "真相有层次——表面真相之下还有更深层的真相，满足读者'挖下去'的期待"
  - "结局解决核心谜团，但不一定解决所有问题——留白是悬疑的美学"

reader_expectations:
  - "核心谜团在第1章被提出或强烈暗示——可以是事件、人物或状况的异常"
  - "第一个重大线索在3章内出现，让读者开始建立假设"
  - "信息释放遵循'每揭示一层,引出更深一层'的节奏"
  - "反转至少在故事中后期发生一次——且反转后回看前期情节应有新的解读"
  - "主角（或读者认同的视角）对真相的探索有主动推进，非被动接受信息"
  - "最终解答使之前散落的细节串联成一个新的完整图景"

common_conflicts:
  - "信息不对等：角色掌握的信息与真相之间的差距——这是悬疑最基础的冲突引擎"
  - "信任危机：角色间因信息不透明产生的猜疑和关系张力"
  - "时间压迫：必须在某个时限前解决谜团（如炸弹倒计时、下一个受害者）"
  - "视角受限：主角（和读者）只能通过有限视角获取信息，充满不确定性"
  - "道德灰色地带：真相可能令人不适——选择揭露还是掩盖？"

chapter_rhythm:
  pace: "悬疑章节遵循'疑问-线索-新疑问'的循环。每章开启至少一个新问题，回答一部分旧问题，但回答中又蕴含更大的疑问。中等偏快的节奏适合悬疑——每章有实质性的信息变化。在角色面临直接威胁时加快到极速。感情/人物章节作为紧张的缓冲区。"
  hook_placement: "悬疑最强的钩子是'信息缺口'——揭示一部分但保留更关键的部分。其次是'威胁升级'——危险比预想更近/更大/更复杂。再次是'角色决定'——角色做出一个将改变局面的选择。避免用纯粹的惊吓（jump scare）做章尾钩子。"
  climax_pattern: "悬疑卷高潮通常为真相揭晓时刻——但精彩的高潮往往是'你以为你要知道真相了,结果发现你问错了问题'。高潮前持续升级——线索汇聚、威胁逼近、人际关系紧张到达临界点。最终揭示应在回看时有必然性。"

character_archetypes:
  - name: "调查者主角"
    traits: "有强烈的好奇心或不得不追查的原因。观察力敏锐或拥有特殊的信息获取能力。自身可能隐藏着与谜团相关的秘密。"
    checks: "主角为什么要追查这件事？动机是否强到支撑全书？主角的缺陷是否在追查过程中被考验？"
  - name: "信息源/线人"
    traits: "掌握部分关键信息但不完整。有自身的立场和隐瞒动机。可能中途死亡或被证明不可靠。"
    checks: "信息源提供的信息中是否混有误导？其隐瞒的动机是否合理？"
  - name: "红鲱鱼嫌疑人"
    traits: "被设计为让读者/主角怀疑的对象。有合理的可疑之处。最终澄清时有令人满意的解释。"
    checks: "红鲱鱼的可疑点是否有合理的非罪行解释？不是简单的'我误会了他'？"
  - name: "隐藏操纵者"
    traits: "在幕后影响事件走向。可能以帮助者/旁观者/受害者的面孔出现。其揭露改变整个事件的解读。"
    checks: "操纵者的行为在揭示后回看是否逻辑自洽？是否有充分的动机？"
  - name: "妨碍者/阻力角色"
    traits: "有意或无意地阻碍调查。可能是体制代表/上级/执法人员。有其合理的阻碍理由。"
    checks: "妨碍者的行为是否符合其角色职责或个人利益？而非纯粹为了制造障碍？"

worldbuilding_checks:
  - "故事环境的封闭性/局限性是否服务于悬疑？（如孤岛/小镇/封闭社区）"
  - "环境本身是否隐藏了线索？（建筑结构/历史事件/地域特征）"
  - "科技水平是否被准确反映？（监控/通讯/鉴定技术影响信息获取方式）"
  - "法律/社会规则在故事中的角色是否一致？"

plot_checks:
  - "核心谜团的复杂程度是否与篇幅匹配？（短篇简单长篇复杂）"
  - "线索散布是否均匀？（不能前3章堆积80%线索然后中段全是烟雾弹）"
  - "每个反转是否在前期有至少3个以上的铺垫？"
  - "是否存在'凶手最后十分钟才出场'的情况？——悬疑读者最厌恶的模式"
  - "所有角色行为在真相揭示后是否仍然合理？"
  - "紧张感的节奏是否合理？（持续紧张=麻木，持续平淡=弃书）"

continuity_checks:
  - "所有线索/物证的位置和状态是否前后一致？"
  - "时间线是否精确且无矛盾？（悬疑读者会建立自己的时间线）"
  - "角色在每章末的知识状态是否与下一章初的行为匹配？"
  - "天气/环境/场景转换是否合理且被准确记录？"
  - "每个人物的行踪（alibi）在关键时间点是否有交代？"

genre_specific_guards:
  - "防'信息作弊'：新线索/新信息不能在揭示前从未被提及——读者应有机会自己推理"
  - "防'凶手人格分裂'：多重人格作为悬疑解法已被过度使用且通常不尊重心理疾病"
  - "防'关键技术/鉴定手段忽然出现'：使用的技术手段应在早期有铺垫"
  - "防'角色智商骤降以保持悬念'：聪明人突然做蠢事来隐藏真相是不可接受的"
  - "防'过度依赖巧合'：线索发现不能完全依赖运气——主角的主动性应占主导"
  - "防'结局一句话解释一切'：真相揭示需要通过场景/行动呈现，而非角色对话大段交代"

forbidden_patterns:
  - pattern: "凶手在最后10%才首次出现"
    reason: "读者没有公平的推理机会，是最被悬疑读者厌恶的模式——违反'公平游戏'原则"
  - pattern: "全部是梦/幻觉/想象"
    reason: "使整个前期阅读失去意义，读者感到被欺骗——除非在开篇就明确提示这种可能性"
  - pattern: "关键线索主角知道但隐瞒读者"
    reason: "破坏读者与主角之间的信任——悬疑的基本契约是读者和主角共享信息"
  - pattern: "真相依靠超自然力量解释"
    reason: "在现实主义悬疑中突然出现超自然解释是最大的违约（除非作品一开始就是超自然悬疑）"
  - pattern: "关键陷阱/危机仅靠运气逃脱"
    reason: "主角陷入绝境后的脱出必须基于之前的伏笔或智慧，不能靠'恰好'"
  - pattern: "动机是'因为他是个疯子'"
    reason: "反派的动机需要可理解（不一定认同），纯粹疯狂是最弱的动机设计"

reader_pull_rules:
  - "读者在悬疑中的核心快感是'我猜对了'或'我完全没想到但回头一看全都有暗示'"
  - "每章结束应让读者产生'我需要再看一章来验证我的猜测'的冲动"
  - "信息释放的最佳节奏是'答案→新问题→答案→新问题'的交替"
  - "红鲱鱼的质量决定悬疑的质量——误导应该是'合理的错误答案'而非'故意的欺骗'"
  - "情感线在悬疑中的正确用法是增加筹码——当读者关心角色时,危险才真正可怕"

outline_validation_rules:
  - "核心谜团的结构图是否完整？（表面真相→中层真相→深层真相）"
  - "每个线索的引入和回收节点是否已标注？"
  - "红鲱鱼的误导逻辑和收网时机是否明确？"
  - "时间线是否有精确到小时的版本？"
  - "每个主要角色在每次关键事件时的行踪（alibi）是否可查？"
  - "信息释放节奏图是否呈现有规律的波动？"

agent_focus:
  - focus: "公平性审计"
    detail: "检查所有揭示的线索是否在揭示前已在文本中出现——标记'凭空出现的线索'"
  - focus: "时间线一致性"
    detail: "重建事件精确时间线，对比各章描述，标记时间矛盾"
  - focus: "反转合理性"
    detail: "分析每次反转的前期铺垫数量和质量，标记少于3处铺垫的反转"
  - focus: "信息节奏分析"
    detail: "绘制信息释放密度图，标记过长无新信息的段落和过密信息倾泻"
  - focus: "角色行为逻辑"
    detail: "在真相揭示后回审所有角色行为，标记不符逻辑之处"

review_questions:
  - "如果读者在50%位置列出了5个可能的凶手/真相，你的答案在其中吗？（如果不在，你可能在信息作弊）"
  - "把你的核心谜团讲给一个没看过书的人，他能提出合理的推测吗？（如果不能，谜团设置有问题）"
  - "删掉书中所有红鲱鱼章节后，真相的故事还成立吗？（如果成立，红鲱鱼就是冗余的）"
  - "你的反派在真相揭示前是一个有说服力的'好人'吗？（最佳反派是读者从没怀疑过的人）"
  - "如果读者猜到了真相，故事本身还有阅读价值吗？为什么？"
  - "回看前5章，哪些细节在真相揭示后会有新的意义？（如果没有，说明前期铺垫不足）"
