# ============================================================
# 无限流小说体裁规则包
# ============================================================
genre_id: unlimited_flow
name: 无限流
description: >
  无限流小说体裁规则包，涵盖主角进入由超自然力量/系统/主神创造的
  '副本世界'或'轮回空间'中完成任务、获取奖励、持续升级的作品类型。
  核心要素包括多元副本设计、任务-奖励循环、团队协作与背叛、
  在极端压力下的人性展现。此类作品的核心魅力来自'不断变换的世界观'
  的新鲜感和'资源管理-风险博弈'的智力挑战。

core_promises:
  - "核心规则（轮回空间/主神/系统的法则）清晰且不可随意更改"
  - "每个副本世界有独立的完整性——即使是短副本也应有起承转合"
  - "团队成员的加入/牺牲/背叛有真实的情感重量——不是可替换的工具人"
  - "资源管理和风险博弈是核心玩法——每次兑换/强化都是重要的策略决策"
  - "轮回/副本的终极目的和来源是故事的核心驱动力——不能无限刷本而不触及核心谜团"
  - "人性在极端压力下的变化被真实地展现——友情的脆弱和坚韧同样重要"

reader_expectations:
  - "核心规则和'空间'的基本设定在前5章内建立"
  - "第一个新手副本在5-8章内完成——展示基本玩法"
  - "第一个高难度/死亡副本在15-20章内出现——展示真正的压力"
  - "至少有2-3个不同类型的副本（恐怖/战斗/解谜/生存等）"
  - "核心团队的雏形在30章前建立——成员各有专长"
  - "关于核心谜团的线索在50章前开始散布"

common_conflicts:
  - "副本生存：在极端环境中活下去——资源匮乏+未知规则+强大敌人"
  - "玩家间竞争与背叛：有限资源引发的零和博弈"
  - "团队内部信任建立与瓦解：共同经历危机建立的关系——再被利益考验"
  - "资源分配博弈：谁拿到更好的装备/强化——这个决定可能影响全队生存"
  - "对抗'系统'：从被动接受任务到主动寻找规则的漏洞和真相"

chapter_rhythm:
  pace: "副本内高速推进——以'小时'甚至'分钟'为单位的紧迫感。空间/安全区/准备期放缓——资源整理、人际交互、情报分析。不同副本类型调整节奏：恐怖副本慢速建立氛围，战斗副本快速推进，解谜副本中速穿插线索。副本间过渡章是情感修复和伏笔推进的空间。"
  hook_placement: "最强钩子——'下一个副本是什么'——公布副本名称/类型时的好奇。其次是'副本中的关键决断'——是否相信某人/是否冒这个险。再次是'兑换/强化的选择'——拿到资源后如何分配。长期钩子是核心谜团——'这一切究竟是什么'。"
  climax_pattern: "卷高潮通常为高难度副本的最终Boss战/解谜成功——以及伴随的丰厚奖励或惨重代价。全书高潮通常是轮回空间真相的揭示——以及主角对'系统'的终极反抗/超越/掌控。最终副本往往与核心谜团直接相关。"

character_archetypes:
  - name: "智谋型主角"
    traits: "依靠分析力和判断力在副本中生存。善于发现规则漏洞和最优策略。可能是新人但学习速度极快。"
    checks: "主角的智谋是否具体体现在策略分析上（而非'他想了想就破解了'）？是否有判断失误的时候？"
  - name: "战力担当"
    traits: "团队最强物理战力。有自己的战斗风格和限制。可能在智慧和社交方面有短板。"
    checks: "战力担当的贡献是否超越了'打架'？其弱点是否在关键时候造成过团队危机？"
  - name: "情报/技术专家"
    traits: "擅长收集信息、破解机制、技术分析。可能是黑客/学者/专业领域出身。"
    checks: "专家的分析过程是否具体展示——信息从碎片到拼图的过程？"
  - name: "医疗/辅助角色"
    traits: "提供治疗、增益或特殊支持。生存能力较弱但不可或缺。常是团队的'良心'。"
    checks: "辅助角色是否有独立的危机和成长？其牺牲/受伤的威胁是否真实？"
  - name: "不定时炸弹/内鬼"
    traits: "有背叛风险的团队成员。其摇摆动机有合理逻辑（家人威胁/自身利益/被迫)。"
    checks: "内鬼的动机是否令人共情（即使不赞同）？其最终选择是否有充分的铺垫？"

worldbuilding_checks:
  - "轮回空间的规则体系是否完整？（进入条件/任务类型/奖励机制/惩罚规则/退出条件）"
  - "兑换/强化系统是否有合理的稀缺性和梯度？"
  - "不同副本世界的规则与主线世界的关系是否被定义？"
  - "存在更高层级的玩家/组织——他们与新手的关系规则是什么？"
  - "轮回空间的来源/目的——是否有完整的世界观解释（至少在大纲层面）？"

plot_checks:
  - "副本类型是否多样化——避免连刷3个同类型副本？"
  - "每次副本是否推动了主线故事（角色关系/核心谜团/能力成长）而非仅是支线？"
  - "兑换/强化选择是否有真实的机会成本——不能什么都拿到？"
  - "团队关系是否有起伏——信任不断被建立又不断被考验？"
  - "是否存在'无敌套路'——某个兑换组合过于强大导致后续副本无压力？"
  - "核心谜团的线索是否在大约50%进度处开始加速揭示？"

continuity_checks:
  - "团队成员的存亡/离开/加入记录是否一致？"
  - "兑换/强化的能力是否有完整的使用记录？"
  - "已完成副本的奖励和惩罚是否有持续影响？"
  - "角色关系的变化是否有连续的积累（非这章好下章坏再下章又好）？"
  - "道具/装备的持有和使用记录是否准确？"

genre_specific_guards:
  - "防'副本审美疲劳'：不同副本应有不同的核心玩法（恐怖/解谜/生存/竞技/社交博弈）"
  - "防'兑换选择无意义'：如果有明显的最优兑换路线——则应调整平衡性"
  - "防'角色工具化'：队友不能只是主角的装备（如'我有个坦克队友'式的功能化描述）"
  - "防'安全区零风险'：安全区内应有信息战/联盟/背叛——不完全安全"
  - "防'核心谜团无尽拖延':300章了还在刷副本而核心谜团仍在原地——读者会弃书"
  - "防'战力通货膨胀':后期道具/能力的能力不能使前期积累完全贬值"

forbidden_patterns:
  - pattern: "主角永远选到最优解"
    reason: "完美选择使故事失去张力——应有判断失误、信息不足导致的次优选择"
  - pattern: "队友只是主角的装备栏"
    reason: "每个队友应有独立人格线——不能只是'我的坦克/我的法师'式工具化"
  - pattern: "同类型副本连续出现"
    reason: "无限流的核心卖点是多样性——连续同类副本宣告创意的枯竭"
  - pattern: "安全区真正的'安全'"
    reason: "如果安全区内完全无风险——则安全区章节失去张力"
  - pattern: "无限资源/无限强化"
    reason: "如果资源无限——则每次兑换选择没有真实代价"
  - pattern: "核心谜团没有进展"
    reason: "100章后读者还在问'这一切到底是什么'时——故事已经在消耗耐心"

reader_pull_rules:
  - "'下一个副本是什么'的期待感维系中期阅读——需要副本预告/选择环节"
  - "兑换/强化时刻是核心爽点——得到新能力的具体展示=读者的奖励"
  - "副本中的人际博弈（信任/背叛/牺牲）比单纯打怪更有情感重量"
  - "核心谜团碎片的信息释放——每一次揭示都让读者更投入于世界观"
  - "团队中的角色成长——每个成员的改变是长期追读的理由"

outline_validation_rules:
  - "所有副本的类型/目标/核心机制是否已规划且类型分布均衡？"
  - "兑换/强化树是否已设计且各阶段有合理梯度？"
  - "核心谜团揭示节点是否在大纲中标注且密度合理？"
  - "团队成员的入队/离队/关键成长节点是否规划？"
  - "资源管理曲线是否合理——不存在长期过剩或赤字的段落？"

agent_focus:
  - focus: "副本多样性"
    detail: "统计各副本类型分布，标记连续同类型副本模式"
  - focus: "角色功能化程度"
    detail: "分析每个队员在剧情中的独立性和目标——标记纯功能化角色"
  - focus: "兑换选择质量"
    detail: "评估每次资源分配是否有真实的机会成本和后续影响"
  - focus: "核心谜团推进速度"
    detail: "统计核心谜团相关信息的散布频率和密度"
  - focus: "战力通货膨胀"
    detail: "追踪角色战力成长曲线，检查膨胀率是否合理"

review_questions:
  - "你的副本设计中最具原创性的3个是什么？它们提供了怎样不同的阅读体验？"
  - "如果从头开始不兑换任何东西，仅凭智慧和协作——你的团队能走多远？"
  - "每个队友在故事中有没有属于自己的'这一刻'——读者会为他们欢呼或落泪的瞬间？"
  - "核心谜团的答案在揭晓时会让读者感到'原来如此'还是'嗯就这样'？"
  - "你的轮回空间与传统无限流的不同之处是什么？你的独特卖点是什么？"
