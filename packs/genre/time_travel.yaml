# ============================================================
# 穿越小说体裁规则包
# ============================================================
genre_id: time_travel
name: 穿越
description: >
  穿越小说体裁规则包，涵盖主角从现代/不同时代穿越到异世界、古代、平行时空或
  历史时期的作品类型。核心要素包括时空位移带来的文化冲击、现代知识在古代/
  异世界的应用、身份适应和归属感建立。此类作品的核心吸引力来自'知识差优势'
  和'外来者视角'的双重魅力。

core_promises:
  - "穿越机制有基本的规则——为何穿越、能否返回、穿越的条件和限制是什么"
  - "主角的现代知识/技能在异世界有明确的应用场景和逻辑限制"
  - "文化/时代差异带来的冲突和不适被真实描绘——主角不能瞬间适应一切"
  - "语言/身份/社会地位问题是真实障碍——不能穿越后所有问题自动解决"
  - "主角在两个世界之间存在真实的情感张力——是否想回去、能否回去、该不该回去"
  - "穿越不是获得无敌能力的捷径——现代知识是优势但不能替代异世界的基本规则"

reader_expectations:
  - "穿越发生在开篇3章内——读者来读穿越不是为了看漫长前传"
  - "第一个利用现代知识/思维解决问题的场景在5章内出现"
  - "异世界/古代社会的规则和秩序在前10章内被建立"
  - "主角至少面临一次因文化差异导致的严重误解或危机"
  - "存在与主角形成对照的本地人角色——展示'土著'的智慧和能力"
  - "穿越的代价（失去原世界的羁绊/无法回归等）被真实地处理"

common_conflicts:
  - "文化冲突：现代价值观vs异世界/古代社会规则——行为被误解/排斥/惩罚"
  - "知识应用困境：知道原理但不具备实现条件——现代知识的实用转化需要本地资源"
  - "身份危机：我是谁——原世界的我、现世界的身份、两个身份的融合"
  - "归属感挣扎：在两个世界间的拉扯——回去的渴望vs已建立的新羁绊"
  - "改变历史的道德困境：用未来知识改变异世界的发展轨迹是否合理？"

chapter_rhythm:
  pace: "穿越初期（约前10章）节奏可控——适应新世界的过程放缓，让读者和主角一起感受异世界的细节。中期加速——主角开始利用知识优势行动，事件密度提高。当主角在两个世界/新旧身份间产生拉扯时放慢节奏，深化情感。回故乡/再穿越等关键转折加速。"
  hook_placement: "穿越特有的钩子是'下一步会发生什么我在原世界从未经历过的事'——新世界的未知性本身就是钩子。其次是'我的现代知识能否在这个场景中发挥作用'——应用知识解决问题的期待感。最后是'我还能回去吗/我想回去吗'——归属感悬念。"
  climax_pattern: "高潮通常涉及关键选择——留下还是回去？或者主角利用两个世界的知识融合实现了其他人无法完成的事。最终胜利不应仅靠现代知识——而应是现代思维与异世界规则融合产生的独特方案。结局应回应'主角的穿越究竟意味着什么'。"

character_archetypes:
  - name: "穿越者主角"
    traits: "携带原世界的知识/技能/思维方式。在新世界中是'外来者'。有对原世界的记忆和情感羁绊。面临重新建立社会身份的挑战。"
    checks: "主角的适应过程是否有阶段和反复？其知识应用是否有合理的失败案例？"
  - name: "本地引导者"
    traits: "帮助主角了解新世界规则的角色。对新世界的规则有深刻理解。可能与主角形成互助关系——教主角规则,同时向主角学习新思想。"
    checks: "引导者是否也有成长弧线？其对新世界的理解是否有盲点？"
  - name: "文化冲突代言人"
    traits: "代表新世界中与主角价值观最冲突的部分。可能是保守势力的代表或制度执行者。"
    checks: "这个角色的立场是否有其合理的社会基础（而非纯恶意）？冲突是否有升级和演变？"
  - name: "原世界羁绊"
    traits: "在原世界中与主角有重要关系的人。可能是主角想回去的原因。偶尔出现在回忆或幻象中。"
    checks: "原世界的羁绊是否在穿越后持续影响主角的决策？是否有合理的心理处理？"
  - name: "同样来自异世界的人"
    traits: "另一个穿越者（如果穿越非唯一）。与主角有不同背景和目标。可能是盟友或竞争者。"
    checks: "另一穿越者的行为逻辑和目标是否与主角形成有意义的对照？"

worldbuilding_checks:
  - "新世界的规则是否有内在逻辑——政治/经济/社会结构是否自洽？"
  - "语言障碍如何解决？（翻译魔法/共通语/学习过程）——解决方案是否一致？"
  - "技术水平的差异是否被准确刻画？（古代没有的不仅是科技,还有现代思维方式）"
  - "穿越机制本身是否有规则和限制？（单向/双向/多人/触发条件）"
  - "两个世界的时间流速关系是否一致？"

plot_checks:
  - "现代知识的应用是否有合理的实现过程和失败案例？"
  - "主角对新世界的改变是否引发了其意料之外的连锁反应？"
  - "文化冲突是否在逐步深化而非停留在'古代/异界好愚昧'的浅层？"
  - "主角面临的困境中是否有现代知识完全帮不上忙的？"
  - "结局是否处理了'归属'问题——主角在两个世界间是否做出了有意义的抉择？"

continuity_checks:
  - "主角原世界的知识/技能是否被完整记录且前后一致？（不能突然多出之前未提过的技能）"
  - "新世界的规则是否在全文保持一致性？"
  - "语言/文化细节的变更是否有连续记录？"
  - "两个世界的时间线（如果相关）是否同步？"

genre_specific_guards:
  - "防'现代知识万能化'：不是所有现代知识都能在异世界实用转化——有些需要基础设施和产业链"
  - "防'文化降维打击'：异世界/古代人不应全体降智——每个社会有其自身的智慧和逻辑"
  - "防'语言/身份问题秒解'：获得语言能力/身份的过程应有合理的难度和机制"
  - "防'原世界遗忘症'：主角不应对原世界瞬间割裂——对家乡/家人的思念应持续存在"
  - "防'穿越=无敌':现代知识是优势但远非无敌——异世界的力量体系/社会规则才最根本"
  - "防'后宫式收人':穿越后不应每个遇到的异性都无条件倾慕主角——建立有深度的关系"

forbidden_patterns:
  - pattern: "穿越后立即全知全能"
    reason: "丧失适应过程的趣味性和成长张力，是穿越题材最致命的偷懒"
  - pattern: "异世界人是傻子"
    reason: "本地角色智商打折来突显主角聪明——这是对读者和角色的双重不尊重"
  - pattern: "现代知识无限制落地"
    reason: "不考虑基础设施/产业链/文化接受度的'空降科技'是不现实的"
  - pattern: "语言/身份无缝切换"
    reason: "处理语言和身份问题的困难是穿越题材最精彩的部分之一——跳过就是浪费"
  - pattern: "原世界无任何后续影响"
    reason: "除非故事一开始就明确'永久穿越不回',否则原世界的存在应持续造成心理影响"
  - pattern: "所有女性角色都是'待拯救的公主'"
    reason: "异世界女性有自己在该世界的生存智慧和力量——不应全部弱化为男主的附庸"

reader_pull_rules:
  - "'如果我去到那个世界会怎样'的代入感是穿越最基础的吸引力——让读者感受异世界的细节"
  - "现代知识带来的'降维打击'爽感需要在前期有效建立——但不能持续到后期"
  - "文化冲突中的幽默感和戏剧性是最好的调味剂——让差异产生有趣而非仅仅是困境"
  - "主角与本地人的互动质量决定作品高度——'两个世界的桥梁'比'一个外来者'更有魅力"
  - "'回去'的选择应始终作为一个可能性存在——增加主角决策的情感重量"

outline_validation_rules:
  - "穿越机制是否在大纲阶段已完整定义（触发/条件/限制/返回可能性）？"
  - "主角的现代知识清单是否已列出并在大纲中标注应用节点？"
  - "新世界的规则体系是否已完整建立？与主角现代知识的冲突点是否标注？"
  - "主角的适应曲线是否呈阶梯状——有关键的适应突破和反复？"
  - "返回/不返回的伏笔是否在大纲中埋设？"

agent_focus:
  - focus: "知识应用合理性"
    detail: "追踪每个现代知识/技能的应用场景，检查实现条件和过程是否合理"
  - focus: "文化适应曲线"
    detail: "分析主角在不同阶段对新世界的适应程度，检查是否有跳跃式适应"
  - focus: "本地角色独立性"
    detail: "审查本地关键角色是否有独立于主角的行为逻辑和目标"
  - focus: "语言/身份一致性"
    detail: "追踪语言使用和身份表达，确保没有无解释的切换"
  - focus: "原世界影响持续性"
    detail: "检查主角对原世界的提及/回忆/情感处理频率是否合理"

review_questions:
  - "如果删掉穿越设定，主角换个身份出现在这个世界，故事还能成立吗？（如果几乎不变，穿越只是模板）"
  - "你的新世界有哪些'只有穿越者视角才能看到'的有趣细节？读者会因这些细节而觉得不虚此行吗？"
  - "主角想到过回原世界的方法吗？如果回去,会面临什么选择？这些选择有没有在故事中被认真对待？"
  - "新世界的本地人中有没有比主角更聪明/强大的角色？他们如何影响故事？"
  - "穿越在这个故事中的主题含义是什么？它只是一个'进入异世界的传送门'还是关于身份/归属/改变的深层隐喻？"
