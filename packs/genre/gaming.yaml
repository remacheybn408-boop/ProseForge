# ============================================================
# 网游电竞小说体裁规则包
# ============================================================
genre_id: gaming
name: 网游电竞
description: >
  网游电竞小说体裁规则包，涵盖VR/全息网游、竞技游戏、电竞职业和
  游戏异界等子类型。核心要素包括游戏机制设计、玩家成长路径、竞技对抗
  和虚拟社区生态。此类作品需要建立一个值得读者'想玩'的虚构游戏，
  同时处理好虚拟与现实两条线的交织。

core_promises:
  - "虚构游戏的核心机制清晰且自洽——职业/技能/装备/经济系统经得起推敲"
  - "游戏内的成长有清晰的阶段和标志——等级/装备/排名/成就对应实质性的能力变化"
  - "竞技对抗有真实的策略和操作描写——不是简单地'主角更努力所以赢了'"
  - "虚拟世界与现实世界存在有意义的互动——游戏成就对现实生活的影响被认真对待"
  - "队友/公会/对手都是真实的人——每个重要玩家的背景和动机值得描绘"
  - "技术/操作描写有现实基础——对游戏类型的理解反映在具体细节中"

reader_expectations:
  - "游戏世界的基本设定和核心玩法在前5章内被建立"
  - "主角的首个'高光操作'在3-5章内出现"
  - "装备/技能/等级的首次重大突破在10章内发生"
  - "竞技/团战/副本等核心游戏内容在15章前被充分展示"
  - "存在与主角水平相当的技术型对手（非仅靠装备碾压）"
  - "现实生活线在游戏线之外有独立的存在价值"

common_conflicts:
  - "技术vs氪金：操作型玩家与付费型玩家的对抗"
  - "虚拟身份vs现实身份：游戏中的强者在现实中可能是普通人"
  - "团队合作与个人英雄主义：MMO中的配合需求vs个人carry"
  - "版本变迁与meta变化：游戏更新带来的力量格局重组"
  - "电竞职业生涯的不确定性：年龄/状态/市场变化"

chapter_rhythm:
  pace: "游戏战斗/竞技章节高速推进——短句、动作描写、瞬间判断。日常/练级/制造章节中等节奏——展示游戏世界细节和角色互动。现实生活线舒缓——作为游戏紧张的缓冲区。大型副本/锦标赛多章节连续推进。发育期（约60%）→竞技期（约40%）"
  hook_placement: "网游电竞最强钩子——'即将掉落/合成的稀有装备'、'即将开始的排位赛/锦标赛'、'新副本/新BOSS的首次挑战'。其次是队友关系——'那个神秘高手是谁'、'团队能否通过考验'。现实线的钩子以'身份暴露/被发现'和'职业抉择'为主。"
  climax_pattern: "卷高潮通常为大锦标赛/世界赛/关键团战。全书高潮通常是最高级别赛事的决胜局或游戏世界与现实世界的最终交汇。胜利应来自于团队配合/战术创新/操作突破——而不仅是等级或装备优势。终局应回应'游戏的意义'——它仅仅是游戏,还是改变了参与者的人生？"

character_archetypes:
  - name: "天才玩家主角"
    traits: "在某类型游戏中拥有天赋。可能是前职业选手回归/新手天赋型。有独特的游戏理解和操作风格。"
    checks: "主角的强项是否有具体展示（而非空口说'他是天才'）？弱项是否在故事中造成过真实困扰？"
  - name: "核心队友团"
    traits: "各有定位（坦克/输出/治疗/指挥等）和性格互补。有独立的游戏目标和个人线。"
    checks: "每个队友是否在至少一场关键战斗中发挥了不可替代的作用？"
  - name: "宿命对手/明星选手"
    traits: "与主角在不同维度形成对比的顶尖玩家。可能是操作更强/战术更稳/团队更好。"
    checks: "对手是否在被尊重地描绘——而非仅仅作为主角的垫脚石？"
  - name: "职业教练/经理/解说"
    traits: "提供行业视角和经验指导。有自身的职业生涯故事和行业洞察。"
    checks: "这个角色是否提供了主角无法仅通过游戏获得的职业智慧？"

worldbuilding_checks:
  - "虚构游戏的设定是否完整？（职业体系/技能树/装备系统/经济循环/PVP规则）"
  - "游戏版本更新是否有合理的频率和内容？"
  - "游戏社区/玩家文化/黑话是否被细致刻画？"
  - "电竞联赛/俱乐部/转会制度是否参照了现实电竞生态？"
  - "游戏世界与现实世界的时间流速/价值交换是否合理？"

plot_checks:
  - "关键战斗是否展示了战术思考和操作细节（而非结果公告式一笔带过）？"
  - "装备/技能的获取是否有配得上其稀有度的获取过程？"
  - "团队关系是否有起伏和磨合过程？"
  - "现实线是否对游戏线产生了有意义的制约或推动？"
  - "是否存在'版本答案'式的无敌套路——主角恰好拿到了不可战胜的组合？"

continuity_checks:
  - "角色等级/装备/技能状态在各章是否一致？"
  - "游戏版本/平衡性更新是否被跟踪？"
  - "比赛/联赛时间线是否合理？"
  - "公会/战队的人事变动是否有记录？"

genre_specific_guards:
  - "防'数据水文'：装备属性/技能描述的堆砌不应替代战斗场景的叙事"
  - "防'游戏机制漏洞'：虚构游戏的基本平衡要有——不能主角用的都是'绝对优势'套路"
  - "防'现实线空心'：不能所有的现实情节都只是游戏内容的背景板"
  - "防'操作描写空泛'：不要只说'完美操作'而不展示具体是什么操作"
  - "防'装备万能论'：好装备应提供优势但不能替代操作和战术——否则打斗无意义"
  - "防'路人NPC化'：其他玩家应有真实的行为——有高手、有小白、有骗子——而非全体降智"

forbidden_patterns:
  - pattern: "装备/等级碾压一切"
    reason: "如果胜负仅由数值决定,则战斗描写失去意义——策略和操作才是竞技的灵魂"
  - pattern: "无限的新手福利/隐藏任务"
    reason: "主角不能是唯一发现隐藏任务的人——世界Boss/隐藏任务对全体玩家开放"
  - pattern: "队友工具人化"
    reason: "每个队友都应有独立的高光时刻和成长弧——不能只是主角的影子"
  - pattern: "现实线纯功能化"
    reason: "现实生活不应只是'赚钱买设备'——应有情感和成长价值"
  - pattern: "游戏公司降智"
    reason: "游戏公司的运营/平衡/反作弊行为应有专业逻辑"
  - pattern: "段位/排名无实际差距"
    reason: "不同段位选手的差距应在操作和意识上具体体现"

reader_pull_rules:
  - "稀有装备/皮肤的获取是王道爽点——但对获取过程的描写比装备本身更重要"
  - "极限操作的'精彩回放感'——让读者能想象出那一刻的操作画面"
  - "团队配合中的化学反应——'默契'需要具体场景来建立"
  - "排位/积分上升的数字感——每一步都很具体"
  - "亚文化/社区梗的共鸣——玩家读者看到自己熟悉的游戏文化要素"

outline_validation_rules:
  - "游戏核心玩法/职业体系/装备系统是否在大纲阶段完整设计？"
  - "每个关键装备/技能的获取节点和对应事件是否标注？"
  - "重大比赛的赛程和对阵是否已设计？"
  - "现实线与游戏线的交错节奏是否已规划？"
  - "团队成长线是否清晰——每个成员的关键突破点在哪？"

agent_focus:
  - focus: "战斗描写质量"
    detail: "检查关键战斗是否有战术细节和操作描写，标记纯结果型战斗"
  - focus: "游戏世界观一致性"
    detail: "核对游戏设定在各章的使用是否自洽，标记设定冲突"
  - focus: "现实线价值"
    detail: "统计现实线场景是否有独立于游戏线的情节推进"
  - focus: "数值通货膨胀"
    detail: "追踪装备/等级/战力的增长曲线，检查是否有断层式跳跃"
  - focus: "配角参与度"
    detail: "统计每个主要队友在关键事件中的独立贡献"

review_questions:
  - "你设计的这款'虚构游戏'读者会真的想玩吗？它有什么在现实游戏中找不到的独特魅力？"
  - "如果录一段主角的精彩操作的'解说视频'，解说员能说满3分钟吗？（如果不能，战斗描写不足）"
  - "删掉所有游戏内容后，这个故事还剩下什么？（测试现实线的分量）"
  - "你的主角和另一位顶尖选手的差距用3个具体细节展现——这3个细节是什么？"
  - "读者读完你的故事后，会想组一个什么样的队伍/加入一个什么样的公会？"
