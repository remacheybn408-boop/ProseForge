# ============================================================
# 轻小说体裁规则包
# ============================================================
genre_id: light_novel
name: 轻小说
description: >
  轻小说体裁规则包，涵盖以日系轻小说风格为特征的创作类型。核心要素包括
  轻松易读的叙事语调、校园/异世界/日常等常见题材、独白和对话驱动、
  以及相对固定的角色设定模式。此类作品的核心魅力来自亲切的阅读体验、
  角色魅力的展现和创意设定的趣味性。

core_promises:
  - "叙事语调轻松自然——即使处理严肃主题也不过于沉重和冗长"
  - "角色有鲜明且易于记忆的设定——读者能在出场后立刻形成印象"
  - "对话和内心独白推动叙事——不是大段的描写和说明"
  - "创意设定在轻松的表面下有被认真对待——即使搞笑的设定也有内在逻辑"
  - "节奏轻快不拖沓——单卷故事在合理篇幅内完成完整的起承转合"
  - "角色间的互动是故事的核心驱动力——关系和对话优于设定和世界"

reader_expectations:
  - "主角的日常和基本性格在前3章内确立"
  - "第一个有趣的创意设定点（如果是异世界/特殊能力等）在5章内展示"
  - "故事基调（喜剧/日常/冒险/恋爱等）在开篇明确建立"
  - "角色间的化学反应在第一次互动时就开始展现"
  - "插图式的场景描写——让人能'看到'角色和场景的画像性"

common_conflicts:
  - "日常被打破：平静生活被特殊事件/人物/能力侵入"
  - "角色间的误解与和解：因性格/立场差异而产生的戏剧性冲突"
  - "自我认知的探索：青少年/年轻人寻找自己的身份和道路"
  - "特殊能力/身份的适应：获得非凡能力后如何平衡日常和非日常"
  - "关系的发展与转变：友情/恋情/竞争关系的深化和变化"

chapter_rhythm:
  pace: "章节以对话和独白推进——描写和说明保持简短。节奏轻快但不过于急促——给读者呼吸的空间。日常部分稍慢以建立角色感，事件部分加速但避免过度紧张。每卷/每本在10-15万字的篇幅内完成一个完整的故事弧线。"
  hook_placement: "轻小说的钩子多在对话结尾——角色说了一句有深意/好笑/让人在意的话。其次是角色的内心独白——让读者窥见角色的真实想法与表面行为的反差。再次是日常行将破裂的预兆——给读者'接下来要发生什么'的期待。"
  climax_pattern: "一卷的高潮通常为角色关系的关键转折（告白/和解/决裂）或核心事件的解决。高潮后的结局给读者情感满足和继续阅读的期待——如果是有续集的作品。"

character_archetypes:
  - name: "普通但有特质的主角"
    traits: "看似普通但有独特的优点或特质。可能有些懒散/废柴/社恐但有底线。随故事推进逐渐展现成长。"
    checks: "主角的'普通'是否有辨识度——不是千篇一律的男高中生？其成长是否在一步步积累？"
  - name: "个性强烈的女主角/搭档"
    traits: "有鲜明的外在特征和内在矛盾。与主角形成化学反应的对比。自身的成长线与主角线交织。"
    checks: "这个角色是否独立有趣——即使不与主角互动也有存在价值？"
  - name: "班级/社团/小团体"
    traits: "各有鲜明性格标签的配角群。提供日常戏剧和对白——丰富故事的内容层次。"
    checks: "小团体中每个人是否有至少一次独立发挥作用的机会？"
  - name: "神秘角色/引路人"
    traits: "比主角更了解世界秘密的存在。引导主角走向更大的舞台。自身有复杂的过去。"
    checks: "这个角色是否在主角成长后仍然保持了神秘度和魅力？"

worldbuilding_checks:
  - "如果是异世界设定——其基本规则是否易于理解（而非复杂到需要说明书）？"
  - "日常与非日常的切换是否有合理的触发器？"
  - "学校/社团/组织等日常场景的规则和氛围是否被一致地刻画？"
  - "科技/魔法/特殊能力的规则是否简单且前后一致？"
  - "世界观信息是否通过角色体验/对话自然呈现（而非旁白大段说明）？"

plot_checks:
  - "每一卷/每个故事弧线是否有独立的起承转合？"
  - "对话是否推动了情节（而非仅是展示角色性格）？"
  - "喜剧/搞笑元素是否被安放在正确的节奏位置（紧张后的释放）？"
  - "是否存在'篇幅灌水'——日常情节在重复中消耗耐心？"
  - "角色关系的变化是否有具体事件触发——而非仅是时间的推移？"

continuity_checks:
  - "角色的性格标签和行为是否在所有场景中保持一致？"
  - "时间线的推进是否清晰（学期/假期/事件的时间关系）？"
  - "角色间的关系状态是否有连续记录——不会出现关系状态的错误回溯？"
  - "设定的细节（如能力的使用限制/道具的功能等）是否始终如一？"

genre_specific_guards:
  - "防'日常水文'：日常情节不能是同类型互动的重复——每次日常都应有新的要素"
  - "防'角色标签化'：不能全靠标签支撑角色——应有标签之下的真实性格"
  - "防'后宫的恶性循环'：不断增加女性角色而不深化已有关系——是轻小说常见雷区"
  - "防'篇幅过度膨胀':轻小说每卷应有明确的终点——不无限拖长"
  - "防'设定繁杂过度':世界观不应比角色本身更重要——轻小说的核心是角色"
  - "防'风格不统一':叙事语调在全文中保持轻松——突然的严肃长篇可能让读者不适"

forbidden_patterns:
  - pattern: "女性角色仅为'可攻略对象'"
    reason: "即使是在恋爱喜剧中,女性角色也应有独立于男主角的生活和目标"
  - pattern: "日常=无限循环"
    reason: "日常情节需要变化和进化的轨迹——不能是相同模式的永远重复"
  - pattern: "一卷结尾无实质推进"
    reason: "读者购买下一卷的理由应来自故事引力而非惯性"
  - pattern: "角色关系长期无进展"
    reason: "关系悬而未决过长会耗尽读者耐心——需要逐步推进或明确转折"
  - pattern: "纯粹依赖标签的角色"
    reason: "傲娇/天然呆/腹黑等标签是入口,不是全部——标签之下需要真实的人物"
  - pattern: "过量旁白解说世界观"
    reason: "轻小说的世界观应通过对话和事件展示——不是说明书"

reader_pull_rules:
  - "角色魅力是轻小说的第一生产力——让读者'想和这个角色交朋友'"
  - "对话的趣味性决定可读性——好的对话让人想一直翻页"
  - "日常中突然的非日常转折——'世界的裂缝'让日常变得不再安全"
  - "角色间的'化学反应'——两人的对话和互动是阅读的最大乐趣"
  - "每卷结尾留下的'想看到更多'——对下一卷的明确期待"

outline_validation_rules:
  - "每卷是否有独立完整的故事弧线？"
  - "角色关系的进化线是否贯穿全篇？"
  - "日常与非日常的交替是否有节奏规划？"
  - "每卷的情感曲线是否有起伏（而非一条直线）？"
  - "关键设定的揭示节点是否已标注？"

agent_focus:
  - focus: "角色深度评估"
    detail: "分析主要角色是否能超越标签——标签之下的性格和行为动机"
  - focus: "日常重复度"
    detail: "检测不同章节的日常场景是否在模式上有足够变异"
  - focus: "对话密度与质量"
    detail: "统计对话占总篇幅的比例和功能性——非功能闲聊的占比"
  - focus: "关系进展追踪"
    detail: "追踪关键角色关系是否有定期的小进展或转折"
  - focus: "语调一致性"
    detail: "检查叙事语调是否在全文中保持轻小说的基调"

review_questions:
  - "你的主角有什么让人一见面就产生好感的魅力？是幽默感？善良？还是有趣的思维方式？"
  - "如果只能用一句话形容这本书的乐趣——那句话是什么？"
  - "书中的日常场景是否在每一次'重复'中都加入了新元素——新角色/新信息/新关系动态？"
  - "角色关系线从第一卷到最后一卷是否有清晰可追踪的进展轨迹？"
  - "这本书的哪个场景在你脑海里是最清晰的画面——你能否详细描述那个画面？"
