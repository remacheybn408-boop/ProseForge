# ============================================================
# 历史小说体裁规则包
# ============================================================
genre_id: historical
name: 历史小说
description: >
  历史小说体裁规则包，涵盖历史演义、王朝叙事、历史穿越、历史架空、历史传记等子类型。
  核心要素包括时代还原度、历史事件的可信改编、历史人物的合理塑造、古代社会制度的真实
  呈现、语言与礼仪的时代感等。此类作品对历史准确性、时代细节真实性和"在历史框架内"
  的叙事逻辑有极高要求——历史小说的读者群体中往往包含相当比例的历史爱好者，他们
  对史实错误的容忍度极低。同时需注意"大事不虚，小事不拘"的创作原则。

# ---- 核心承诺 ----
core_promises:
  - "时代背景的核心要素（政治制度、社会阶层、经济形态、军事技术）与所选历史时期的事实一致"
  - "如果涉及真实历史人物，其性格、行为和历史轨迹需在史料记载的基础上进行有限的文学发挥"
  - "虚构角色的行为需符合其所处的历史社会环境——不能出现超越时代的思想和行为"
  - "日常生活细节（衣食住行、礼仪习俗、语言称谓）有扎实的考据基础"
  - "历史事件的时间线和因果关系与史实相符（或在架空设定中有明确且合理的偏离说明）"
  - "小说的历史观清晰一致——对历史事件的价值判断有其内在逻辑"

# ---- 读者期待 ----
reader_expectations:
  - "前3章内建立清晰的时代坐标——通过具体的细节（年号/地名/制度/器物）而非直接说明"
  - "历史考据的深度在细节中体现——不是长篇大论的历史课，而是通过叙事点缀让懂行的读者会心一笑"
  - "历史穿越类：主角利用现代知识改变历史需有合理的实施过程和时代限制"
  - "历史人物的对话和思维需要有时代特征——不能用现代人的价值观和表达方式"
  - "重大历史事件的呈现需有宏大感和细节感的平衡——既见森林，也见树木"
  - "对历史事件的解读应有多角度呈现——不将复杂历史简化为单一叙事"

# ---- 常见冲突 ----
common_conflicts:
  - "个人vs时代洪流：小人物在大历史中的挣扎——历史小说最经典的冲突类型"
  - "忠vs孝/义：古代伦理体系中的两难选择——中国历史小说特有的核心冲突"
  - "革新vs守旧：变法/改革者与保守势力的斗争"
  - "王朝兴衰：从草创到鼎盛再到衰亡的必然与偶然"
  - "华夷之辨/文化冲突：农耕文明与游牧文明/海洋文明的碰撞"
  - "阶层壁垒：士农工商的等级秩序对个人命运的决定性影响"
  - "正统之争：皇位继承、禅让与篡夺、大义名分的争夺"

# ---- 章节节奏 ----
chapter_rhythm:
  pace: "历史小说的节奏通常较为沉稳——前期建立时代氛围和人物关系，可容许较长的铺垫期（前10-15章）。中期随着历史冲突的展开逐步加速。重大历史事件（战争/政变/变法）是天然的高潮节点，在这些章节节奏应快。历史小说独特的'沉闷美'——在重大事件之间的'日常政治'、礼仪活动、文化场景中，节奏可放缓以展示时代质感。"
  hook_placement: "历史小说特有钩子——'历史节点逼近型钩子'：读者知道某重大历史事件即将发生（如赤壁之战），章节结尾停在事件爆发前夕，形成强烈的期待。其次——'人物命运悬念型钩子'：历史人物的已知结局与小说中的呈现形成张力。再次——'细节揭示型钩子'：通过器物/文书/对话的细节暗示即将发生的政治风暴。"
  climax_pattern: "历史小说的高潮往往与重大历史事件重合。但优秀的历史小说会在历史事件的大高潮之外设置个人命运的小高潮——一个虚构角色在历史洪流中的关键抉择。高潮前的铺垫需要让读者看到多重力量的汇聚——经济、政治、军事、文化的矛盾在同一时刻爆发。结局通常带有历史的沧桑感——个人的胜利或失败在历史长河中或许只是沧海一粟。"

# ---- 角色原型 ----
character_archetypes:
  - name: "历史见证者/小人物主角"
    traits: "出身平凡，因缘际会卷入历史洪流。视角有限但真实——读者通过TA的眼睛看到大历史的侧面。生存和适应是第一目标。"
    checks: "主角的视角是否始终受限？是否避免了'全知全能的小人物'的矛盾？"
  - name: "真实历史人物"
    traits: "在史料记载的基础上赋予血肉。行为逻辑有史料依据。即使作为反派也有其历史合理性。"
    checks: "历史人物的塑造是否可追溯至具体史料？发挥的部分是否不违背史料记载的基本事实？"
  - name: "改革者/理想主义者"
    traits: "试图改变时代的人物——可能是历史人物或虚构角色。理想与现实的残酷碰撞。最终结局可能是悲剧性的。"
    checks: "改革者的思想是否可以在其所处时代找到思想源头（而非凭空出现的现代思想）？失败的原因是否有历史合理性？"
  - name: "权力核心成员"
    traits: "皇室/权臣/军阀——掌握或接近权力中心的人物。在权力斗争中展现人性的复杂面。"
    checks: "权力斗争的描写是否有真实的政治逻辑，而非简单的'这个人是坏人'？"

# ---- 世界观检查 ----
worldbuilding_checks:
  - "时间线：所有提及的历史事件日期是否与史实一致（或在架空设定中有明确的时间标记）？"
  - "制度还原：官职/科举/兵制/赋税/法律的描写是否符合所选朝代？"
  - "地理准确：地名沿革、疆域变迁、交通路线是否符合历史地理？"
  - "物质文化：服饰、器物、建筑、饮食的描写是否符合时代特征？"
  - "社会风俗：礼仪、婚姻、丧葬、节庆的描写是否符合当时的社会规范？"
  - "语言风格：对话中的称谓、敬语、谦称是否符合时代和身份？"

# ---- 情节检查 ----
plot_checks:
  - "史实审查：所有涉及真实历史事件的情节是否与史料记载的核心事实一致？"
  - "架空合理性：偏离史实的情节是否有合理的'如果……就……'逻辑（历史架空的价值在于探讨历史的另一种可能）？"
  - "时代逻辑：角色的决策是否考虑了其所处时代的认知局限和技术限制？"
  - "穿越合理性：历史穿越类——主角的现代知识在实际应用时是否考虑了时代的技术和制度限制？"
  - "多重因果：历史事件的成因是否展现了多维度因素（而非简单归因于某一个人或事件）？"
  - "配角的时代性：所有虚构角色是否都符合其所处阶层和时代的行为模式？"

# ---- 连续性检查 ----
continuity_checks:
  - "人物年龄与历史时间线的匹配：角色的年龄增长是否与历史事件的推进同步？"
  - "官职/爵位变迁：角色的官场轨迹是否连贯且符合制度（升迁/贬谪的节奏和理由是否合理）？"
  - "地名变迁：同一地点的名称在不同时期是否使用了正确的时代称呼？"
  - "器物时代感：是否存在'穿越物品'——某个器物在故事设定的时代尚未出现？"
  - "语言演变：词汇和表达方式是否与时代一致？（如'经济'在古代与今义不同）"

# ---- 类型特定防护 ----
genre_specific_guards:
  - "防时代错位（核心）：建立时代特征检查表——对所有描写进行'这个时代有没有这种东西'的核查"
  - "防历史人物脸谱化：真实历史人物不过度美化或丑化——保持史料的复杂性和多面性"
  - "防现代价值观投射：角色的道德判断和情感表达不能脱离其时代背景"
  - "防历史决定论：不将历史事件描写为'必然如此'——保持历史偶然性和个人选择的空间"
  - "防考据炫技：历史细节的展示应为叙事服务，不能为了展示考据水平而打断叙事节奏"
  - "防穿越者神话：历史穿越类——现代人到古代不是去当神仙，技术/制度的移植需要过程"

# ---- 禁用模式 ----
forbidden_patterns:
  - pattern: "重大史实错误（如朝代顺序/皇帝名字/关键战役的时间地点）"
    reason: "此类错误会瞬间摧毁历史读者对作者的信任——历史小说的信誉是积累在每一个准确细节上的"
  - pattern: "穿越者毫不费力地复制现代科技"
    reason: "严重低估技术和制度移植的复杂度——读者对'穿越即可为王'的简单化叙事越来越疲劳"
  - pattern: "历史人物行为不符合史料记载而无合理解释"
    reason: "如果改变历史人物的核心行为（如让岳飞不抗金），需要极充分的架空逻辑解释"
  - pattern: "把古代人写成心理上完全现代的'穿着古装的现代人'"
    reason: "丧失了历史小说的核心魅力——让读者体验不同的时代心灵"
  - pattern: "单一历史解释（如'王朝灭亡只因一个女人'）"
    reason: "过度简化历史因果——既不符合历史研究，也缺乏叙事深度"
  - pattern: "滥用诗词歌赋作为'文采'填充"
    reason: "角色不分场合出口成章——在没有印刷术/教育的时代，文盲率极高，文化表达方式需符合实际"

# ---- 读者吸引力法则 ----
reader_pull_rules:
  - "历史读者最大的快感来源是'细节的真实'——一个准确的官职称呼比十段夸饰更令人信服"
  - "利用读者对历史事件的已知结局制造戏剧反讽——读者知道赤壁之战曹操会败，但小说可以让他们看到'为什么会败'的丰富层次"
  - "历史小说的情感张力来自'明知结局的无力感'——不需要靠悬念（读者知道历史结局），而是靠过程的情感深度"
  - "小人物视角下的历史事件有独特魅力——读者想知道'如果我在那个时代，会看到什么'"
  - "历史中的'如果'是最强钩子——展示历史的关键十字路口，让读者思考另一种可能"

# ---- 大纲验证规则 ----
outline_validation_rules:
  - "大纲中是否有标注所有涉及真实历史事件的时间节点和对应的史料来源？"
  - "架空设定部分是否有明确的'偏离点'标注——从哪个历史节点开始偏离？偏离的逻辑是什么？"
  - "是否有角色阶层轨迹图——展示虚构角色在社会阶层中的移动是否合理？"
  - "是否有跨章时间跳跃的检查——每次跳跃后角色的年龄、地位、关系是否合理更新？"
  - "是否有历史考据清单——列出大纲中所有需要核实的历史细节及其查证状态？"

# ---- 智能体审查聚焦点 ----
agent_focus:
  focus: "史实准确性核查"
  detail: "对照已知历史数据，检查时间线、人名、地名、制度名称的准确性"
  focus: "时代感一致性"
  detail: "检测所有描写中的时代错位——器物、语言、思想、社会规范"
  focus: "历史人物塑造"
  detail: "检查真实历史人物的行为是否符合史料记载，发挥部分是否在合理范围内"
  focus: "架空逻辑合理性"
  detail: "对于偏离史实的情节，检查其'如果-就'逻辑链是否完整且可解释"
  focus: "叙事与考据平衡"
  detail: "标记考据信息堆积的段落，确保历史细节以叙事方式呈现"

# ---- 审查提问 ----
review_questions:
  - "如果一个研究此朝代的历史学者阅读这本小说，他会在哪个细节上点头认可？又会在哪个细节上皱眉？"
  - "小说中的虚构主角是否真实地受到了其所处时代的限制？还是TA本质上是一个现代人？"
  - "所有真实历史人物的核心历史轨迹是否被尊重？（可以有文学发挥，但不能有根本性矛盾）"
  - "如果这是历史穿越/架空，'偏离点'的逻辑是否足够强大以至于能让读者暂时搁置怀疑？"
  - "读者能否通过这本小说真正感受到那个时代的'质感'——气味、温度、光线、社会氛围？"
  - "重大的历史事件在小说中是否被赋予了多层次的因果解释（而非单一归因）？"
  - "是否存在为了情节方便而让制度/法律/社会规范突然失效的情况？"
