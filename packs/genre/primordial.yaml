# ============================================================
# 洪荒小说体裁规则包
# ============================================================
genre_id: primordial
name: 洪荒
description: >
  洪荒小说体裁规则包，涵盖以中国上古神话、洪荒时代为背景的小说类型。
  核心要素包括盘古开天、龙凤大劫、巫妖之战、封神量劫等经典事件，
  以及先天灵宝、功德、气运、因果等东方神话概念。此类作品的核心魅力
  来自宏大叙事的史诗感、神话人物的重新演绎和世界观层级的无穷扩展。

core_promises:
  - "洪荒世界观的层级结构清晰——从混沌到开天,从先天到后天,从洪荒到封神"
  - "力量体系以先天/后天、大道/天道/圣人为锚点——层级跨越的难度和代价被严格定义"
  - "经典神话事件在故事中有创新性诠释——不是照搬《封神演义》或《西游记》"
  - "气运/功德/因果不是摆设——每次重大行动都受其影响并产生后果"
  - "先天灵宝和先天至宝有真实的稀缺性和威能——不是数量泛滥的'传说装备'"
  - "主角在神话大框架中的个人之路清晰——跟随大势还是逆天改命？"

reader_expectations:
  - "洪荒世界的基本层级结构在前5章被展示"
  - "主角的身份和根脚（出身）在开篇被确立"
  - "至少一个经典洪荒大事件（如龙凤大劫/巫妖之战/封神量劫等）在故事中展开"
  - "主角的力量路径与经典修炼体系有可辨识的关系"
  - "存在多个洪荒大能的登场——且每个都保持了与该人物的神话原型一致的格调"
  - "世界观在推进中不断扩展——从洪荒大地到三十三重天到混沌世界"

common_conflicts:
  - "量劫卷入：大劫来临时没有人能独善其身——主角如何在劫中求存？"
  - "先天与后天的矛盾：先天生灵/大能的傲慢vs后天修行者的奋斗"
  - "天道意志vs个人意志：天道大势不可违但主角想改——矛盾源自何处？"
  - "势力阵营的对抗：截教/阐教/妖族/巫族——阵营选择即命运"
  - "传承与创新：遵循古老法门还是开辟新路？"

chapter_rhythm:
  pace: "洪荒叙事的自然节奏偏宏大舒缓——以百年/千年为单位的时间跨度在洪荒中正常。大事件和战斗场景密集而恢弘。日常/潜修/悟道章节以哲学思辨和世界探索为内容——非纯闲笔。时间跳跃使用自然的时间单位（一个元会/一个劫）——跳跃后需快速建立当前世界的状态变化。"
  hook_placement: "洪荒特有钩子——'下一次量劫的逼近'、'某位大能的登场/出关'、'先天至宝现世的异象'、'某个神话事件的创新性展开'。还有'因果兑现'——前期种下的因在设计好的时机结出果实。以及'世界观扩展'——天外还有天,混沌之上还有未知。"
  climax_pattern: "以经典洪荒事件（如巫妖决战/封神大战）为卷高潮的自然节点。这些事件的结构读者已有预期——但你的创新解读是高潮的价值所在（如赋予反派动机、展示事件的隐藏维度）。全书高潮通常为超越洪荒体系本身——突破天道限制或达到前所未有的境界。"

character_archetypes:
  - name: "穿越/重生型主角"
    traits: "知晓洪荒大势的现代人/重生者。利用先知先觉在洪荒中布局。面对'是否改变已知命运'的困扰。"
    checks: "主角的先知优势是否被'蝴蝶效应'和'大能察觉'限制？其知识是否在某些关键时刻失效？"
  - name: "先天大能"
    traits: "如三清/女娲/准提接引等神话人物。有宏大格局和深邃智慧。其行为有完整的神话逻辑。"
    checks: "大能的塑造是否超越了'脸谱化'——每个大能都有自己的道和局限性？"
  - name: "宿命对手"
    traits: "与主角在同一时代崛起的竞争者。可能是巫族/妖族/人族的天才。"
    checks: "对手的成长路径和选择是否与主角形成有意义的对照——不仅是'打架'的对手？"
  - name: "道祖/圣人之上的存在"
    traits: "如鸿钧/天道甚至更超然的存在。往往是规则的建立者和维护者。可能是有隐藏议程的终极存在。"
    checks: "这个层次的存在是否保持了应有的超然感——而非'不过是大一点的BOSS'？"

worldbuilding_checks:
  - "洪荒的力量层级是否清晰且一致？（凡人→地仙→天仙→真仙→金仙→太乙→大罗→准圣→圣人→天道→大道）"
  - "先天灵宝/至宝的品级和来源是否明确？是否有唯一性约束？"
  - "气运/功德/因果的运作机制是否在故事中有具体的体现？"
  - "不同种族（巫族/妖族/人族/龙族等）的特点和势力范围是否被定义？"
  - "时间尺度在洪荒中是否被正确处理？（千年一闭关/万年一会盟）"

plot_checks:
  - "经典洪荒事件的再创作是否有新意——不只是重述而是赋予了新的解读？"
  - "主角的崛起是否顺应了洪荒大势的某个缺口——而非纯粹靠金手指？"
  - "气运/因果的变化是否有情节的具体体现——而非仅是旁白说明？"
  - "是否存在'穿越者全知全能'的问题——主角的知识是否在某些方面受到限制？"
  - "先天至宝/灵宝的获得是否有配得上的过程？（即使是机缘也需要代价或对应的大因果）"

continuity_checks:
  - "力量境界的层级和名称是否在所有章节一致？"
  - "时间线：大事件的时间跨度是否合理——亿万年和瞬间的对比在洪荒中是自然的"
  - "法宝/灵宝的持有者和使用记录是否一致？"
  - "不同势力的实力对比和变化是否有逻辑？"

genre_specific_guards:
  - "防'洪荒=升级流水账'：不能只是一路突破境界——需要有思想、有选择、有情感"
  - "防'灵宝通货膨胀'：每章出新法宝而旧法宝被遗忘——灵宝应有生命周期和个性"
  - "防'大能降智'：圣人和顶级大能的智慧不能被削减以突显主角"
  - "防'洪荒只是背景板'：洪荒时代的特征（如弱肉强食/因果报应/天道意志）应推动情节"
  - "防'经典人物工具化'：用神话人物只为让主角'打脸'——应尊重原型的基础格调"
  - "防'时间尺度失实'：不能用现代人的时间感来写洪荒——百年转瞬的概念应在叙事中体现"

forbidden_patterns:
  - pattern: "穿越者依靠知道剧情碾压一切"
    reason: "先知优势应被蝴蝶效应和大能的察觉所限制——否则就只是开挂"
  - pattern: "洪荒强者排队送经验"
    reason: "神话人物不能变为流水线式的经验包——每个对手应有独特的动机和格调"
  - pattern: "灵宝/神通变成数字游戏"
    reason: "用'XX级灵宝打XX级对手'的逻辑替代洪荒中因果/气运/道心的复杂性"
  - pattern: "历史事件照搬无创见"
    reason: "对经典神话的重新诠释是洪荒文的价值所在——不是复制"
  - pattern: "女性角色纯粹附属化"
    reason: "洪荒中的女仙/女圣（如女娲/西王母/嫦娥等）有独立的神话地位"
  - pattern: "时间跨度忽大忽小无一致性"
    reason: "洪荒的时间尺度需要保持——不能这章修行万年下章每分钟都有事"

reader_pull_rules:
  - "洪荒读者最享受的是'站在历史之上看历史'的宏大视角——让读者感受时代的浩瀚"
  - "熟悉的神话人物以鲜活的形象登场是核心吸引力——'原来三清是这样的'"
  - "先天至宝/灵宝的获取和威能展示是经典爽点——但获得过程和代价使爽点真实"
  - "量劫/大事件的'无法逃避感'是持续的紧张来源——没有人可以置身事外"
  - "世界观层级的一层层揭示是终极好奇——混沌之上还有混沌，大道之外还有大道"

outline_validation_rules:
  - "洪荒完整时间线和量劫节点是否已建立？"
  - "力量境界的整体结构图是否完整？每个阶段的特征是否定义？"
  - "重要先天灵宝/至宝的出现和流转是否已规划？"
  - "关键神话人物的性格和处理方式是否已确定？"
  - "故事中对经典事件的创新点是否已明确（非照搬原著之处）？"

agent_focus:
  - focus: "力量体系一致性"
    detail: "对比各章境界和战力描述，确保与层级结构一致"
  - focus: "神话人物格调保持"
    detail: "检查经典神话人物的塑造是否符合其应有格调"
  - focus: "气运/因果逻辑"
    detail: "追踪气运和因果的运作是否具体体现于情节"
  - focus: "时间尺度合理性"
    detail: "检查时间跳跃/修行跨度的描述是否与洪荒设定吻合"
  - focus: "灵宝生命周期"
    detail: "追踪每个重要灵宝的使用和存在，标记'出场一次再未提及'的法宝"

review_questions:
  - "你的洪荒世界观在众多洪荒小说中有何独特之处？读者会因为什么选择你的洪荒而非别人的？"
  - "三清/女娲/接引准提在你的故事中是怎样的人？他们超越了'好人/坏人'的二元分类吗？"
  - "洪荒中'因果'的力量在故事中是否如'重力'一样始终存在和起作用？"
  - "你的主角最终达到了什么？至高无上的力量——还是某种更深刻的东西？"
  - "经典洪荒事件在你的再创作中获得了什么新的意义？读者能从你的版本中学到或感受到什么新的东西？"
