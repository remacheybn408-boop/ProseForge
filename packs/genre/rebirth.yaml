# ============================================================
# 重生小说体裁规则包
# ============================================================
genre_id: rebirth
name: 重生
description: >
  重生小说体裁规则包，涵盖主角死后/死后重生回到过去、利用前世记忆改变命运的
  作品类型。核心要素包括时间回溯、信息差优势、命运修正和因果连锁反应。
  此类作品的核心爽点来自'先知先觉'的资源获取和危机规避，但最大的创作挑战是
  蝴蝶效应导致的剧情不可预测性和因果逻辑的自洽。

core_promises:
  - "重生有明确的时间锚点——回到什么时间点、携带多少前世记忆，规则清晰不变"
  - "前世记忆是优势也是负担——主角因'知道太多'而产生的情感包袱和行为异常必须被描绘"
  - "蝴蝶效应真实生效——主角的改变行为产生连锁反应，使'先知'优势逐渐减弱"
  - "主角利用前世的失败教训来避免重蹈覆辙，而不仅仅是利用信息差捡漏"
  - "重大事件的时间线变化有因果解释——变了的和没变的都有其理由"
  - "重生本身有代价或目的——为何重生、能否再次重生、重生有次数/条件限制吗"

reader_expectations:
  - "重生机制和规则在前5章内被清晰建立"
  - "至少一个前世重大遗憾在第1章被展现，使读者理解'为何需要重生'"
  - "第一个利用前世记忆获得优势的事件在3-5章内发生（建立爽点预期）"
  - "蝴蝶效应的第一个显现不晚于第15章（展示改变有后果）"
  - "前世关键人物（盟友/敌人/爱人）在重生后的第一次相遇有特殊的情感张力"
  - "重大历史事件的改变过程被详细描写——不能跳过'如何改变'直接展示结果"

common_conflicts:
  - "信息差逐渐消散：前世的先知信息随蝴蝶效应变得越来越不可靠"
  - "行为异常引起怀疑：拥有成年/老练心智的主角在年幼身体中的反常表现"
  - "前世敌人变成了今世盟友（或反之）：因果变化导致的人际关系重组"
  - "命运修正力/世界意志：如果世界有'修正'被改变命运的趋势——则形成核心对抗"
  - "前世与今世的选择冲突：前世深爱的人今世变成陌生人——主角如何面对？"

chapter_rhythm:
  pace: "重生初期（约前20章）节奏较快——利用前世记忆快速布局、收资源、建人脉。中期节奏多样化——蝴蝶效应开始显现,主角从'按剧本走'转向'随机应变'。后期（约60%后）节奏应与全新剧情同步——前世记忆的参考价值已降到最低,主角面对完全未知。"
  hook_placement: "重生特有的钩子是'前世记忆中的重大事件即将在这个时间点发生'——给读者一个倒计时期待。其次是'改变后的连锁反应'——一个小的改动导致了意想不到的大变化。最后是'前世记忆与现实冲突'——事件走向与前世完全不同时的困惑和应对。"
  climax_pattern: "重生卷高潮通常为前世最大的悲剧/失败事件的重演——主角这一次能否改变结局？全书大高潮往往是'揭示重生为何发生'——重生的真正原因和代价的揭示。最终高潮中主角应依靠今世的成长而非仅仅依赖前世记忆取胜。"

character_archetypes:
  - name: "重生者主角"
    traits: "拥有完整或不完整的前世记忆。对某些人有强烈的情感（愧疚/爱/恨）。知道某些悲剧将发生却无法直接证明。成长曲线包含两个维度：今世的成长+前世的经验。"
    checks: "主角的行为是否暴露了远超当前年龄/阶段的心智？是否有人注意到了？前世记忆的模糊程度是否合理？"
  - name: "前世遗憾对象"
    traits: "主角前世亏欠或错过的人。今世与主角建立新的关系——但可能因主角的过度补偿而变得奇怪。"
    checks: "这个角色今世是否发展出了不同于前世的性格和选择？主角是否给予了对方自主权？"
  - name: "前世敌人/今世变数"
    traits: "前世是敌人但在今世因为蝴蝶效应变成了完全不同的关系——可能成为朋友或保持为敌人但原因不同。"
    checks: "关系变化的因果链是否足够充分？变化是否源于角色自身的逻辑而非仅是主角期望？"
  - name: "同样知道未来的对手"
    traits: "另一个重生者或预知者。有不同于主角的目标和策略。迫使主角面对'如果你不是唯一知道未来的人'的挑战。"
    checks: "对手的前世记忆/预知能力是否有不同的版本或角度？使局势变得真正复杂？"
  - name: "怀疑者/观察者"
    traits: "察觉到主角异常的角色——可能是家人/朋友/师长。慢慢发现主角的'预知能力'。"
    checks: "这个角色的怀疑过程是否循序渐进？发现真相后的反应是否真实？"

worldbuilding_checks:
  - "重生机制：单一重生还是可多次重生？携带记忆的程度？是否有其他重生者？"
  - "时间悖论规则：改变过去是否会产生平行世界？还是单一时间线的覆盖？"
  - "命运/世界意志：是否存在对抗改变的力量？其强度和逻辑是什么？"
  - "前世记忆的可靠性：是否完整？是否随时间退化？是否可以被修改？"
  - "蝴蝶效应的规则：改变的传播速度和范围是否有逻辑限制？"

plot_checks:
  - "重生后的每次关键改变是否都有充分的因果链条？"
  - "利用前世记忆的爽点是否在逐步升级（而非一直停留在'我知道彩票号码'的层次）？"
  - "蝴蝶效应是否使剧情逐步脱离前世的轨道？脱离速度是否合理？"
  - "是否存在'为什么前世没想到这个'的逻辑漏洞？"
  - "重大事件是否同时展示了'成功改变'和'意料之外的副作用'？"
  - "最终高潮中前世记忆的角色是否被合理地弱化——主角依赖今世的成长而非记忆获胜？"

continuity_checks:
  - "前世记忆的内容一致性：主角在不同章节中回忆起的前世信息是否自洽？"
  - "时间线双重追踪：前世时间线和今世时间线是否都被准确记录？"
  - "角色关系变化：每个重要人物在前世和今世的关系差异是否被跟踪？"
  - "蝴蝶效应影响地图：每个改变行为的后续影响是否被追踪？"

genre_specific_guards:
  - "防'全知全能'：前世记忆不能包含一切信息——必须有遗忘、模糊和未知"
  - "防'蝴蝶效应缺失'：做过重大改变后世界不能保持不变——变是必须的"
  - "防'智商碾压'：成年心智+未来记忆的主角不能把所有同龄人当傻瓜"
  - "防'情感破产'：过度依赖前世记忆会使今世的人际关系失去真实质感"
  - "防'重生理由缺席'：不能直到结尾都不解释主角为何重生"
  - "防'爽点降级'：后期的爽点不能还是'我记得这个股票会涨'——资源配置应已完成"

forbidden_patterns:
  - pattern: "前世记忆无限且完全精确"
    reason: "降低故事张力——如果主角百分百知道未来,则所有挑战都是走过场"
  - pattern: "改变过去无任何副作用"
    reason: "重生应至少有情感代价（对前世关系的怀念）或因果代价（蝴蝶效应的负面影响）"
  - pattern: "所有重大改变恰好都成功"
    reason: "部分改变应该失败或产生意想不到的负面后果,以维持紧张感"
  - pattern: "重生后立刻忘记了前世的所有情感羁绊"
    reason: "前世的情感经历是重生题材最有力的情感素材——不能浪费"
  - pattern: "蝴蝶效应说到但未做到"
    reason: "如果宣称有蝴蝶效应但100章后世界还与前世一模一样,就是虚假承诺"
  - pattern: "重生理由刻奇化"
    reason: "'因为爱情'或'因为不甘心'作为唯一重生理由过于单薄——应有更深层的世界观支撑"

reader_pull_rules:
  - "'改变已知悲剧'的期待是重生题材最强驱动力——读者渴望看到主角修正最大的遗憾"
  - "先知先觉的爽感是前期核心——但需要逐步升级（从'知道小事件'到'掌控大趋势'）"
  - "蝴蝶效应的不可预测性制造中期悬念——'我改变了一个小事,会引发什么'"
  - "前世和今世的对比制造情感张力——'那个人前世是...今世却...'"
  - "重生题材的核心主题往往是'第二次机会'和'真正的改变需要付出什么'——深层情感挂钩"

outline_validation_rules:
  - "前世完整时间线是否已建立？关键事件、人物、关系已被标注？"
  - "今世时间线的分叉点是否明确？每条改变线和其预期影响是否标注？"
  - "蝴蝶效应的影响传播路径是否可追踪？"
  - "重生机制和规则的完整定义是否在大纲阶段已确定？"
  - "前世记忆衰退/变化的时间节点是否已规划？"

agent_focus:
  - focus: "记忆一致性"
    detail: "对比各章涉及前世记忆的描述，标记矛盾或新增的前世信息"
  - focus: "蝴蝶效应追踪"
    detail: "建立改变行为和后果的映射，检查未产生涟漪效应的重大改变"
  - focus: "年龄适当性"
    detail: "检查主角在特定年龄段的言行是否超越了合理范围"
  - focus: "情感双重性"
    detail: "分析主角对前世关系的情感处理，标记情感破产或过度回避"
  - focus: "预测准确性衰退"
    detail: "追踪前世记忆随蝴蝶效应累积的准确率下降"

review_questions:
  - "你设定的重生机制有什么独特之处？读者会为了这个设定本身而来吗？"
  - "如果主角从未重生，故事的世界和人物会有什么不同？（如果答案是'没有不同'，重生只是噱头）"
  - "前世最大的3个遗憾在故事结束前都如何被处理？只是避免了还是主角从中获得了真正的成长？"
  - "蝴蝶效应在什么节点开始让剧情脱离主角的前世认知？这个节点够早吗？"
  - "故事中有没有前世记忆帮不到的困境——主角必须依靠今世的成长来解决？"
  - "重生这个设定的深层主题是什么？第二次机会？救赎？改变命运的代价？"
