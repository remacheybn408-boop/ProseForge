# ============================================================
# 种田小说体裁规则包
# ============================================================
genre_id: farming
name: 种田
description: >
  种田小说体裁规则包，涵盖以慢节奏建设、资源积累、领地经营和日常生活
  为核心的作品类型。核心要素包括物资生产循环、社区建设、技术升级和
  安定感的营造。此类作品的核心魅力来自'从无到有'的建设满足感，
  '宁静日常'的治愈效果和'积累成长'的可视化反馈。

core_promises:
  - "资源的获取-积累-消耗有清晰的循环逻辑——每一份收获都有对应的付出"
  - "建设/经营的过程有具体细节——不是'过了一个月,一切都建好了'式跳跃"
  - "角色间的日常互动有温度——日常不是'没事发生',而是'小事的积累'"
  - "技术进步有合理的阶段——从简陋到完善的过程被展示"
  - "外部威胁和内部挑战与种田节奏保持平衡——危机不应过于频繁打破宁静"
  - "安定感的营造不是停止成长——平静中蕴含进步,积累中蕴含力量"

reader_expectations:
  - "核心经营元素（农耕/建造/商业/科技等）在开篇5章内确立"
  - "第一个建设成果在10章内被具体展示（第一次收获/第一栋建筑等）"
  - "经营/建设的细节描写保持在适当的密度——让读者'看得见'过程"
  - "人际关系的日常交往有温暖和趣味——邻里/伙伴/家庭的互动"
  - "存在的危机在适当时候打破平静——但种田文的核心节奏不应被长期打断"

common_conflicts:
  - "资源短缺：物资不足迫使创新和节约——这是种田文最基础的冲突"
  - "外部势力干扰：贼寇/官府/竞争者的侵扰——需要建设防御力量"
  - "自然挑战：天气/灾害/疾病——人力与自然的对抗"
  - "社区内部矛盾：不同利益和价值观的调和——领导者的智慧考验"
  - "稳定与发展的平衡：过于保守则停滞,过于激进则风险"

chapter_rhythm:
  pace: "种田文的自然节奏是'日常积累→小突破→短暂庆祝→继续积累'。日常章节舒缓而有温度——以具体事务（播种/收获/建设/交易）为骨架。突破章节节奏加快——新技术/新建筑的完成带来成就感。危机章节打破平静节奏——但应在解决后有个'恢复期'回归日常。"
  hook_placement: "种田文特有钩子——'即将完成的项目/产品'（如第一批作物即将收获）、'新技术的突破'（如发明了新工具/方法）、'新成员/新资源的到来'。还有'外界来客'——外来者打破日常带来新机会或麻烦。以及'长期项目的阶段性成果'——让读者期待建设的下一阶段。"
  climax_pattern: "种田文的高潮不一定是大战——可以是重大建设的完成（如村落升格为镇/水利工程竣工）、重要收获季节/大型集市、或外部威胁的最终解决。全书高潮往往是社区/领地实现了阶段性目标——同时主角的个人成长也得到了验证。"

character_archetypes:
  - name: "经营者主角"
    traits: "善于管理和规划。能从零开始构建系统。对细节有耐心和热情。可能是穿越者带来现代知识，也可能是本地人通过观察和学习成长。"
    checks: "主角的知识/技能应用是否有合理的实现过程？其管理能力是否在具体事务中被展示？"
  - name: "技术/手艺专家"
    traits: "拥有某种核心技术能力（农耕/铁匠/中医/建筑等）。其技能对社区至关重要。"
    checks: "专家的技能是否有独特的传承故事？其知识来源是否被交代？"
  - name: "守卫/猎手"
    traits: "负责社区安全的角色。武力和警觉性高。在外界威胁时成为保护者。"
    checks: "守卫角色是否有独立于'打架'的兴趣和日常？其保卫压力是否真实？"
  - name: "社区成员群像"
    traits: "各有不同背景和技能的小人物——农民/商人/工匠/教师等。构成社区生活的织体。"
    checks: "小人物们是否有各自的小目标和小故事——而非只是背景NPC？"

worldbuilding_checks:
  - "经济系统是否自洽？（生产-流通-消费的闭环,物价/货币的稳定性）"
  - "技术水平的基底是否明确——处于什么时代/文明阶段？"
  - "自然环境是否被具体描绘——气候/土壤/水源等基础条件？"
  - "社会结构和治理规则是否清晰——社区的决策/分配/纠纷解决机制？"
  - "外部世界与社区的关系——商品流通/威胁/信息交换的渠道？"

plot_checks:
  - "每个建设/生产项目是否有完整的'规划-执行-困难-完成-效果'周期？"
  - "新技术/方法的引入是否有过渡和适应过程？"
  - "日常生活的描写是否能持续吸引读者——无聊和抒情的分界线在哪？"
  - "外部威胁的引入是否必要时且与整体节奏协调？"
  - "是否存在'一切太顺利'的段落——小挫折和小失败是真实感的来源？"

continuity_checks:
  - "物资/库存的数量是否被一致跟踪？"
  - "季节/时间的推进是否被准确记录——作物生长有自然周期"
  - "社区人口的增减/流动是否被记录？"
  - "建筑/设施的布局和状态是否一致？"
  - "技能/技术水平的进步是否被持续追踪？"

genre_specific_guards:
  - "防'建设过程跳过'：不能'一个月后,田地开垦完毕'——劳动的过程是种田文的核心"
  - "防'资源魔法化'：物资不能凭空出现又凭空消失——每笔进出都应有交代"
  - "防'社区乌托邦化'：有人的地方就有矛盾——不能所有人都和谐共处"
  - "防'技术飞跃太猛'：从无到有的技术应在合理的时间跨度内升级"
  - "防'主角万能化'：一人不能精通所有领域——需要依赖社区成员的专业技能"
  - "防'外界威胁泛滥'：如果种田文变成了战斗文,则失去了类型契约"

forbidden_patterns:
  - pattern: "建设过程一键跳过"
    reason: "跳过劳动过程就等于跳过种田文的核心内容——读者来就是为了看建设"
  - pattern: "无限资源/无限仓库"
    reason: "资源的稀缺性和管理是种田文的基本趣味——无限资源消灭了所有张力"
  - pattern: "社区成员全是无条件的爱和支持"
    reason: "真实的人际关系包含摩擦和调解——过度的和谐等于没有人物"
  - pattern: "技术突变无代价"
    reason: "每次技术突破都应有适应的阵痛和意料之外的副作用"
  - pattern: "过度依赖现代知识偷懒"
    reason: "现代知识的应用应面对异世界/古代的实际约束——不能产生'魔法'效果"
  - pattern: "种田转为打怪升级"
    reason: "如果后期放弃了种田转为纯战斗——前面的读者会集体抛弃"

reader_pull_rules:
  - "'从无到有'的建设过程是最强爽点——从荒地到家园的每一步"
  - "收获的时刻（真实的丰收/项目完成/集市成功）——延迟满足的快乐"
  - "日常中的小确幸——美食/美景/温暖的对话——治愈系的核心价值"
  - "技能的逐步精进——从新手到专家的过程——养成系的快感"
  - "社区关系的深度——人与人之间的信任如何一砖一瓦地建立"

outline_validation_rules:
  - "建设的时间线是否合理（与季节/技术周期匹配）？"
  - "资源管理系统是否设计完整——主要物资的产消循环？"
  - "技术升级路径是否规划且每步有合理的条件？"
  - "社区发展各阶段的标志和目标是否明确？"
  - "外部威胁/干扰的引入节点和强度是否合理？"

agent_focus:
  - focus: "建设细节密度"
    detail: "检查生产/建设过程是否有具体描写——基于具体的词频分析"
  - focus: "资源循环逻辑"
    detail: "追踪关键物资的产出和消耗，检查资源黑箱或凭空出现"
  - focus: "技术升级合理性"
    detail: "分析技术进步的速度和条件,标记跳跃式升级"
  - focus: "日常-危机比例"
    detail: "统计战斗/危机场景和日常/建设场景的比例"
  - focus: "社区角色多样性"
    detail: "检查社区成员各是否有独立的功能和发展"

review_questions:
  - "如果你的故事是一个经营类游戏,玩家最享受的环节是什么？这个环节在文字中够不够具体？"
  - "读者能不能画出你们的社区/领地地图——每个建筑的位置和功能？"
  - "一季完整的耕作/生产周期在你的故事中如何展现？"
  - "有没有哪一个社区成员是读者会单独为其命运牵挂的？"
  - "这本书最治愈的3个日常场景是什么？最让读者有成就感的3个建设场景是什么？"
