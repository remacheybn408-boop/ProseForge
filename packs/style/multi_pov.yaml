style_id: multi_pov
name: 多视角叙事
description: 通过多个角色视角交替推进故事，每个视角提供不完整但互补的信息拼图，利用视角切换制造悬念和信息张力。
narrative_features:
  - 多个明确的视角角色——各自有独立的叙事声音
  - 每个视角提供其他视角看不到的信息——信息不对称是核心张力
  - 视角切换标记清晰——读者永远不会混淆当前视角
  - 同一事件的不同视角解读——展示主观真实与客观真实的差异
language_features:
  - 每个视角角色有独特的语调和思维模式——读者能凭语言判断当前视角
  - 叙述内容受限于该视角的知识和认知——不出现视角外信息
  - 切换视角时语言风格随之变化——不仅是内容还有方式
rhythm_features:
  - 视角切换有规律——不是随机跳跃
  - 关键事件后的视角切换制造悬念——让读者在另一视角中等待答案
  - 多线的平行推进到交汇——节奏在汇合时加速
allowed_patterns:
  - 章节/段落以视角角色命名为标识
  - 同一事件的多角度回放
  - 各视角的时间线重叠/错位
  - 读者知道比单一视角更多的信息——戏剧反讽
forbidden_patterns:
  - 视角切换无标记——让读者迷失
  - 所有视角声音雷同——POV失去意义
  - 视角角色知道的超越其合理范围——POV作弊
  - 视角数量过多——超出读者记忆负荷
agent_focus:
  - 各视角角色是否保持一致的语调和认知水平
  - 视角切换的时机和信息量是否恰到好处
  - 是否存在视角角色知道了他们不应该知道的信息
review_questions:
  - 不看标记只看文字——能不能分辨出当前是哪个角色在叙事？
  - 每个POV角色提供的视角是不是独一无二不可或缺的？
  - 视角切换有没有在最好的时机发生——让读者在最有好奇心的时候被切换？
