style_id: diary_style
name: 日记体
description: 以日记/日志/书信/备忘录为载体的叙述方式，通过碎片化的记录拼凑出完整的故事，天然具有亲切感和主观性。
narrative_features:
  - 故事通过一系列日期标记的文字碎片推进
  - 强烈的主观视角——叙事者写给自己或特定的收信人
  - 信息天然不完整——只写叙事者认为值得记录的内容
  - 时间跳跃是自然特征——不是每一天都会被记录
language_features:
  - 口语化和私密感——像在对亲近的人或对自己说话
  - 不完全句/省略/跳跃——模仿真实的私人记录
  - 语气反映写作时的情绪——同一个人不同日期的日记风格可能不同
  - 细节的个人选择性——叙事者注意什么、忽略什么反映了其性格
rhythm_features:
  - 以日记条目的日期为自然节奏分割
  - 重大事件的记录更加详细——日常条目简短
  - 留白是设计——两篇日记之间发生了叙事者不愿写的事
  - 条目长度的变化本身就是情绪信号——越短越痛苦/越敷衍
allowed_patterns:
  - 日期/时间标记分节
  - 碎片叙事——留白让读者填充
  - 不可靠叙事者——日记是主观的
  - 混合形式——日记+书信+便条+录音稿等
forbidden_patterns:
  - 过于完整和客观的叙事——违背日记的主观性
  - 叙事者记下不可能的细节——这类细节暴露了作者的操控
  - 日记条目之间的时间间隔无规律——使时间线混乱
  - 格式转为标准叙事而忘记这是日记——保持形式的诚实
agent_focus:
  - 叙事者的私人语调是否始终一致
  - 日记条目的选择性——记录了什么没记录什么——是否揭示角色
  - 条目长度的情绪信号——是否在关键事件前后有变化
  - 不可靠性——叙事者的盲点和自我欺骗是否得到展示
review_questions:
  - 为什么角色要写日记/写信？这个动机在故事中是否足够有力？
  - 读者能通过日记字里行间看到叙事者自己没意识到的东西吗？
  - 如果所有日记条目按时间排列——空白（未记录）的日子里发生了什么？
