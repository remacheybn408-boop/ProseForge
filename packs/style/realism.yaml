style_id: realism
name: 现实主义
description: 追求社会真实感和人物心理深度的创作风格，强调可信度和生活质感。
narrative_features:
  - 人物行为受社会环境和心理动机的双重制约
  - 情节发展基于社会逻辑和心理因果——非巧合或天降救兵
  - 细节描写服务于真实感——具体而克制
  - 叙事节奏遵循生活的自然节律——不人为加速或戏剧化
language_features:
  - 语言精准克制——避免形容词堆砌和情感标签
  - 对话反映人物的社会阶层教育背景和性格
  - 描写以白描为主——让事实自身说话
  - 避免叙事者跳出来评判角色——保持客观视角
rhythm_features:
  - 日常与戏剧事件交替——高潮建立在日常积累之上
  - 给情感留沉淀空间——大喜大悲不在同一场景发生
  - 时间感真实——事件有自然的酝酿和消化周期
allowed_patterns:
  - 白描式细节呈现
  - 社会环境的系统性描写
  - 人物内心的复杂性展示
  - 开放式结局和留白
forbidden_patterns:
  - 过度戏剧化——情感流于表面化表演
  - 说教/叙事者评判——让读者自己判断
  - 巧合替代因果关系
  - 人物的非理性完美化
agent_focus:
  - 人物行为是否符合其社会背景和心理设定
  - 情节的因果链条是否自洽
  - 是否存在叙事者强行干预的痕迹
  - 细节的真实性和功能——每个细节都在工作吗
review_questions:
  - 角色做出的关键选择是否源于其性格和环境——而非作者的安排？
  - 如果把这个故事当作真实发生的事件——哪部分会让人觉得不可能？
  - 细节描写是让场景更鲜活——还是拖慢了叙事？
