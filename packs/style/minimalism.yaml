style_id: minimalism
name: 极简主义
description: 海明威式的冰山理论写作——用最少的文字表达最丰富的内容，省略胜于解释。
narrative_features:
  - 大量留白——只写水面上的八分之一
  - 叙事聚焦于外部动作和对话——内心世界通过行为暗示
  - 场景切换干净利落——不拖泥带水的过渡
  - 拒绝过量修饰——每个词都在工作
language_features:
  - 短句为主——有节奏感但不冗长
  - 形容词副词极度克制——名动为骨
  - 对话简短但意味深长——潜台词比说出来的多
  - 重复有意图——有意义的重复而非贫乏
rhythm_features:
  - 段落短小——视觉呼吸感
  - 节奏偏快但不过度紧张——简洁不等于急促
  - 停顿通过空行和短章实现——沉默本身有重量
allowed_patterns:
  - 白描——动作和对话驱动叙事
  - 重复——在关键处使用重复增强力量
  - 省略——跳过过渡和解释
  - 冰山理论——暗示比明说更有力
forbidden_patterns:
  - 大量形容词和副词修饰
  - 人物内心独白式的情绪说明
  - 场景过场式的冗长过渡
  - 重复解释同一个情感或情节
agent_focus:
  - 是否有可以删掉而不影响理解的句子
  - 形容词副词密度是否过高
  - 潜台词是否足够丰富——对话之下有暗流吗
review_questions:
  - 如果删掉所有形容词和副词——这个故事还成立吗？
  - 最重要的3个情感时刻——是通过行为还是叙述表达的？
  - 有没有一句多余的话——删掉它会让故事更好？
