style_id: youth_lit
name: 青年文学
description: 面向青少年读者的创作风格，关注成长、自我认知和社会关系。
narrative_features:
  - 主角处在成长关键期
  - 自我认知与身份探索
  - 人际关系复杂化
  - 理想与现实的碰撞
language_features:
  - 语言介于通俗与文学之间
  - 内心独白适度
  - 对话反映年龄特征
rhythm_features:
  - 成长节点有节奏变化
  - 关键选择处放缓
allowed_patterns:
  - 成长叙事
  - 校园/社会过渡
  - 友谊与爱情探索
  - 代际冲突
forbidden_patterns:
  - 说教灌输价值观
  - 成人视角代替青少年视角
  - 问题简单化处理
agent_focus:
  - 人物成长是否可信
  - 青少年视角是否真实
  - 是否有说教倾向
review_questions:
  - 本章是否以青少年真实视角叙述？
  - 人物选择是否反映年龄特征？
  - 是否有不适龄的内容？