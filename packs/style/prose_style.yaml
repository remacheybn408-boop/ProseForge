style_id: prose_style
name: 散文化
description: 以散文的笔法写小说，注重语言本身的审美价值，情景交融，意境优先，节奏舒缓而有韵律。
narrative_features:
  - 情节淡化——以情绪流动和意境营造替代紧凑的情节推进
  - 叙事视角偏主观——透过角色的感受和记忆过滤世界
  - 时间感弱化——过去和现在在回忆中交融
  - 故事存在于细节中——日常物件的描写承载情感和记忆
language_features:
  - 语言的韵律感和画面感—行文可朗读
  - 比喻和意象经营——建立贯穿全文的意象系统
  - 短句与长句交替——形成自然的呼吸节奏
  - 注意音韵——有意识使用叠词/对偶/排比
rhythm_features:
  - 整体节奏舒缓——不追求事件密度
  - 情感的推进替代情节的推进——感情的波动就是节奏
  - 段落长短有音乐性——长短交错如呼吸
  - 留白和间歇——给读者回味的空间
allowed_patterns:
  - 情景交融——景物描写承载情感
  - 反复/回环的意象运用
  - 联想和意识流式的叙事跳跃
  - 开放和留白的场景收束
forbidden_patterns:
  - 情节驱动的机械节奏——每一章必须发生X件事的逻辑
  - 纯信息型段落——每一段都应同时承载信息和情感
  - 急促的叙事速度——破坏散文的舒缓质感
  - 缺乏意象的平直描写——平庸的描写不如留白
agent_focus:
  - 语言的音乐性——句式的长短搭配是否和谐
  - 意象系统的一致性——同一意象的多次出现是否形成意义叠加
  - 情感表达的克制——避免情感标签式写法
review_questions:
  - 你的小说能不能朗读——朗读时的节奏和音韵是否悦耳？
  - 文中的关键意象是什么？它是否在多个场景中反复出现并积累意义？
  - 有没有某个段落的语言本身——在没有任何情节推动的情况下——读者愿意再读一遍？
