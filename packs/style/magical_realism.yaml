style_id: magical_realism
name: 魔幻现实主义
description: 在极为真实的日常世界中自然融入不可思议的元素——不是创造魔法世界，而是让魔幻成为现实的一部分，以完全平静的口吻叙述奇迹。
narrative_features:
  - 魔幻元素被当作日常事实来叙述——叙事者不对奇迹表示惊讶
  - 根植于具体的文化地理和历史——魔幻从土地和传统中生长
  - 时间非线性——过去借由记忆和幽灵一直活在当下
  - 集体记忆和家族历史与个人命运交织
language_features:
  - 极其精密的现实细节——让魔幻因为周围的真实而真实
  - 长句和循环结构——时间在句子中折叠
  - 感官极其丰富——气味/声音/触感/颜色细致入微
  - 对超现实事件使用平淡语调——奇迹不需要惊叹号
rhythm_features:
  - 循环而非线性——故事像河一样蜿蜒而非像箭一样直飞
  - 密集的段落但舒缓的语速——让读者沉浸而非追赶
  - 在极度细节化的日常场景和突如其来的魔幻间切换
allowed_patterns:
  - 魔幻事件以新闻式平淡口吻记录
  - 大量的感官细节——世界是可嗅可触的
  - 循环的故事结构——历史和现在的交织
  - 集体叙述——家族/村庄/城市的集体声音
forbidden_patterns:
  - 对魔幻事件的惊奇和过度解释——不解释最重要的是魔幻
  - 架空世界——魔幻现实主义根植于真实的文化和地理
  - 快节奏的情节驱动——魔幻现实主义需要沉淀
  - 个人主义中心——魔幻现实主义的视野是集体和历史的
agent_focus:
  - 魔幻元素的呈现是否足够日常化——无惊叹号的奇迹
  - 现实细节的精度和密度——世界是否可触可感
  - 历史和文化的具体性——不能是架空
  - 感官描写的丰富度
review_questions:
  - 你故事中哪段描写能让读者闭上眼睛就闻到那个世界的味道？
  - 最重要的魔幻事件——在叙事中是否获得了与'买面包'同样平淡的语调？
  - 这真的是你的文化/土地中生长出的魔幻——还是通用的奇幻元素的挪用？
