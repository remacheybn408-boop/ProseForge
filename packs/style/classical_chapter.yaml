style_id: classical_chapter
name: 古典章回体
description: 传承中国古典小说的章回体写法，以话说/且听下回分解为标志，讲究回目对仗和说书人叙事。
narrative_features:
  - 以说书人口吻展开叙事——强烈的叙事者存在感
  - 每回（章）有对仗的回目概括内容
  - 以话说/且说/按下不表/且听下回分解等话本套语为章界标志
  - 叙事视角全知——叙事者知晓所有人物的过去现在和未来
language_features:
  - 半文半白——文言与白话自然融合
  - 诗词嵌入——有诗为证或以诗收束场景
  - 人物语言有身份标记——官有官腔,民有民语
  - 四六骈文适度使用——对仗工整但不拘泥
rhythm_features:
  - 每回有起有结——独立成章但环环相扣
  - 关键时刻以诗赞之——情感的节奏点
  - 文武场交替——厮杀与文戏穿插
  - 有话则长无话则短——不强行统一篇幅
allowed_patterns:
  - 话说/且说等话本套语
  - 嵌诗嵌词——有诗为证
  - 全知视角的旁白穿插
  - 且听下回分解式章尾
forbidden_patterns:
  - 现代口语/网络用语——破坏古典氛围
  - 内心独白式的大段心理描写——古典叙事以外在描写为主
  - 破碎的短句——古典叙事对句式有基本要求
  - 西化的长难句和从句嵌套
agent_focus:
  - 话本套语使用是否自然不过度
  - 语言风格是否始终一致
  - 诗词嵌入的时机和质量
  - 叙事者声音是否贯穿始终
review_questions:
  - 如果去掉所有话本套语——你的叙事声调还剩下什么？
  - 诗词在关键节点的出现是否有点睛之效——而非为了形式而形式？
  - 你的古典语言是真正内化的——还是文言词典式的拼接？
