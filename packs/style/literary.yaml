style_id: literary
name: 纯文学
description: 以文学性为首要追求的小说创作风格——语言即目的，形式即内容，探索人类经验的深度和复杂性，拒绝公式化和通俗化。
narrative_features:
  - 内容和形式同等重要——怎么写和写什么是一体的
  - 拒绝类型公式——每部作品创造自己的叙事法则
  - 开放性大于闭合性——多义和留白是美学选择
  - 对人类经验的深度探索——不提供简单答案
language_features:
  - 语言具有独立的审美价值——句子本身值得品味
  - 精确到严苛的程度——不许敷衍不许潦草
  - 声音和风格独特——读者能在不看作者名的情况下辨认
  - 意象和隐喻有机生长——而非装饰性添加
rhythm_features:
  - 节奏由主题和情感决定——不服务于商业可读性
  - 慢是美学选择——深度需要时间和空间
  - 沉默和留白的节奏作用——不说出来的和说出来的一样重要
  - 章节结构服务于意义——每一节的长度和顺序都有理由
allowed_patterns:
  - 语言实验——打破常规的叙事结构
  - 不可靠叙事——叙事本身的质疑
  - 互文和引用——与文学传统的对话
  - 非线性和碎片——现代生活的碎裂感
forbidden_patterns:
  - 公式化的情节和角色——纯文学回避类型模板
  - 松弛的语言——每句都要对得起读者的智力
  - 给读者他们想要的——要给他们他们不知道想要的
  - 一切都解释清楚——让读者工作
agent_focus:
  - 语言的精确度和独创性——陈词滥调和敷衍
  - 结构和形式的有机性——形式是否有内在必要性
  - 意象系统的深度——是否有贯穿且有意义的意象
  - 留白和沉默的使用——是否给了读者参与创作的空间
review_questions:
  - 你的语言中有什么是只有你能写出来的——别人写不了或不会这么写？
  - 如果这个故事有简单的寓意——你确定它是唯一的解读吗？
  - 结构本身在说什么——小说形式传达了什么内容没有传达的？
