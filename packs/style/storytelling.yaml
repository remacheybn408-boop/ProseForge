style_id: storytelling
name: 评书体
description: 借鉴中国传统评书/说书的叙事风格，以强烈的说书人存在感、插叙评论和与读者的直接互动为特征，追求坊间流传的口头叙事质感。
narrative_features:
  - 强烈的说书人声音——叙事者是一个鲜明的角色
  - 说书人与读者直接对话——如列位看官/你道这是为何
  - 关键时刻停下来评论或预告——制造等待和期待
  - 人物的登场和退场有仪式感——来者何人/且看下文
language_features:
  - 口语化——以口头讲故事的节奏为基准
  - 各种声音技巧——拟声词/重复/排比/对偶的丰富使用
  - 人物说话有角色辨识度——武将/书生/莽汉/小姐各有腔口
  - 有韵文/打油诗/顺口溜——民间文学的质地
rhythm_features:
  - 开场定场——一上来就要抓住听众的注意力
  - 紧要处切住——在最想知道后文的地方停下
  - 文武场/冷热场交替——一张一弛
  - 长篇叙事中有小段子调剂——大故事套小故事
allowed_patterns:
  - 说书人的插叙评论——你道这是为何/原来源是如此
  - 与读者/听众的直接互动
  - 定场诗/收场诗
  - 且听下回分解式章尾
forbidden_patterns:
  - 冗长的心理独白——评书靠外在行为展示内在
  - 过于文学化的内敛语言——评书是往外说的
  - 完全消失的说书人声音——评书体不能没有叙事者存在
  - 西式的叙事结构和术语
agent_focus:
  - 说书人声音的存在感是否始终持续
  - 叙事节奏——是否在最关键处切住
  - 人物登场的仪式感——新角色出场有足够的介绍
  - 口头叙事的流畅度——读出来是否顺畅
review_questions:
  - 把你的作品念出来——在哪里舌头打结了？在哪里听众会走神？
  - 说书人的性格是什么——读者能不能描述这个讲故事的人？
  - 哪一段如果改成安静的内心独白会——讲着讲着声音突然变弱的地方需要加强
