style_id: hardboiled
name: 硬汉派
description: 源自美国冷硬侦探小说的写作风格，以极其克制寡言的叙事、短促冷硬的句法和不动声色的暴力美学为特征。
narrative_features:
  - 第一人称或第三人称受限视角——主角通常是一个有故事的人
  - 情节通过行动和对话推进——几乎没有内心独白和情感旁白
  - 世界是灰度的——没有纯粹的好人和纯粹的坏人
  - 女性角色有致命吸引力——但不对其内心做过多挖掘
language_features:
  - 句子极短——像拳头一样打出去
  - 形容词极度克制——动作和对话占据主导
  - 冷峻的语调——不渲染情感让事实本身说话
  - 对话如交易和交锋——每句话都是棋步
rhythm_features:
  - 快速——不拖延、不抒情、不过渡
  - 场景短促——一个场景达到目的后立即结束
  - 暴力场景毫不客气——用冷的语言写暴力产生最烫的效果
  - 偶尔插入的短句如重拳——一句就是一个段落
allowed_patterns:
  - 冷叙事——不动声色地呈现残酷
  - 对话驱动——人物通过对话行动暴露自己
  - 短段落——一句一段的力量
  - 省略动机——只写行为不写背后
forbidden_patterns:
  - 任何形式的情感哭诉和心理分析
  - 大段的场景和环境描写
  - 慢节奏的日常和温情场景——除非为后面的背叛做铺垫
  - 叙事者评判角色——谁都不干净
agent_focus:
  - 情感表达是否通过行为——而非文字
  - 句子长度和节奏——是否存在拖拉的句子
  - 暴力场景是否冷而有力
  - 对话是否有信息交锋——非闲聊
review_questions:
  - 你最长的一段内心描写是什么？能不能删掉？
  - 你在哪里最想告诉读者'这个角色其实是好心'？忍住——用行为展示它
  - 最硬的一句台词是什么——读者能用它记住这个角色吗？
