services:
  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

  redis:
    restart: unless-stopped

  api:
    restart: unless-stopped
    environment:
      PROSEFORGE_ENV: production
      PROSEFORGE_PUBLIC_URL: ${PROSEFORGE_PUBLIC_URL:?PROSEFORGE_PUBLIC_URL is required}
      PROSEFORGE_DATABASE_URL: ${PROSEFORGE_DATABASE_URL:?PROSEFORGE_DATABASE_URL is required}
      PROSEFORGE_SYNC_DATABASE_URL: ${PROSEFORGE_SYNC_DATABASE_URL:?PROSEFORGE_SYNC_DATABASE_URL is required}
      PROSEFORGE_REDIS_URL: ${PROSEFORGE_REDIS_URL:?PROSEFORGE_REDIS_URL is required}
      PROSEFORGE_MASTER_KEY: ${PROSEFORGE_MASTER_KEY:?PROSEFORGE_MASTER_KEY is required}
      PROSEFORGE_JWT_SECRET: ${PROSEFORGE_JWT_SECRET:?PROSEFORGE_JWT_SECRET is required}
      PROSEFORGE_BOOTSTRAP_ADMIN_PASSWORD: ${PROSEFORGE_BOOTSTRAP_ADMIN_PASSWORD:?PROSEFORGE_BOOTSTRAP_ADMIN_PASSWORD is required}

  worker:
    restart: unless-stopped
    environment:
      PROSEFORGE_ENV: production
      PROSEFORGE_DATABASE_URL: ${PROSEFORGE_DATABASE_URL:?PROSEFORGE_DATABASE_URL is required}
      PROSEFORGE_REDIS_URL: ${PROSEFORGE_REDIS_URL:?PROSEFORGE_REDIS_URL is required}
      PROSEFORGE_MASTER_KEY: ${PROSEFORGE_MASTER_KEY:?PROSEFORGE_MASTER_KEY is required}

  scheduler:
    restart: unless-stopped
    environment:
      PROSEFORGE_ENV: production
      PROSEFORGE_DATABASE_URL: ${PROSEFORGE_DATABASE_URL:?PROSEFORGE_DATABASE_URL is required}
      PROSEFORGE_REDIS_URL: ${PROSEFORGE_REDIS_URL:?PROSEFORGE_REDIS_URL is required}
      PROSEFORGE_MASTER_KEY: ${PROSEFORGE_MASTER_KEY:?PROSEFORGE_MASTER_KEY is required}

  web:
    restart: unless-stopped
